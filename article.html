<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Articles & Blog - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #333; line-height: 1.6; }
        
        /* HEADER & SEARCH STYLES */
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 0.4rem 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08); height: 55px; gap: 10px; }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }
        .search-container { flex-grow: 1; display: flex; justify-content: center; position: relative; }
        .search-input { width: 100%; max-width: 300px; padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid #e0e0e0; background: #f8f9fa; transition: all 0.3s ease; font-size: 0.9rem; outline: none; }
        .search-input:focus { max-width: 400px; background: white; border-color: #2c8577; box-shadow: 0 0 0 3px rgba(44, 133, 119, 0.1); }
        .search-results { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 600px; max-height: 70vh; overflow-y: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1002; display: none; padding: 1rem; border: 1px solid #f0f0f0; }
        .search-results.active { display: block; }
        .search-result-item { padding: 0.8rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s; border-radius: 8px; text-decoration: none; color: inherit; }
        .search-result-item:hover { background: #f8f9fa; }
        .search-category-title { font-size: 0.8rem; color: #999; text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 5px; font-weight: bold; }
        .hamburger { display: flex; flex-direction: column; cursor: pointer; padding: 5px; flex-shrink: 0; }
        .hamburger span { width: 22px; height: 2px; background: #2c8577; margin: 2.5px 0; border-radius: 2px; }
        .mobile-menu { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: right 0.3s ease; padding: 2rem 0; }
        .mobile-menu.active { right: 0; }
        .mobile-menu ul { list-style: none; padding: 0; }
        .mobile-menu ul li a { display: block; padding: 1rem 2rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; text-decoration: none; color: #333; font-size: 1.1rem; }
        .close-menu { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: #2c8577; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .overlay.active { display: block; }

        .main { margin-top: 55px; padding: 2rem 1rem; max-width: 800px; margin-left: auto; margin-right: auto; }
        .page-title { text-align: center; color: #2c8577; margin-bottom: 2rem; font-size: 2rem; }
        .article-feed { display: flex; flex-direction: column; gap: 1.5rem; }
        .article-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-decoration: none; color: inherit; display: block; transition: transform 0.2s; }
        .article-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .article-title { color: #2c8577; font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: bold; }
        .article-snippet { color: #555; font-size: 1rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .read-more { color: #2c8577; font-weight: bold; font-size: 1rem; margin-top: 1rem; display: inline-block; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo"><img src="" alt="PT" class="logo-img" id="clinicLogo"></a>
        <div class="search-container"><input type="text" id="globalSearch" class="search-input" placeholder="Search..." oninput="window.handleSearch()"></div>
        <div class="hamburger" onclick="window.toggleMenu()"><span></span><span></span><span></span></div>
    </header>

    <div id="searchResults" class="search-results"></div>

    <div class="mobile-menu" id="mobileMenu">
        <button class="close-menu" onclick="window.toggleMenu()">&times;</button>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/services">Services</a></li>
            <li><a href="/doctors">Doctors</a></li>
            <li><a href="/products">Products</a></li>
            <li><a href="/articles">Articles</a></li>
            <li><a href="/prescription">Reports/Prescription</a></li>
            <li><a href="/admin" style="color: #2c8577; font-weight: bold; background: #e8f5f3; margin-top: 1rem;">Admin Login</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay" onclick="window.toggleMenu()"></div>

    <main class="main">
        <h1 class="page-title">Health Articles & Resources</h1>
        <div class="article-feed" id="articleFeed">
            <p style="text-align:center; color:#999;">Loading articles...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js';

        const app = initializeApp({ apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", projectId: "clinic-bdf92" });
        const db = getDatabase(app);
        window.siteData = {};
        window.slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
        window.toggleMenu = () => { document.getElementById('mobileMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
        document.addEventListener('click', (e) => { const r = document.getElementById('searchResults'), i = document.getElementById('globalSearch'); if (e.target !== r && e.target !== i && !r.contains(e.target)) r.classList.remove('active'); });

        onValue(ref(db, 'site'), (snapshot) => {
            window.siteData = snapshot.val() || {};
            if(window.siteData.hero && window.siteData.hero.logoUrl) document.getElementById('clinicLogo').src = window.siteData.hero.logoUrl;
            
            const articles = window.siteData.articles || [];
            if(articles.length === 0) { document.getElementById('articleFeed').innerHTML = '<p style="text-align:center; color:#666;">No articles available at the moment. Check back soon!</p>'; return; }
            
            const sorted = [...articles].sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('articleFeed').innerHTML = sorted.map(a => `
                <a href="/${a.slug}" class="article-card">
                    <div class="article-title">${a.title}</div>
                    <div class="article-snippet">${a.content}</div>
                    <span class="read-more">Read Full Article →</span>
                </a>
            `).join('');
        });

        window.handleSearch = function() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            if (!query) { resultsContainer.classList.remove('active'); return; }
            let html = '';
            
            const servs = window.siteData.services?.filter(s => s.title.toLowerCase().includes(query)) || [];
            if(servs.length) {
                html += '<div class="search-category-title">Services</div>';
                servs.forEach(s => { html += `<a href="/service/${window.slugify(s.title)}" class="search-result-item"><span style="font-size:1.2rem;">${s.icon||'⚕️'}</span> <div style="font-weight:600;">${s.title}</div></a>`; });
            }

            const docs = window.siteData.doctors?.filter(d => d.name.toLowerCase().includes(query) || d.qualification.toLowerCase().includes(query)) || [];
            if(docs.length) {
                html += '<div class="search-category-title" style="margin-top:15px;">Doctors</div>';
                docs.forEach(d => {
                    const av = d.photoUrl ? `<img src="${d.photoUrl}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;">` : '👨‍⚕️';
                    html += `<a href="/doctor/${window.slugify(d.name)}" class="search-result-item">${av} <div><div style="font-weight:600;font-size:0.95rem;">${d.name}</div><div style="font-size:0.8rem;color:#666;">${d.qualification}</div></div></a>`;
                });
            }

            const prods = window.siteData.products?.filter(p => p.name.toLowerCase().includes(query)) || [];
            if(prods.length) {
                html += '<div class="search-category-title" style="margin-top:15px;">Products</div>';
                prods.forEach(p => {
                    const img = p.profilePhoto ? `<img src="${p.profilePhoto}" style="width:30px;height:30px;border-radius:4px;object-fit:cover;">` : '📦';
                    html += `<a href="/product/${window.slugify(p.name)}" class="search-result-item">${img} <div><div style="font-weight:600;">${p.name}</div><div style="color:#2c8577;font-size:0.85rem;">${p.price}</div></div></a>`;
                });
            }

            const arts = window.siteData.articles?.filter(a => a.title.toLowerCase().includes(query) || a.content.toLowerCase().includes(query)) || [];
            if(arts.length) {
                html += '<div class="search-category-title" style="margin-top:15px;">Articles</div>';
                arts.forEach(a => { html += `<a href="/${a.slug}" class="search-result-item">📄 <div><div style="font-weight:600;">${a.title}</div></div></a>`; });
            }

            resultsContainer.innerHTML = html || '<p style="text-align:center; color:#999; padding:1rem;">No results found.</p>';
            resultsContainer.classList.add('active');
        }
    </script>
</body>
</html>
