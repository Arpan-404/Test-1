<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Dashboard - Therapeutic Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS & Phosphor Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = { theme: { extend: { colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f8fafc', surface: '#ffffff' }, boxShadow: { 'soft': '0 2px 10px rgba(29, 78, 216, 0.05)' } } } }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #0f172a; overflow-x: hidden; }
        .h-scroll::-webkit-scrollbar { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid #dbeafe; border-top: 3px solid #1d4ed8; border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // Firebase Config (Private Patient Database)
        const firebaseConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "patient-records-arpan.firebaseapp.com",
            databaseURL: "https://patient-records-arpan-default-rtdb.firebaseio.com", 
            projectId: "patient-records-arpan"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const slugify = (text) => text ? text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '') : '';

        function App() {
            const [user, setUser] = useState(null);
            const [patients, setPatients] = useState([]);
            const [exercises, setExercises] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [showNewPatientModal, setShowNewPatientModal] = useState(false);
            const [showRxModal, setShowRxModal] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // Auth
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setIsLoading(false); });
                return () => unsubscribe();
            }, []);

            // Data Fetching
            useEffect(() => {
                if (!user) return;
                const ptsRef = ref(db, 'patients');
                const exRef = ref(db, 'exercises');

                const unsubPts = onValue(ptsRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setPatients(Object.keys(data).map(k => ({ id: k, ...data[k] })));
                    } else setPatients([]);
                });

                const unsubEx = onValue(exRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setExercises(Object.keys(data).map(k => ({ id: k, ...data[k] })));
                    } else setExercises([]);
                });

                return () => { unsubPts(); unsubEx(); };
            }, [user]);

            const handleLogin = () => signInWithPopup(auth, provider).catch(e => alert("Login failed"));
            const handleLogout = () => { signOut(auth); setSelectedPatient(null); };

            const handleAddPatient = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const p = { name: fd.get('name'), phone: fd.get('phone'), age: fd.get('age'), created: new Date().toISOString() };
                const newRef = push(ref(db, 'patients'));
                set(newRef, p).then(() => { setShowNewPatientModal(false); setSelectedPatient({ id: newRef.key, ...p }); });
            };

            const handleAddRx = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const selectedExs = Array.from(e.target.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                
                const rx = {
                    date: new Date().toISOString(),
                    diagnosis: fd.get('diagnosis'),
                    notes: fd.get('notes'),
                    exercises: selectedExs
                };

                const rxRef = push(ref(db, `patients/${selectedPatient.id}/prescriptions`));
                set(rxRef, rx).then(() => setShowRxModal(false));
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center"><div className="spinner"></div></div>;

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-soft text-center max-w-sm w-full border border-slate-200">
                            <i className="ph-fill ph-stethoscope text-5xl text-azure mb-3"></i>
                            <h1 className="text-2xl font-black text-navy mb-6">Staff Portal</h1>
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 py-3 rounded-xl font-bold hover:bg-slate-50 shadow-sm transition">
                                <i className="ph-bold ph-google-logo text-xl"></i> Login with Google
                            </button>
                        </div>
                    </div>
                );
            }

            const filteredPatients = patients.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.phone.includes(searchQuery));

            return (
                <div className="flex h-screen bg-appbg overflow-hidden flex-col md:flex-row">
                    
                    {/* SIDEBAR: Patient List */}
                    <div className={`w-full md:w-80 bg-white border-r border-slate-200 flex flex-col shrink-0 ${selectedPatient ? 'hidden md:flex' : 'flex'}`}>
                        <div className="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                            <h1 className="font-black text-navy text-lg flex items-center gap-2"><i className="ph-fill ph-activity text-azure"></i> Clinical Desk</h1>
                            <button onClick={handleLogout} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-sign-out text-xl"></i></button>
                        </div>
                        <div className="p-3 border-b border-slate-100">
                            <div className="relative mb-3">
                                <i className="ph-bold ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
                                <input type="text" placeholder="Search patients..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 pl-9 pr-3 text-sm outline-none focus:border-azure" />
                            </div>
                            <button onClick={()=>setShowNewPatientModal(true)} className="w-full bg-ice text-azure font-bold py-2 rounded-lg text-sm flex items-center justify-center gap-1 hover:bg-blue-100 transition"><i className="ph-bold ph-plus"></i> New Patient</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-2 space-y-1">
                            {filteredPatients.map(p => (
                                <button key={p.id} onClick={() => setSelectedPatient(p)} className={`w-full text-left p-3 rounded-lg flex items-center gap-3 transition ${selectedPatient?.id === p.id ? 'bg-azure text-white shadow-sm' : 'hover:bg-slate-50 text-slate-700'}`}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold shrink-0 ${selectedPatient?.id === p.id ? 'bg-white/20' : 'bg-ice text-azure'}`}>{p.name.charAt(0).toUpperCase()}</div>
                                    <div className="flex-1 min-w-0">
                                        <div className="font-bold truncate text-sm">{p.name}</div>
                                        <div className={`text-xs truncate ${selectedPatient?.id === p.id ? 'text-blue-100' : 'text-slate-500'}`}><i className="ph-fill ph-phone text-[10px]"></i> {p.phone}</div>
                                    </div>
                                </button>
                            ))}
                            {filteredPatients.length === 0 && <div className="text-center text-sm text-slate-400 py-6">No patients found.</div>}
                        </div>
                    </div>

                    {/* MAIN: Patient Details */}
                    <div className={`flex-1 flex flex-col min-w-0 bg-appbg relative ${!selectedPatient ? 'hidden md:flex items-center justify-center' : 'flex'}`}>
                        {!selectedPatient ? (
                            <div className="text-center text-slate-400">
                                <i className="ph-fill ph-users text-5xl mb-3 opacity-50"></i>
                                <p className="font-medium">Select or create a patient to view records</p>
                            </div>
                        ) : (
                            <>
                                <div className="bg-white border-b border-slate-200 p-4 flex items-center justify-between sticky top-0 z-10 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <button onClick={()=>setSelectedPatient(null)} className="md:hidden text-slate-400 hover:text-navy"><i className="ph-bold ph-arrow-left text-xl"></i></button>
                                        <div>
                                            <h2 className="font-black text-navy text-xl leading-tight">{selectedPatient.name}</h2>
                                            <p className="text-xs text-slate-500 font-medium">Age: {selectedPatient.age || '--'} | {selectedPatient.phone}</p>
                                        </div>
                                    </div>
                                    <button onClick={()=>setShowRxModal(true)} className="bg-azure text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-navy transition flex items-center gap-1"><i className="ph-bold ph-plus"></i> <span className="hidden sm:inline">Add Prescription</span><span className="sm:hidden">Add Rx</span></button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
                                    {!selectedPatient.prescriptions ? (
                                        <div className="text-center text-slate-400 py-10 bg-white rounded-xl border border-slate-200 border-dashed">
                                            <i className="ph-fill ph-file-dashed text-4xl mb-2"></i>
                                            <p className="font-medium text-sm">No prescriptions recorded yet.</p>
                                        </div>
                                    ) : (
                                        Object.entries(selectedPatient.prescriptions).sort((a,b)=>new Date(b[1].date)-new Date(a[1].date)).map(([rxId, rx]) => (
                                            <div key={rxId} className="bg-white rounded-xl shadow-soft border border-slate-200 overflow-hidden relative">
                                                <div className="absolute top-0 left-0 w-1.5 h-full bg-azure"></div>
                                                <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                                    <div className="font-bold text-navy text-sm"><i className="ph-bold ph-calendar-blank text-azure"></i> {new Date(rx.date).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}</div>
                                                </div>
                                                <div className="p-4 space-y-3">
                                                    {rx.diagnosis && <div><span className="text-[10px] font-bold text-slate-400 uppercase block">Diagnosis</span><span className="font-semibold text-sm">{rx.diagnosis}</span></div>}
                                                    {rx.notes && <div><span className="text-[10px] font-bold text-slate-400 uppercase block">Clinical Notes</span><p className="text-sm bg-slate-50 p-3 rounded border border-slate-100 whitespace-pre-wrap">{rx.notes}</p></div>}
                                                    
                                                    {rx.exercises && rx.exercises.length > 0 && (
                                                        <div>
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase block mb-2">Assigned Exercises</span>
                                                            <div className="flex gap-2 overflow-x-auto h-scroll pb-2">
                                                                {rx.exercises.map(exId => {
                                                                    const ex = exercises.find(e => e.id === exId);
                                                                    if(!ex) return null;
                                                                    // NEW: Doctor's preview link now matches the new SEO standard URL
                                                                    return (
                                                                        <a key={ex.id} href={`/exercise/${slugify(ex.name)}`} target="_blank" className="block w-28 shrink-0 bg-white border border-slate-200 rounded-lg overflow-hidden group hover:border-azure transition">
                                                                            <div className="aspect-[4/3] bg-slate-100 relative">
                                                                                <img src={ex.imageUrl || '/favicon.png'} className="w-full h-full object-cover" />
                                                                                <div className="absolute inset-0 bg-black/10 group-hover:bg-black/20 flex items-center justify-center transition"><div className="w-6 h-6 bg-white/90 rounded-full flex items-center justify-center text-azure shadow-sm scale-75 group-hover:scale-100 transition"><i className="ph-fill ph-play text-xs"></i></div></div>
                                                                            </div>
                                                                            <div className="p-1.5 text-center"><p className="text-[10px] font-bold text-slate-800 truncate">{ex.name}</p></div>
                                                                        </a>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </>
                        )}
                    </div>

                    {/* MODALS */}
                    {showNewPatientModal && (
                        <div className="fixed inset-0 bg-navy/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleAddPatient} className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                                <h2 className="text-xl font-black text-navy mb-4">Add New Patient</h2>
                                <div className="space-y-3">
                                    <input required name="name" placeholder="Full Name" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure text-sm font-medium" />
                                    <input required name="phone" type="tel" placeholder="Phone Number (10 digits)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure text-sm font-medium" />
                                    <input name="age" type="number" placeholder="Age (Optional)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure text-sm font-medium" />
                                </div>
                                <div className="flex gap-2 mt-6">
                                    <button type="button" onClick={()=>setShowNewPatientModal(false)} className="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-50 rounded-lg">Cancel</button>
                                    <button type="submit" className="flex-1 py-3 bg-azure text-white font-bold rounded-lg hover:bg-navy">Save Patient</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {showRxModal && selectedPatient && (
                        <div className="fixed inset-0 bg-navy/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleAddRx} className="bg-white rounded-2xl w-full max-w-lg shadow-xl flex flex-col max-h-[90vh]">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                                    <h2 className="text-xl font-black text-navy">New Prescription</h2>
                                    <button type="button" onClick={()=>setShowRxModal(false)} className="text-slate-400 hover:text-slate-600"><i className="ph-bold ph-x text-xl"></i></button>
                                </div>
                                <div className="p-4 overflow-y-auto space-y-4 bg-slate-50/50 flex-1">
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase">Diagnosis / Condition</label><input name="diagnosis" required className="w-full p-3 bg-white border border-slate-200 rounded-lg outline-none focus:border-azure text-sm" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase">Clinical Notes & Advice</label><textarea name="notes" rows="3" className="w-full p-3 bg-white border border-slate-200 rounded-lg outline-none focus:border-azure text-sm" /></div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Assign Rehabilitation Exercises</label>
                                        <div className="border border-slate-200 bg-white rounded-lg h-48 overflow-y-auto p-2 space-y-1">
                                            {exercises.length === 0 ? <p className="text-xs text-slate-400 text-center py-4">No exercises found in database.</p> : 
                                                exercises.map(ex => (
                                                    <label key={ex.id} className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded cursor-pointer border border-transparent hover:border-slate-100 transition">
                                                        <input type="checkbox" value={ex.id} className="accent-azure w-4 h-4 rounded" />
                                                        <img src={ex.imageUrl || '/favicon.png'} className="w-8 h-8 rounded bg-slate-100 object-cover shrink-0" />
                                                        <div className="flex-1 min-w-0"><p className="text-sm font-bold text-slate-700 truncate leading-tight">{ex.name}</p><p className="text-[10px] text-slate-400 truncate">{ex.tags ? ex.tags.join(', ') : 'General'}</p></div>
                                                    </label>
                                                ))
                                            }
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-slate-100 bg-white shrink-0">
                                    <button type="submit" className="w-full py-3 bg-azure text-white font-bold rounded-lg hover:bg-navy flex items-center justify-center gap-2 shadow-sm"><i className="ph-bold ph-check"></i> Generate Prescription</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
