<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Portal - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- Pure Firebase Compat Libraries (No Modules, No React, No Crashes) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <!-- Quill Editor (For Clinical Notes) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#2563eb', ice: '#dbeafe', appbg: '#f8fafc', surface: '#ffffff' },
            boxShadow: { 'soft': '0 4px 20px rgba(15, 23, 42, 0.05)', 'float': '0 10px 30px rgba(15, 23, 42, 0.08)' }
          }
        }
      }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #0f172a; overflow-x: hidden; }
        .h-scroll::-webkit-scrollbar { display: none; }
        .h-scroll { scrollbar-width: none; }
        
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #2563eb; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }

        /* Clean Quill Container */
        .ql-editor { min-height: 120px; font-size: 14px; font-family: inherit; line-height: 1.6; }
        .ql-toolbar { background: #f8fafc; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; border-color: #e2e8f0 !important; }
        .ql-container { border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; border-color: #e2e8f0 !important; background: #ffffff; }
        
        .hidden { display: none !important; }

        /* RICH TEXT FORMATTING */
        .rich-text-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-text-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-text-content li { margin-bottom: 0.25rem; }
        .rich-text-content strong, .rich-text-content b { font-weight: 800; color: #1e3a8a; }

        /* PRINT STYLES */
        @page { size: A4; margin: 10mm; }
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; padding: 0 !important; margin: 0 !important; overflow: visible !important;}
            .print-hidden, #view-loading, #view-login, #view-dashboard, #toast { display: none !important; }
            #print-container { display: block !important; position: static; width: 100%; background: white; }
            
            .print-shadow-none { box-shadow: none !important; border: none !important; }
            .print-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .print-break-after-always { page-break-after: always; }
            thead.print-table-header { display: table-header-group; }
            table.main-print-table { page-break-inside: auto; width: 100%; border-collapse: collapse; }
            tr.main-print-row { page-break-inside: avoid; page-break-after: auto; }
            tr.main-print-row-allow-break { page-break-inside: auto; page-break-after: auto; }
        }
    </style>
</head>
<body>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none">
        <div id="toast-content" class="text-white px-4 py-2 rounded-full shadow-lg text-sm font-bold flex items-center gap-2 bg-slate-800">
            <i id="toast-icon" class="ph-bold ph-check-circle text-emerald-400"></i> <span id="toast-msg">Success</span>
        </div>
    </div>

    <!-- VIEW 1: LOADING -->
    <div id="view-loading" class="min-h-screen bg-appbg flex flex-col items-center justify-center font-sans print-hidden">
        <div class="native-loader"></div>
        <div id="loading-text" class="text-lg font-black text-navy tracking-tight mt-4">Connecting to Secure Server...</div>
    </div>

    <!-- VIEW 2: LOGIN -->
    <div id="view-login" class="hidden min-h-screen bg-appbg flex flex-col items-center justify-center font-sans p-4 print-hidden">
        <div class="max-w-sm w-full bg-white rounded-2xl shadow-soft border border-slate-200 p-8 text-center">
            <i class="ph-fill ph-stethoscope text-5xl text-azure mb-3"></i>
            <h1 class="text-2xl font-black text-navy tracking-tight mb-2">Clinical Portal</h1>
            <p class="text-sm text-slate-500 mb-6">Log in with your registered Google Workspace account to access patient records.</p>
            
            <div id="auth-error" class="hidden p-3 bg-red-50 text-red-600 text-xs font-bold rounded-lg border border-red-100 mb-4"></div>
            
            <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 py-3 rounded-lg font-bold hover:bg-slate-50 transition shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-5 h-5"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Authenticate with Google
            </button>
        </div>
    </div>

    <!-- VIEW 3: DASHBOARD MAIN -->
    <div id="view-dashboard" class="hidden flex h-screen overflow-hidden bg-appbg font-sans print-hidden">
        
        <!-- Sidebar (Restored Aesthetic) -->
        <aside id="sidebar" class="w-full md:w-[350px] bg-white border-r border-slate-200 flex flex-col h-full z-20">
            <div class="p-4 border-b border-slate-200 flex items-center justify-between shrink-0 bg-white">
                <div>
                    <h1 class="font-black text-navy text-xl leading-tight">Clinical Portal</h1>
                    <p id="doc-name-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-wide mt-1">Doctor</p>
                </div>
                <button onclick="handleLogout()" class="text-slate-400 hover:text-red-500 transition"><i class="ph-bold ph-sign-out text-2xl"></i></button>
            </div>
            
            <div class="p-4 shrink-0 bg-white border-b border-slate-200 shadow-sm z-10">
                <button onclick="createNewPatient()" class="w-full bg-azure text-white font-bold py-3 rounded-xl text-sm shadow-sm hover:bg-blue-700 transition mb-4 flex items-center justify-center gap-2">
                    <i class="ph-bold ph-plus text-lg"></i> New Record
                </button>
                <div class="relative">
                    <i class="ph-bold ph-magnifying-glass absolute left-3 top-3 text-slate-400 text-lg"></i>
                    <input type="text" id="search-input" placeholder="Search by name, UPID..." onkeyup="renderPatientList()" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2.5 pl-10 pr-4 outline-none focus:border-azure text-sm font-medium text-slate-700" />
                </div>
            </div>

            <div id="patient-list-container" class="flex-1 overflow-y-auto bg-white">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- Main Editor Area -->
        <main id="editor-area" class="hidden md:flex flex-1 bg-appbg flex-col h-full w-full absolute md:relative top-0 left-0 z-30">
            
            <!-- Empty State -->
            <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-slate-400 p-8">
                <i class="ph-fill ph-folder-open text-6xl mb-4 opacity-20"></i>
                <p class="font-bold text-lg text-slate-500">Select a patient record to view or edit.</p>
            </div>

            <!-- Active Editor -->
            <div id="active-editor" class="hidden flex-col h-full animate-in slide-in-from-right-4 md:slide-in-from-right-0">
                
                <header class="bg-white border-b border-slate-200 p-3 sm:px-6 flex items-center justify-between shrink-0 shadow-sm z-10">
                    <div class="flex items-center gap-3">
                        <button onclick="closeEditorMobile()" class="md:hidden p-1.5 text-slate-500 hover:bg-slate-100 rounded-lg"><i class="ph-bold ph-arrow-left text-xl"></i></button>
                        <h2 id="editor-title" class="font-black text-navy text-lg">Patient Record</h2>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3">
                        <button onclick="handlePrint()" class="bg-slate-100 text-navy px-3 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-slate-200 transition flex items-center gap-2">
                            <i class="ph-bold ph-printer text-lg"></i> <span class="hidden sm:inline">Print</span>
                        </button>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 border border-slate-200 px-3 py-2 rounded-lg">
                            <input type="checkbox" id="input-published" class="accent-azure w-4 h-4" onchange="updateActiveData('isPublished', this.checked)" />
                            <span class="text-xs font-bold text-slate-600 hidden sm:inline">Published</span>
                        </label>
                        <button id="btn-save" onclick="savePatientData()" class="bg-azure text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-blue-700 transition disabled:opacity-50 flex items-center gap-2">
                            <i class="ph-bold ph-floppy-disk text-lg"></i> <span class="hidden sm:inline">Save Data</span>
                        </button>
                    </div>
                </header>

                <div class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
                    
                    <!-- Section 1: Demographics -->
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-2 mb-4"><i class="ph-bold ph-identification-card text-azure mr-1"></i> Demographics</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div class="sm:col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Full Name *</label>
                                <input type="text" id="input-name" oninput="updateActiveData('name', this.value)" class="w-full p-2.5 text-sm font-semibold border border-slate-200 rounded-lg outline-none focus:border-azure text-slate-800" placeholder="Patient Name" />
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">UPID (ID) *</label>
                                <!-- UPID becomes disabled (greyed out) once patient is saved -->
                                <input type="text" id="input-upid" oninput="updateActiveData('ipId', this.value)" class="w-full p-2.5 text-sm font-semibold border border-slate-200 rounded-lg outline-none focus:border-azure text-slate-800 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="e.g. 4092" />
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="col-span-1 sm:col-span-1">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Age</label>
                                <input type="number" id="input-age" oninput="updateActiveData('age', this.value)" class="w-full p-2.5 text-sm font-semibold border border-slate-200 rounded-lg outline-none focus:border-azure text-slate-800" placeholder="Yrs" />
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Gender</label>
                                <select id="input-gender" onchange="updateActiveData('gender', this.value)" class="w-full p-2.5 text-sm font-semibold border border-slate-200 rounded-lg outline-none focus:border-azure bg-white text-slate-800">
                                    <option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-span-3 sm:col-span-1">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Phone Number *</label>
                                <input type="tel" id="input-phone" oninput="updateActiveData('contact', this.value)" class="w-full p-2.5 text-sm font-semibold border border-slate-200 rounded-lg outline-none focus:border-azure text-slate-800" placeholder="10 Digits" />
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: Clinical Notes & Tables -->
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-6">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-2 mb-4"><i class="ph-bold ph-stethoscope text-azure mr-1"></i> Clinical Notes</h3>
                        
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Chief Complaints</label>
                            <div id="quill-cc"></div>
                        </div>
                        
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Medical History</label>
                            <div id="quill-mh"></div>
                        </div>
                        
                        <div class="pt-4 border-t border-slate-100">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Physical Assessment</label>
                            <div id="quill-pa" class="mb-3"></div>
                            <!-- Assessment Custom Tables -->
                            <div id="ctables-assessment"></div>
                            <button onclick="addCustomTable('assessment')" class="text-xs font-bold text-azure hover:underline flex items-center gap-1"><i class="ph-bold ph-plus"></i> Add Assessment Table</button>
                        </div>

                        <div class="pt-4 border-t border-slate-100">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Diagnosis</label>
                            <input type="text" id="input-diagnosis" oninput="updateActiveData('diagnosis', this.value)" class="w-full p-3 text-base font-bold border border-slate-200 rounded-lg outline-none focus:border-azure bg-slate-50 focus:bg-white transition text-slate-800" placeholder="Primary Diagnosis" />
                        </div>

                        <div class="pt-4 border-t border-slate-100">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Treatment Plan & Advice</label>
                            <div id="quill-tp" class="mb-3"></div>
                            <!-- Treatment Custom Tables -->
                            <div id="ctables-treatment"></div>
                            <button onclick="addCustomTable('treatment')" class="text-xs font-bold text-azure hover:underline flex items-center gap-1"><i class="ph-bold ph-plus"></i> Add Treatment Table</button>
                        </div>
                    </div>

                    <!-- Section 3: Reassessment Tables -->
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-2 mb-4"><i class="ph-bold ph-chart-line-up text-azure mr-1"></i> Reassessment & Tracking</h3>
                        <div id="ctables-reassessment"></div>
                        <button onclick="addCustomTable('reassessment')" class="text-xs font-bold text-azure hover:underline flex items-center gap-1"><i class="ph-bold ph-plus"></i> Add Reassessment Table</button>
                    </div>

                    <!-- Section 4: Exercises -->
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-2 mb-4"><i class="ph-bold ph-person-simple-walk text-azure mr-1"></i> Prescribed Exercises</h3>
                        
                        <div class="mb-4">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Select Exercises from Library</label>
                            <div id="exercise-library" class="h-48 overflow-y-auto border border-slate-200 rounded-lg p-2 bg-slate-50 grid grid-cols-1 sm:grid-cols-2 gap-2">
                                <!-- Injected via JS -->
                            </div>
                        </div>

                        <div id="exercise-configs" class="space-y-3 mt-4 border-t border-slate-100 pt-4 hidden">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Configure Selected Exercises</label>
                            <div id="exercise-configs-list" class="space-y-2"></div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </main>
    </div>

    <!-- PRINT CONTAINER (Hidden in Web, Displayed in Print) -->
    <div id="print-container" class="hidden text-[#1e40af] text-[16px] font-sans h-full w-full relative">
        <!-- Injected Dynamically on Print -->
    </div>

    <!-- PURE VANILLA JAVASCRIPT ENGINE -->
    <script>
        // 1. FIREBASE SETUP
        const recordsConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan"
        };
        const appRecords = firebase.initializeApp(recordsConfig, "AppRecords");
        const authRecords = appRecords.auth();
        const dbRecords = appRecords.firestore();
        
        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };
        const appSite = firebase.initializeApp(siteConfig, "AppSite");
        const dbSite = appSite.database();

        // 2. GLOBAL STATE
        let currentUser = null;
        let doctorProfile = null;
        let patients = [];
        let siteExercises = [];
        let activePatient = null;

        // Quill Instances
        let qCC, qMH, qPA, qTP;

        // 3. UI CONTROLLERS
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').className = isError ? "ph-bold ph-warning-circle text-white" : "ph-bold ph-check-circle text-emerald-400";
            document.getElementById('toast-content').className = `text-white px-4 py-3 rounded-full shadow-lg text-sm font-bold flex items-center gap-2 ${isError ? 'bg-red-600' : 'bg-slate-800'}`;
            
            t.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
            }, 3000);
        }

        function switchView(viewId) {
            document.getElementById('view-loading').classList.add('hidden');
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        function closeEditorMobile() {
            document.getElementById('editor-area').classList.add('hidden');
            document.getElementById('editor-area').classList.remove('flex');
            document.getElementById('sidebar').classList.remove('hidden');
            activePatient = null;
        }

        // 4. AUTHENTICATION LOGIC
        authRecords.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const snap = await dbSite.ref('site/doctors').once('value');
                    let isAuthorized = false;
                    
                    if (snap.exists()) {
                        const allDocs = snap.val();
                        const docArray = Array.isArray(allDocs) ? allDocs : Object.values(allDocs);
                        const match = docArray.find(d => d && d.gmail && d.gmail.toLowerCase() === user.email.toLowerCase());
                        
                        if (match) {
                            isAuthorized = true;
                            doctorProfile = match;
                            currentUser = user;
                        }
                    }

                    if (isAuthorized) {
                        // Fix Double "Dr." if it exists
                        let dName = doctorProfile.name || 'Doctor';
                        if(!dName.toLowerCase().startsWith('dr')) dName = "Dr. " + dName;
                        document.getElementById('doc-name-display').innerText = dName;
                        
                        fetchData();
                    } else {
                        await authRecords.signOut();
                        showAuthError(`Access Denied: Email (${user.email}) not found in Admin Panel.`);
                        switchView('view-login');
                    }
                } catch (e) {
                    showAuthError("Error verifying credentials.");
                    switchView('view-login');
                }
            } else {
                switchView('view-login');
            }
        });

        function handleGoogleLogin() {
            document.getElementById('auth-error').classList.add('hidden');
            const provider = new firebase.auth.GoogleAuthProvider();
            authRecords.signInWithPopup(provider).catch(e => {
                showAuthError("Google Sign-In failed or was cancelled.");
            });
        }

        function handleLogout() {
            authRecords.signOut().then(() => window.location.reload());
        }

        function showAuthError(msg) {
            const errBox = document.getElementById('auth-error');
            errBox.innerText = msg;
            errBox.classList.remove('hidden');
        }

        // 5. DATA FETCHING
        function fetchData() {
            switchView('view-dashboard');
            
            dbSite.ref('site/exercises').once('value').then(snap => {
                if(snap.exists()) {
                    const data = snap.val();
                    siteExercises = Array.isArray(data) ? data.filter(Boolean) : Object.values(data).filter(Boolean);
                    if(activePatient) renderExercises();
                }
            });

            dbRecords.collection('artifacts').doc('physiocare-tracker').collection('public').doc('data').collection('patients')
                .orderBy('date', 'desc').limit(100).onSnapshot(snap => {
                    patients = [];
                    snap.forEach(doc => patients.push({ id: doc.id, ...doc.data() }));
                    renderPatientList();
                });
        }

        // 6. RENDER SIDEBAR (Matched to Screenshot Layout)
        function renderPatientList() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('patient-list-container');
            
            const filtered = patients.filter(p => 
                (p.name && p.name.toLowerCase().includes(query)) || 
                (p.ipId && p.ipId.includes(query)) || 
                (p.contact && p.contact.includes(query))
            );

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm font-medium">No records found.</div>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div onclick="openPatient('${p.id}')" class="px-5 py-3.5 border-b border-slate-100 hover:bg-slate-50 cursor-pointer transition flex items-center justify-between group ${activePatient && activePatient.id === p.id ? 'bg-blue-50/50' : ''}">
                    <div>
                        <h4 class="font-bold text-slate-800 text-[15px]">${p.name || 'Unnamed Patient'}</h4>

                    </div>

        // 7. EDITOR MANAGEMENT
        function initQuillEditors() {
            if(!qCC) {
                const qOptions = { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']] } };
                qCC = new Quill('#quill-cc', { ...qOptions, placeholder: 'Primary symptoms...' });
                qMH = new Quill('#quill-mh', { ...qOptions, placeholder: 'Past medical history...' });
                qPA = new Quill('#quill-pa', { ...qOptions, placeholder: 'Findings from physical exam...' });
                qTP = new Quill('#quill-tp', { ...qOptions, placeholder: 'Plan of care...' });

                qCC.on('text-change', () => activePatient.chiefComplaints = qCC.root.innerHTML);
                qMH.on('text-change', () => activePatient.history = qMH.root.innerHTML);
                qPA.on('text-change', () => activePatient.assessmentNote = qPA.root.innerHTML);
                qTP.on('text-change', () => activePatient.treatmentNote = qTP.root.innerHTML);
            }
        }

        function createNewPatient() {
            activePatient = {
                name: "", ipId: "", contact: "", age: "", gender: "Male",
                chiefComplaints: "", history: "", assessmentNote: "", diagnosis: "", treatmentNote: "",
                isPublished: true, prescribedExercises: [], exerciseParams: {}, customTables: []
            };
            loadEditorUI();
        }

        function openPatient(id) {
            const p = patients.find(x => x.id === id);
            if(p) {
                activePatient = JSON.parse(JSON.stringify(p)); 
                if(!activePatient.prescribedExercises) activePatient.prescribedExercises = [];
                if(!activePatient.exerciseParams) activePatient.exerciseParams = {};
                if(!activePatient.customTables) activePatient.customTables = [];
                loadEditorUI();
            }
        }

        function updateActiveData(key, value) {
            if(activePatient) activePatient[key] = value;
        }

        function loadEditorUI() {
            initQuillEditors();
            renderPatientList(); // Refresh list to show active highlight
            
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-editor').classList.remove('hidden');
            document.getElementById('active-editor').classList.add('flex');
            
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('editor-area').classList.remove('hidden');
                document.getElementById('editor-area').classList.add('flex');
            }

            document.getElementById('editor-title').innerText = activePatient.id ? 'Edit Record' : 'New Patient Record';
            
            // Populate Inputs
            document.getElementById('input-published').checked = activePatient.isPublished !== false;
            document.getElementById('input-name').value = activePatient.name || '';
            
            // Handle UPID Locking
            const upidInput = document.getElementById('input-upid');
            upidInput.value = activePatient.ipId || '';
            upidInput.disabled = !!activePatient.id; // Lock if patient has an ID (already saved)
            
            document.getElementById('input-age').value = activePatient.age || '';
            document.getElementById('input-gender').value = activePatient.gender || 'Male';
            document.getElementById('input-phone').value = activePatient.contact || '';
            document.getElementById('input-diagnosis').value = activePatient.diagnosis || '';

            // Populate Quills
            qCC.root.innerHTML = activePatient.chiefComplaints || '';
            qMH.root.innerHTML = activePatient.history || '';
            qPA.root.innerHTML = activePatient.assessmentNote || '';
            qTP.root.innerHTML = activePatient.treatmentNote || '';

            renderAllCustomTables();
            renderExercises();
        }

        // 8. TABLE BUILDER SYSTEM (Restored & Optimized for Vanilla JS)
        function addCustomTable(section) {
            if(!activePatient.customTables) activePatient.customTables = [];
            activePatient.customTables.push({
                id: 'ct_' + Date.now(),
                section: section,
                title: "New Table",
                headers: ["Column 1", "Column 2"],
                rows: [["", ""]]
            });
            renderAllCustomTables();
        }

        window.updateCTableField = function(id, field, val) {
            const t = activePatient.customTables.find(x => x.id === id);
            if(!t) return;
            
            if (field === 'title') {
                t.title = val;
            } else if (field === 'headers') {
                const newHeaders = val.split(',').map(s => s.trim());
                t.headers = newHeaders;
                t.rows = t.rows.map(r => {
                    let newRow = [...r];
                    if(newRow.length > newHeaders.length) newRow.length = newHeaders.length;
                    while(newRow.length < newHeaders.length) newRow.push("");
                    return newRow;
                });
            }
            renderAllCustomTables();
        };

        window.updateCTableCell = function(id, rIdx, cIdx, val) {
            const t = activePatient.customTables.find(x => x.id === id);
            if(t && t.rows[rIdx]) t.rows[rIdx][cIdx] = val;
        };

        window.addCTableRow = function(id) {
            const t = activePatient.customTables.find(x => x.id === id);
            if(t) {
                t.rows.push(Array(t.headers.length).fill(""));
                renderAllCustomTables();
            }
        };

        window.deleteCTableRow = function(id, rIdx) {
            const t = activePatient.customTables.find(x => x.id === id);
            if(t) {
                t.rows.splice(rIdx, 1);
                renderAllCustomTables();
            }
        };

        window.deleteCTable = function(id) {
            if(confirm("Delete this table?")) {
                activePatient.customTables = activePatient.customTables.filter(x => x.id !== id);
                renderAllCustomTables();
            }
        };

        function renderAllCustomTables() {
            renderCustomTableGroup('assessment');
            renderCustomTableGroup('treatment');
            renderCustomTableGroup('reassessment');
        }

        function renderCustomTableGroup(section) {
            const container = document.getElementById(`ctables-${section}`);
            if(!container) return;
            const tables = (activePatient.customTables || []).filter(t => t.section === section);
            
            container.innerHTML = tables.map(t => `
                <div class="border border-slate-200 rounded-lg p-4 mb-4 bg-slate-50/50 shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <input type="text" value="${t.title}" onchange="updateCTableField('${t.id}', 'title', this.value)" class="font-black text-navy text-sm bg-transparent border-b border-slate-300 outline-none w-2/3 focus:border-azure px-1" placeholder="Table Title">
                        <button onclick="deleteCTable('${t.id}')" class="text-red-500 hover:text-red-700 text-xs font-bold transition flex items-center gap-1"><i class="ph-bold ph-trash"></i> Delete Table</button>
                    </div>
                    <div class="mb-3">
                        <label class="text-[9px] uppercase font-bold text-slate-500 mb-1 block">Headers (comma separated)</label>
                        <input type="text" value="${t.headers.join(', ')}" onchange="updateCTableField('${t.id}', 'headers', this.value)" class="w-full text-xs p-2 border border-slate-200 rounded outline-none focus:border-azure bg-white shadow-sm" placeholder="e.g. Date, Joint, ROM">
                    </div>
                    <div class="overflow-x-auto rounded border border-slate-200 bg-white">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr>
                                    ${t.headers.map(h => `<th class="p-2 border-b border-slate-200 text-xs font-bold text-navy bg-slate-100">${h}</th>`).join('')}
                                    <th class="p-2 border-b border-slate-200 bg-slate-100 w-10"></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${t.rows.map((row, rIdx) => `
                                    <tr>
                                        ${row.map((cell, cIdx) => `
                                            <td class="p-1 border-b border-slate-100 border-r last:border-r-0">
                                                <textarea oninput="updateCTableCell('${t.id}', ${rIdx}, ${cIdx}, this.value)" class="w-full text-xs p-1.5 outline-none resize-y min-h-[36px] bg-transparent text-slate-700">${cell}</textarea>
                                            </td>
                                        `).join('')}
                                        <td class="p-1 border-b border-slate-100 text-center">
                                            <button onclick="deleteCTableRow('${t.id}', ${rIdx})" class="text-red-400 hover:text-red-600 p-1"><i class="ph-bold ph-x"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <button onclick="addCTableRow('${t.id}')" class="mt-3 text-xs font-bold text-azure flex items-center gap-1 hover:underline bg-blue-50 px-2 py-1 rounded"><i class="ph-bold ph-plus"></i> Add Row</button>
                </div>
            `).join('');
        }

        // 9. EXERCISE MANAGEMENT
        function renderExercises() {
            const libContainer = document.getElementById('exercise-library');
            const confArea = document.getElementById('exercise-configs');
            const confList = document.getElementById('exercise-configs-list');

            if(siteExercises.length === 0) {
                libContainer.innerHTML = '<div class="text-xs text-slate-400 p-2 text-center col-span-2">No exercises found in Admin Panel.</div>';
                confArea.classList.add('hidden');
                return;
            }

            libContainer.innerHTML = siteExercises.map(ex => {
                const isChecked = activePatient.prescribedExercises.includes(ex.id);
                return `
                    <label class="flex items-center gap-3 p-2 bg-white rounded-lg cursor-pointer border hover:border-azure transition shadow-sm ${isChecked ? 'border-azure bg-blue-50/20' : 'border-slate-200'}">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleExercise('${ex.id}', this.checked)" class="accent-azure w-4 h-4 shrink-0" />
                        ${ex.imageUrl ? `<img src="${ex.imageUrl}" class="w-10 h-10 rounded object-cover border border-slate-100 bg-white" />` : `<div class="w-10 h-10 rounded bg-slate-100 flex items-center justify-center text-lg">🏃</div>`}
                        <span class="text-xs font-bold text-slate-700 leading-tight">${ex.name}</span>
                    </label>
                `;
            }).join('');

            if (activePatient.prescribedExercises.length > 0) {
                confArea.classList.remove('hidden');
                confList.innerHTML = activePatient.prescribedExercises.map(exId => {
                    const exInfo = siteExercises.find(e => e.id === exId);
                    if(!exInfo) return '';
                    const p = activePatient.exerciseParams[exId] || { reps: '', sets: '', freq: '', note: '' };
                    return `
                        <div class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm flex flex-col sm:flex-row gap-3">
                            <div class="w-12 h-12 shrink-0 bg-slate-50 rounded border border-slate-100 flex items-center justify-center hidden sm:flex">
                                ${exInfo.imageUrl ? `<img src="${exInfo.imageUrl}" class="max-w-full max-h-full mix-blend-multiply rounded" />` : `🏃`}
                            </div>
                            <div class="flex-1">
                                <div class="font-bold text-sm text-navy mb-2 leading-tight">${exInfo.name}</div>
                                <div class="grid grid-cols-3 sm:grid-cols-4 gap-2 mb-2">
                                    <div><input type="text" placeholder="Reps" value="${p.reps}" oninput="updateExParam('${exId}', 'reps', this.value)" class="w-full text-xs p-2 border border-slate-200 rounded outline-none focus:border-azure bg-slate-50 focus:bg-white" /></div>
                                    <div><input type="text" placeholder="Sets" value="${p.sets}" oninput="updateExParam('${exId}', 'sets', this.value)" class="w-full text-xs p-2 border border-slate-200 rounded outline-none focus:border-azure bg-slate-50 focus:bg-white" /></div>
                                    <div class="col-span-1 sm:col-span-2"><input type="text" placeholder="Freq (e.g. 2x/day)" value="${p.freq}" oninput="updateExParam('${exId}', 'freq', this.value)" class="w-full text-xs p-2 border border-slate-200 rounded outline-none focus:border-azure bg-slate-50 focus:bg-white" /></div>
                                </div>
                                <input type="text" placeholder="Special Instructions / Note..." value="${p.note}" oninput="updateExParam('${exId}', 'note', this.value)" class="w-full text-xs p-2 border border-slate-200 rounded outline-none focus:border-azure italic bg-slate-50 focus:bg-white" />
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                confArea.classList.add('hidden');
                confList.innerHTML = '';
            }
        }

        window.toggleExercise = function(exId, isChecked) {
            if (isChecked) {
                if(!activePatient.prescribedExercises.includes(exId)) activePatient.prescribedExercises.push(exId);
                if(!activePatient.exerciseParams[exId]) activePatient.exerciseParams[exId] = { reps: '', sets: '', freq: '', note: '' };
            } else {
                activePatient.prescribedExercises = activePatient.prescribedExercises.filter(id => id !== exId);
            }
            renderExercises();
        };

        window.updateExParam = function(exId, field, val) {
            if(!activePatient.exerciseParams[exId]) activePatient.exerciseParams[exId] = { reps: '', sets: '', freq: '', note: '' };
            activePatient.exerciseParams[exId][field] = val;
        };

        // 10. SAVE TO DATABASE
        async function savePatientData() {
            if(!activePatient.name || !activePatient.ipId || !activePatient.contact) {
                return showToast("Name, UPID, and Phone Number are required.", true);
            }

            const btn = document.getElementById('btn-save');
            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-lg"></i> <span class="hidden sm:inline">Saving...</span>`;
            btn.disabled = true;

            try {
                // Ensure doctor name format
                let dName = doctorProfile.name || '';
                if(dName && !dName.toLowerCase().startsWith('dr')) dName = "Dr. " + dName;

                const dataToSave = {
                    ...activePatient,
                    doctorName: dName,
                    doctorQual: doctorProfile.qualification || '',
                    doctorDesignation: doctorProfile.designation || '',
                    doctorReg: doctorProfile.regNumber || '',
                    doctorPhone: doctorProfile.phone || '',
                    lastEditedBy: currentUser.email,
                    date: activePatient.date || new Date().toISOString()
                };

                const coll = dbRecords.collection('artifacts').doc('physiocare-tracker').collection('public').doc('data').collection('patients');
                
                if (activePatient.id) {
                    await coll.doc(activePatient.id).set(dataToSave, { merge: true });
                } else {
                    const newRef = coll.doc();
                    dataToSave.id = newRef.id;
                    await newRef.set(dataToSave);
                    activePatient.id = newRef.id; 
                    
                    // Now that it has an ID, disable the UPID input box
                    document.getElementById('input-upid').disabled = true;
                }
                
                showToast("Patient record saved securely!");
            } catch(e) {
                console.error(e);
                showToast("Save Error: Ensure you are authorized.", true);
            } finally {
                btn.innerHTML = `<i class="ph-bold ph-floppy-disk text-lg"></i> <span class="hidden sm:inline">Save Data</span>`;
                btn.disabled = false;
            }
        }
