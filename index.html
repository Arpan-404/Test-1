function CustomTableEditor({data,setData}){

function addRow(){

let copy=[...data]

copy.push(Array(copy[0].length).fill(""))

setData(copy)

}

function addCol(){

let copy=data.map(r=>[...r,""])

setData(copy)

}

function update(r,c,val){

let copy=[...data]

copy[r][c]=val

setData(copy)

}

return(

<div>

<table className="w-full border mt-2">

<tbody>

{data.map((row,r)=>(

<tr key={r}>

{row.map((cell,c)=>(

<td key={c} className="border">

<div

contentEditable

className="tableCell"

data-placeholder="..."

onInput={(e)=>update(r,c,e.target.innerText)}

>

{cell}

</div>

</td>

))}

</tr>

))}

</tbody>

</table>

<div className="space-x-2 mt-2 noPrint">

<button onClick={addRow}
className="bg-blue-500 text-white px-2 py-1">

Add Row

</button>

<button onClick={addCol}
className="bg-green-500 text-white px-2 py-1">

</button>

</div>

</div>

)

}

function App(){

const[user,setUser]=React.useState(null)

const[patients,setPatients]=React.useState([])

const[selected,setSelected]=React.useState(null)

React.useEffect(()=>{

onAuthStateChanged(auth,(u)=>{

if(u){

setUser(u)

const ref=collection(
db,
`artifacts/github-physio-app/users/${u.uid}/patients`
)

onSnapshot(ref,(snap)=>{

let arr=[]

snap.forEach(d=>{

arr.push({id:d.id,...d.data()})

})

setPatients(arr)

})

}

})

},[])

function login(){

const provider=new GoogleAuthProvider()

signInWithPopup(auth,provider)

}

function newPatient(){

let id=String(patients.length+1)
.padStart(4,'0')

setSelected({

id:Date.now().toString(),
ip:id,
name:"New Patient"

})

}

if(!user){

return(

<div className="p-10">

<button
onClick={login}
className="bg-blue-600 text-white px-4 py-2">

Login with Google

</button>

</div>

)

}

return(

<div className="p-6">

{!selected &&(

<div>

<button
onClick={newPatient}
className="bg-green-600 text-white px-3 py-1 mb-3">

New Patient

</button>

<HomeView
patients={patients}
setSelected={setSelected}
/>

</div>

)}

{selected &&(

<PatientDetailView
patient={selected}
user={user}
/>

)}

</div>

)

}

ReactDOM.createRoot(
document.getElementById('root')
).render(<App/>)
