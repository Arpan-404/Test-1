<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Record - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Print Layout Rules */
        @page { size: A4; margin: 10mm; }
        body { background: #f4f7fb; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: sans-serif; }
        
        @media print {
            body { background-color: white !important; }
            .print-hidden { display: none !important; }
            .print-shadow-none { box-shadow: none !important; border: none !important; }
            .print-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .print-break-after-always { page-break-after: always; }
            .print-break-after-auto { page-break-after: auto; }
            thead.print-table-header { display: table-header-group; }
            table.main-print-table { page-break-inside: auto; width: 100%; }
            tr.main-print-row { page-break-inside: avoid; page-break-after: auto; }
        }

        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #1e3a8a;">
            <div class="native-loader"></div>
            <div style="font-weight: bold;">Generating Print Document...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // 1. PRIVATE DATABASE (Patient Records)
        const recordsConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            storageBucket: "patient-records-arpan.firebasestorage.app",
            messagingSenderId: "599041105903",
            appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a"
        };
        const appRecords = initializeApp(recordsConfig, "AppRecords");
        const authRecords = getAuth(appRecords);
        const dbRecords = getFirestore(appRecords);
        
        // 2. PUBLIC DATABASE (Exercises)
        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "clinic-bdf92.firebaseapp.com",
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };
        const appSite = initializeApp(siteConfig, "AppSite");
        const dbSite = getDatabase(appSite);

        // Read-Only Table Component (Scaled for Print)
        function ReadOnlyCustomTable({ table }) {
            let rows = table.rows || [];
            if (typeof rows === 'string') { try { rows = JSON.parse(rows); } catch(e) { rows = []; } }

            return (
                <div className="w-fit max-w-full bg-white mb-4 break-inside-avoid">
                    {table.title && <div className="font-bold text-[#1e40af] text-[16px] mb-1">{table.title}</div>}
                    <table className="w-auto min-w-[150px] text-left border-collapse table-auto border border-[#1e40af]">
                        <thead>
                            <tr>
                                {table.headers.map((h, i) => (
                                    <th key={i} className="border border-[#1e40af] p-1.5 bg-blue-50/30 font-bold text-[#1e40af] text-[12px]">{h}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {rows.map((row, rIdx) => (
                                <tr key={rIdx} className="break-inside-avoid">
                                    {row.map((cell, cIdx) => (
                                        <td key={cIdx} className="border border-[#1e40af] p-1.5 text-slate-900 text-[12px] align-top whitespace-pre-wrap">{cell}</td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function PrintApp() {
            const [patientData, setPatientData] = useState(null);
            const [exercises, setExercises] = useState([]);
            const [error, setError] = useState("");
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        const patientId = urlParams.get('id');
                        
                        if (!patientId) throw new Error("No Patient ID provided in URL.");

                        // 1. Authenticate anonymously
                        await signInAnonymously(authRecords);

                        // 2. Fetch Patient Data
                        const docRef = doc(dbRecords, 'artifacts', 'physiocare-tracker', 'public', 'data', 'patients', patientId);
                        const docSnap = await getDoc(docRef);
                        
                        if (!docSnap.exists()) throw new Error("Patient record not found.");
                        const pData = { id: docSnap.id, ...docSnap.data() };
                        setPatientData(pData);

                        // 3. Fetch Exercises
                        const exSnap = await get(ref(dbSite, 'site/exercises'));
                        let exArray = [];
                        if (exSnap.exists()) {
                            const data = exSnap.val();
                            if (Array.isArray(data)) exArray = data.filter(Boolean);
                            else exArray = Object.keys(data).map(key => ({ ...data[key], id: data[key].id || key }));
                        }
                        setExercises(exArray);
                        setIsReady(true);

                        // Auto-trigger print dialog after a brief delay to allow images to load
                        setTimeout(() => { window.print(); }, 1500);

                    } catch (err) {
                        setError(err.message);
                    }
                };
                loadData();
            }, []);

            if (error) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen text-center">
                        <i className="ph-fill ph-warning-circle text-5xl text-red-500 mb-2"></i>
                        <h2 className="text-xl font-bold text-navy">Document Error</h2>
                        <p className="text-slate-500">{error}</p>
                        <button onClick={() => window.close()} className="mt-4 bg-slate-200 px-4 py-2 rounded font-bold text-slate-700">Close Tab</button>
                    </div>
                );
            }

            if (!isReady) return null; // Let the native loader spin

            const prescribedExData = (patientData.prescribedExercises || []).map(id => exercises.find(e => e.id === id)).filter(Boolean);
            const formattedDate = patientData.date ? new Date(patientData.date).toLocaleDateString('en-GB') : '';

            return (
                <div className="w-full max-w-4xl mx-auto bg-white p-8 print:p-0">
                    
                    {/* Floating Print Button for Web UI */}
                    <div className="print-hidden fixed top-4 right-4 flex gap-2">
                        <button onClick={() => window.close()} className="bg-white border border-slate-300 text-slate-600 px-4 py-2 rounded shadow font-bold hover:bg-slate-50">Close</button>
                        <button onClick={() => window.print()} className="bg-azure text-white px-4 py-2 rounded shadow font-bold flex items-center gap-2 hover:bg-navy"><i className="ph-bold ph-printer"></i> Print Now</button>
                    </div>

                    <div className="bg-white text-[#1e40af] text-[16px] font-sans h-full w-full">
                        {/* Header */}
                        <div className="flex justify-between items-start pb-2 text-left">
                            <div>
                                <h1 className="text-[38px] font-bold italic tracking-wide text-[#1e40af]" style={{ textShadow: "0px 0px 1px #1e40af", lineHeight: "1" }}>Dr. Arpan Das (PT)</h1>
                                <p className="text-[16px] mt-2 font-bold text-[#1e40af]">BPT (KPC Medical College and Hospital)</p>
                                <p className="text-[16px] font-bold text-[#1e40af]">Consultant Physiotherapist</p>
                                <p className="text-[12px] font-bold text-slate-600 mt-1">Reg. No 202105633 (WBUHS)</p>
                            </div>
                            
                            <div className="flex flex-col items-center justify-center pt-2 px-6">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=${encodeURIComponent(window.location.origin + '/prescription#/' + patientData.id)}`} alt="QR Code" className="w-[70px] h-[70px]" />
                                <span className="text-[9px] font-bold mt-1 text-[#1e40af] text-center leading-tight">Scan for<br/>digital records</span>
                            </div>

                            <div className="text-right flex flex-col items-end text-[#1e40af] pt-1">
                                <div className="flex items-center gap-1.5 font-black text-2xl mb-6"><i className="ph-fill ph-phone-call text-[28px]"></i> +91 9641568109</div>
                                <div className="text-[16px] flex items-center gap-2 font-semibold"><span>Date:</span> <span className="border-b border-[#1e40af] w-28 text-center text-slate-800 font-bold pb-0.5">{formattedDate}</span></div>
                            </div>
                        </div>
                        
                        <div className="border-b border-[#1e40af] mb-1.5"></div>
                        
                        <table className="main-print-table">
                            <thead className="print-table-header">
                                <tr><td className="pb-4 pt-2">
                                    <div className="flex justify-between items-end pb-2 text-[16px] font-bold text-[#1e40af]">
                                        <div className="flex-1 flex items-end"><span className="whitespace-nowrap">Patient's name:</span> <span className="flex-1 ml-2 mr-4 px-2 text-slate-800 font-bold pb-0.5">{patientData.name}</span></div>
                                        <div className="w-24 flex items-end"><span className="whitespace-nowrap">Age:</span> <span className="flex-1 ml-2 mr-4 px-2 text-center text-slate-800 font-bold pb-0.5">{patientData.age}</span></div>
                                        <div className="w-36 flex items-end"><span className="whitespace-nowrap">Gender:</span> <span className="flex-1 ml-2 mr-4 px-2 text-center text-slate-800 font-bold pb-0.5">{patientData.gender}</span></div>
                                        <div className="w-32 flex items-end"><span className="whitespace-nowrap">UPID:</span> <span className="flex-1 ml-2 px-2 text-center text-slate-800 font-bold pb-0.5">{patientData.ipId}</span></div>
                                    </div>
                                    <div className="border-b border-[#1e40af]"></div>
                                </td></tr>
                            </thead>
                            <tbody>
                                {/* RX Notes */}
                                <tr className="main-print-row"><td className="pt-2 px-2 pb-4">
                                    {(patientData.chiefComplaints || patientData.history) && (
                                        <>
                                            {patientData.chiefComplaints && <div className="text-[#1e40af] mb-4"><span className="font-bold text-[20px]">Chief Complaint :-</span><p className="mt-1 ml-4 text-slate-900 text-[18px] whitespace-pre-wrap">{patientData.chiefComplaints}</p></div>}
                                            {patientData.history && <div className="text-[#1e40af]"><span className="font-bold text-[20px]">History :-</span><p className="mt-1 ml-4 text-slate-900 text-[18px] whitespace-pre-wrap">{patientData.history}</p></div>}
                                        </>
                                    )}
                                </td></tr>
                                
                                <tr className="main-print-row-allow-break"><td className="px-2 pb-6">
                                    <div className="text-[#1e40af]"><span className="font-bold text-[20px] block mb-2">Assessment :-</span><p className="mt-1 ml-4 text-slate-900 text-[18px] whitespace-pre-wrap">{patientData.assessmentNote || "\u00A0"}</p>
                                        {patientData.customTables?.filter(t => t.section === 'assessment').length > 0 && (<div className="flex flex-wrap items-start gap-4 mt-4 pl-4 pr-2">{patientData.customTables.filter(t => t.section === 'assessment').map(table => (<ReadOnlyCustomTable key={table.id} table={table} />))}</div>)}
                                    </div>
                                </td></tr>
                                
                                {patientData.diagnosis && (<tr className="main-print-row"><td className="px-2 pb-6"><div className="text-[#1e40af]"><span className="font-bold text-[20px]">Diagnosis:</span><span className="ml-2 text-slate-900 font-bold text-[19px]">{patientData.diagnosis}</span></div></td></tr>)}
                                
                                <tr className="main-print-row-allow-break"><td className="px-2 pb-6">
                                    <div className="text-[#1e40af]"><span className="font-bold text-[20px] block mb-2">Treatment Plan / Advice :-</span><p className="mt-1 ml-4 text-slate-900 text-[18px] whitespace-pre-wrap leading-relaxed">{patientData.treatmentNote || "\u00A0"}</p>
                                        {patientData.customTables?.filter(t => t.section === 'treatment').length > 0 && (<div className="flex flex-wrap items-start gap-4 mt-4 pl-4 pr-2">{patientData.customTables.filter(t => t.section === 'treatment').map(table => (<ReadOnlyCustomTable key={table.id} table={table} />))}</div>)}
                                    </div>
                                </td></tr>
                                
                                {patientData.customTables?.filter(t => t.section === 'reassessment').length > 0 && (<tr className="main-print-row"><td className="px-2 pb-6 text-[#1e40af]"><span className="font-bold text-[20px] block mb-2">Reassessment Data :-</span><div className="flex flex-wrap items-start gap-4 pl-4 pr-2">{patientData.customTables.filter(t => t.section === 'reassessment').map(table => (<ReadOnlyCustomTable key={table.id} table={table} />))}</div></td></tr>)}
                                
                                {/* REASSESSMENT TABLES - 10px FONT ADJUSTMENT */}
                                {patientData.reassessmentTables?.map((rtable) => (
                                    <tr key={rtable.id} className="main-print-row"><td className="px-2 pb-6 text-[#1e40af]">
                                        <span className="font-bold text-[20px] block mb-3">{rtable.title}</span>
                                        {rtable.trackedMetrics?.length > 0 ? (
                                            <div className="pl-4 pr-2 w-full">
                                                <table className="w-full table-auto border-collapse text-[10px] text-slate-900 border border-[#1e40af] print-break-inside-avoid">
                                                    <thead>
                                                        <tr>
                                                            <th className="p-1 text-left border border-[#1e40af] w-16 text-[#1e40af] font-bold">Date</th>
                                                            {rtable.trackedMetrics.map(metric => (
                                                                <th key={metric.id} className="p-0 border border-[#1e40af] text-[#1e40af] font-bold text-center align-top">
                                                                    <div className="flex flex-col h-full justify-between">
                                                                        <span className="leading-tight px-0.5 mb-1 pt-0.5 text-[10px]">{metric.title}</span>
                                                                        {metric.isBilateral && ( <div className="flex w-full border-t border-[#1e40af] text-[9px] text-[#1e40af] mt-auto"><div className="flex-1 border-r border-[#1e40af] font-bold">R</div><div className="flex-1 font-bold">L</div></div> )}
                                                                        {metric.type === 'Custom 2-Column' && ( <div className="flex w-full border-t border-[#1e40af] text-[9px] text-[#1e40af] mt-auto"><div className="flex-1 border-r border-[#1e40af] font-bold">{metric.col1}</div><div className="flex-1 font-bold">{metric.col2}</div></div> )}
                                                                    </div>
                                                                </th>
                                                            ))}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {rtable.records?.map(record => (
                                                            <tr key={record.id} className="print-break-inside-avoid">
                                                                <td className="p-1 border border-[#1e40af] whitespace-nowrap align-top font-bold text-[10px]">{record.date ? new Date(record.date).toLocaleDateString('en-GB') : ''}</td>
                                                                {rtable.trackedMetrics.map(metric => { 
                                                                    const cellValue = record.values[metric.id]; 
                                                                    if (metric.isBilateral) return ( <td key={metric.id} className="p-0 border border-[#1e40af] align-top"><div className="flex h-full"><div className="flex-1 border-r border-[#1e40af] flex items-center justify-center p-0.5 leading-tight">{cellValue?.r || '-'}</div><div className="flex-1 flex items-center justify-center p-0.5 leading-tight">{cellValue?.l || '-'}</div></div></td> ); 
                                                                    if (metric.type === 'Custom 2-Column') return (<td key={metric.id} className="p-0 border border-[#1e40af] align-top"><div className="flex h-full"><div className="flex-1 border-r border-[#1e40af] flex items-center justify-center p-0.5 leading-tight">{cellValue?.c1 || '-'}</div><div className="flex-1 flex items-center justify-center p-0.5 leading-tight">{cellValue?.c2 || '-'}</div></div></td>); 
                                                                    return ( <td key={metric.id} className="p-1 border border-[#1e40af] text-center align-middle leading-tight">{cellValue || '-'}</td> ); 
                                                                })}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ) : null }
                                    </td></tr>
                                ))}

                                {/* EXERCISES */}
                                {prescribedExData.length > 0 && (
                                    <>
                                        <tr className="print-break-after-always"><td></td></tr>
                                        <tr className="main-print-row-allow-break"><td className="pt-8 px-0 pb-4">
                                            <div className="text-[#1e40af] mb-6 border-b-2 border-[#1e40af] inline-block pr-6"><span className="font-bold text-[24px]">Prescribed Exercises</span></div>
                                            <div className="flex-1 w-full">
                                                <div className="grid grid-cols-4 gap-x-4 gap-y-10 w-full">
                                                    {prescribedExData.map((ex) => {
                                                        const params = patientData.exerciseParams?.[ex.id] || {};
                                                        return (
                                                            <div key={ex.id} className="flex flex-col items-start break-inside-avoid text-left w-full">
                                                                <div className="h-32 w-full flex items-center justify-center mb-2">
                                                                    <img src={ex.imageUrl} alt={ex.name} className="max-w-full max-h-full object-contain mix-blend-multiply" />
                                                                </div>
                                                                <div className="w-full text-left">
                                                                    <h4 className="font-bold text-slate-800 text-[12px] mb-1 leading-tight">{ex.name}</h4>
                                                                    <div className="flex items-center gap-2 text-[10px] font-bold text-[#1e3a8a] mb-1">
                                                                        {params.reps && <span>Reps: <span className="text-black">{params.reps}</span></span>}
                                                                        {params.sets && <span>Sets: <span className="text-black">{params.sets}</span></span>}
                                                                        {params.freq && <span>Freq: <span className="text-black">{params.freq}</span></span>}
                                                                    </div>
                                                                    {params.note && <p className="text-[10px] text-slate-600 leading-tight font-medium mt-0.5">{params.note}</p>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </td></tr>
                                    </>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrintApp />);
    </script>
</body>
</html>
