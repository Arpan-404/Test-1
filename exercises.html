<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehabilitation Exercises - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f8fafc', surface: '#ffffff' },
            boxShadow: { 'soft': '0 4px 20px rgba(15, 23, 42, 0.05)', 'float': '0 10px 30px rgba(15, 23, 42, 0.08)' }
          }
        }
      }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #0f172a; overflow-x: hidden; padding-bottom: 4rem;}
        
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }

        /* Rich Text Formatting for Physiopedia Style */
        .wiki-content { font-size: 1.05rem; line-height: 1.7; color: #334155; }
        .wiki-content h2 { font-size: 1.5rem; font-weight: 800; color: #1e3a8a; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
        .wiki-content h3 { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .wiki-content p { margin-bottom: 1.25rem; }
        .wiki-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .wiki-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .wiki-content a { color: #1d4ed8; text-decoration: underline; }
        .wiki-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Smooth, Solid Sidebar Menu */
        .mobile-menu { 
            position: fixed; top: 0; right: 0; width: 280px; height: 100vh; 
            background: #ffffff; z-index: 1001; 
            transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 1rem 0 2rem; box-shadow: -5px 0 25px rgba(15, 23, 42, 0.1); 
            overflow-y: auto; border-left: 1px solid #e2e8f0;
        }
        .mobile-menu.active { transform: translateX(0); } 
        .mobile-menu ul { list-style: none; }
        .mobile-menu ul li a.main-nav-link { display: flex; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid #f8fafc; font-weight: 600; font-size: 1rem; color: #0f172a; transition: color 0.2s;}
        .mobile-menu ul li a.main-nav-link:hover { color: #1d4ed8; }
        
        .close-menu { background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: #475569; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .close-menu:hover { background: #e2e8f0; color: #0f172a; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); z-index: 999; visibility: hidden; opacity: 0; transition: opacity 0.3s, visibility 0.3s;}
        .overlay.active { visibility: visible; opacity: 1; }

        /* Masonry Utilities */
        .masonry-col { display: flex; flex-direction: column; gap: 1rem; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #1e3a8a;">
            <div class="native-loader"></div>
            <div style="font-weight: bold;">Loading Exercise Library...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js';

        // --- FIREBASE CONFIG (Unified Database) ---
        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "clinic-bdf92.firebaseapp.com",
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };
        const appSite = initializeApp(siteConfig, "AppSite");
        const dbSite = getDatabase(appSite);

        const slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

        function App() {
            const [siteData, setSiteData] = useState({ hero: {}, exercises: [] });
            const [isLoading, setIsLoading] = useState(true);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeHash, setActiveHash] = useState(window.location.hash || '');
            const [colCount, setColCount] = useState(2);

            // --- RESPONSIVE MASONRY COLUMNS ---
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 1024) setColCount(4);
                    else if (window.innerWidth >= 768) setColCount(3);
                    else setColCount(2);
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // --- DATA FETCHING ---
            useEffect(() => {
                const unsubSite = onValue(ref(dbSite, 'site'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setSiteData({
                            hero: data.hero || {},
                            exercises: data.exercises || [] 
                        });
                    }
                    setIsLoading(false);
                });
                return () => unsubSite();
            }, []);

            // --- ROUTING ---
            useEffect(() => {
                const handleHashChange = () => {
                    setActiveHash(window.location.hash);
                    window.scrollTo(0, 0); // Scroll to top on navigation
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            // --- YOUTUBE EXTRACTOR ---
            const getYoutubeEmbedUrl = (url) => {
                if (!url) return null;
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null;
            };

            // --- SEARCH HANDLER ---
            const handleSearchChange = (e) => {
                setSearchQuery(e.target.value);
                // If user is currently looking at a specific exercise and starts typing, 
                // instantly take them back to the main library to show the filtered results.
                if (window.location.hash && window.location.hash !== '') {
                    window.location.hash = '';
                }
            };

            // --- RENDERERS ---
            if (isLoading) return null;

            const renderHeader = () => (
                <header className="fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-200 z-40 flex items-center justify-between px-4 max-w-6xl mx-auto w-full">
                    <a href="/" className="flex items-center shrink-0">
                        {siteData.hero.logoUrl ? 
                            <img src={siteData.hero.logoUrl} alt="Logo" className="w-10 h-10 rounded-xl object-contain" /> : 
                            <div className="w-10 h-10 rounded-xl bg-azure text-white flex items-center justify-center font-black text-xl shadow-sm">T</div>
                        }
                    </a>
                    
                    {/* Unified Search Bar for Mobile and Desktop */}
                    <div className="flex-1 mx-3 sm:mx-6 relative">
                        <i className="ph-bold ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
                        <input 
                            type="text" 
                            value={searchQuery} 
                            onChange={handleSearchChange} 
                            placeholder="Search exercises..." 
                            className="w-full bg-slate-50 border border-slate-200 rounded-full py-2 pl-9 pr-4 outline-none focus:border-azure focus:ring-1 focus:ring-azure text-sm transition" 
                        />
                    </div>

                    <div className="flex items-center shrink-0">
                        <button onClick={() => setIsMenuOpen(true)} className="p-1.5 text-slate-500 hover:bg-slate-100 hover:text-navy rounded-full transition">
                            <i className="ph-bold ph-list text-2xl"></i>
                        </button>
                    </div>
                </header>
            );

            // Menu identical to index.html (Solid background)
            const renderMenu = () => (
                <>
                    <div className={`overlay ${isMenuOpen ? 'active' : ''}`} onClick={() => setIsMenuOpen(false)}></div>
                    <aside className={`mobile-menu ${isMenuOpen ? 'active' : ''}`}>
                        <div className="flex justify-between items-center px-6 pb-4 border-b border-slate-200">
                            <h2 className="text-lg font-black text-navy m-0">Menu</h2>
                            <button className="close-menu" onClick={() => setIsMenuOpen(false)}><i className="ph-bold ph-x"></i></button>
                        </div>
                        <ul>
                            <li><a href="/" className="main-nav-link"><i className="ph-bold ph-house" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Home</a></li>
                            <li><a href="/services" className="main-nav-link"><i className="ph-bold ph-first-aid" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Clinical Services</a></li>
                            <li><a href="/doctors" className="main-nav-link"><i className="ph-bold ph-stethoscope" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Clinical Team</a></li>
                            <li><a href="/products" className="main-nav-link"><i className="ph-bold ph-shopping-bag" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Wellness Products</a></li>
                            <li><a href="/articles" className="main-nav-link"><i className="ph-bold ph-article" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Health Articles</a></li>
                            <li><a href="/exercises" className="main-nav-link" style={{color: '#1d4ed8', backgroundColor: '#eff6ff'}}><i className="ph-bold ph-person-simple-walk" style={{marginRight: '12px', fontSize: '1.3rem', color: '#1d4ed8'}}></i> Rehabilitation Exercises</a></li>
                            <li><a href="/prescription" className="main-nav-link"><i className="ph-bold ph-folder-open" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Patient Records</a></li>
                            
                            <li style={{padding: '2.5rem 1.5rem 0.5rem', borderBottom: 'none', display: 'flex', flexDirection: 'column', gap: '8px'}}>
                                <div style={{fontSize: '10px', fontWeight: '700', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '4px'}}>Internal Links</div>
                                <a href="/doctor-dashboard" style={{color: '#64748b', fontSize: '0.85rem', fontWeight: '500', display: 'inline-flex', alignItems: 'center', transition: 'color 0.2s', textDecoration: 'none'}}>
                                    <i className="ph-fill ph-activity" style={{marginRight: '6px', fontSize: '1rem'}}></i> Staff Portal
                                </a>
                                <a href="/admin" style={{color: '#64748b', fontSize: '0.85rem', fontWeight: '500', display: 'inline-flex', alignItems: 'center', transition: 'color 0.2s', textDecoration: 'none'}}>
                                    <i className="ph-fill ph-shield-check" style={{marginRight: '6px', fontSize: '1rem'}}></i> Admin Panel
                                </a>
                            </li>
                        </ul>
                    </aside>
                </>
            );

            // Determine what to show based on hash
            let content;
            const routePrefix = '#/';
            
            if (activeHash && activeHash.startsWith(routePrefix)) {
                // --- PHYSIOPEDIA DETAIL VIEW ---
                const slug = activeHash.replace(routePrefix, '');
                const exercise = siteData.exercises.find(ex => slugify(ex.name) === slug);
                
                if (exercise) {
                    const embedUrl = getYoutubeEmbedUrl(exercise.videoUrl);
                    
                    content = (
                        <div className="max-w-4xl mx-auto px-4 pt-24 pb-12 animate-in fade-in">
                            <article className="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden">
                                
                                {/* Always Show Main Image Header */}
                                {exercise.imageUrl && (
                                    <div className="w-full bg-slate-50 border-b border-slate-200 relative p-4">
                                        <div className="h-64 sm:h-96 w-full flex items-center justify-center">
                                            <img src={exercise.imageUrl} alt={exercise.name} className="max-w-full max-h-full object-contain mix-blend-multiply" />
                                        </div>
                                    </div>
                                )}

                                {/* Article Body */}
                                <div className="p-6 sm:p-10">
                                    <h1 className="text-3xl sm:text-4xl font-black text-navy mb-6 tracking-tight leading-tight border-b-2 border-azure pb-4 inline-block">{exercise.name}</h1>
                                    
                                    <div className="wiki-content" dangerouslySetInnerHTML={{ __html: exercise.description || '<p>No description provided.</p>' }} />
                                    
                                    {/* Separate Video Section */}
                                    {(embedUrl || exercise.videoUrl) && (
                                        <div className="mt-10 pt-8 border-t border-slate-200">
                                            <h3 className="text-xl font-bold text-navy mb-4 flex items-center gap-2">
                                                <i className="ph-fill ph-video-camera text-azure"></i> Video Demonstration
                                            </h3>
                                            {embedUrl ? (
                                                <div className="aspect-video w-full rounded-xl overflow-hidden shadow-sm border border-slate-200">
                                                    <iframe src={embedUrl} className="w-full h-full" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                                                </div>
                                            ) : exercise.videoUrl ? (
                                                <div className="aspect-video w-full rounded-xl overflow-hidden shadow-sm border border-slate-200">
                                                    <video src={exercise.videoUrl} className="w-full h-full" controls poster={exercise.imageUrl}></video>
                                                </div>
                                            ) : null}
                                        </div>
                                    )}
                                </div>
                            </article>
                        </div>
                    );
                } else {
                    content = <div className="pt-32 text-center text-slate-500 font-bold">Exercise not found.</div>;
                }
            } else {
                // --- LIBRARY GRID VIEW (MASONRY) ---
                const filteredExercises = siteData.exercises.filter(ex => 
                    (ex.name || "").toLowerCase().includes(searchQuery.toLowerCase()) || 
                    (ex.tags || []).some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))
                );

                // Build Masonry Columns
                const masonryColumns = Array.from({ length: colCount }, () => []);
                filteredExercises.forEach((ex, index) => {
                    masonryColumns[index % colCount].push(ex);
                });

                content = (
                    <div className="max-w-6xl mx-auto px-4 pt-24 pb-12 animate-in fade-in">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl sm:text-4xl font-black text-navy mb-4">Rehabilitation Exercises</h1>
                        </div>

                        {filteredExercises.length === 0 ? (
                            <div className="text-center text-slate-400 py-10 font-medium bg-white rounded-2xl border border-slate-200">No exercises found matching your search.</div>
                        ) : (
                            <div className="flex gap-4 items-start w-full">
                                {masonryColumns.map((column, colIndex) => (
                                    <div key={colIndex} className="masonry-col flex-1">
                                        {column.map(ex => (
                                            <a key={ex.id} href={`#/${slugify(ex.name)}`} className="w-full bg-white rounded-2xl shadow-soft border border-slate-100 overflow-hidden cursor-pointer group hover:-translate-y-1 hover:shadow-float transition-all duration-300 flex flex-col">
                                                
                                                <div className="relative w-full overflow-hidden bg-slate-50 border-b border-slate-100">
                                                    {ex.imageUrl ? (
                                                        <img src={ex.imageUrl} alt={ex.name || 'Exercise'} className="w-full h-auto block object-cover mix-blend-multiply" />
                                                    ) : (
                                                        <div className="w-full aspect-square flex items-center justify-center text-slate-300">
                                                            <i className="ph-bold ph-person-simple-walk text-5xl"></i>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="p-4 bg-white flex flex-col text-left">
                                                    <h3 className="font-bold text-[15px] text-navy leading-tight line-clamp-2 group-hover:text-azure transition">{ex.name || 'Unnamed Exercise'}</h3>
                                                </div>
                                            </a>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <>
                    {renderHeader()}
                    {renderMenu()}
                    {content}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
