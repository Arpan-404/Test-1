<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Library</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @media print {
            body { background-color: white !important; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { margin: 1cm; }
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f4f7fb] text-[15px] font-sans text-[#0f172a]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, get, push, set, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // =====================================================================
        // UNIFIED FIREBASE CONFIGURATION
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            storageBucket: "patient-records-arpan.firebasestorage.app",
            messagingSenderId: "599041105903",
            appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a",
            databaseURL: "https://patient-records-arpan-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        setPersistence(auth, browserLocalPersistence).catch(console.error);
        const googleProvider = new GoogleAuthProvider();

        const { useState, useEffect, useMemo } = React;

        // =====================================================================
        // CLOUDINARY SETUP
        // =====================================================================
        const CLOUDINARY_CLOUD_NAME = "dyuni0dx5"; 
        const CLOUDINARY_UPLOAD_PRESET = "Physio_uploads"; 

        const Icons = {
            Search: ({className="w-4 h-4 md:w-5 md:h-5 text-slate-400"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            ArrowLeft: ({className="h-5 w-5"}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            Stethoscope: ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>,
            Database: ({className="w-4 h-4 md:w-5 md:h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Printer: ({className="h-4 w-4 md:h-5 md:w-5 mr-2"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect width="12" height="8" x="6" y="14"/></svg>,
            User: ({className="w-6 h-6 text-[#0f172a] hover:text-[#1d4ed8] transition"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            UserActive: ({className="w-6 h-6 text-[#1d4ed8]"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Phone: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 text-green-500"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Error: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 text-red-100"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        };

        const slugify = (text) => (text || '').toString().toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

        function App() {
            const [user, setUser] = useState({ role: 'guest' }); 
            const [currentView, setCurrentView] = useState('exercise-list'); 
            const [loginTab, setLoginTab] = useState('patient'); 
            const [loginName, setLoginName] = useState('');
            const [loginPhone, setLoginPhone] = useState('');
            const [isMenuOpen, setIsMenuOpen] = useState(false); 
            const [colCount, setColCount] = useState(2);
            
            const [exercises, setExercises] = useState([]);
            const [groups, setGroups] = useState([]); 
            const [isLoading, setIsLoading] = useState(true);
            const [isUploadingImage, setIsUploadingImage] = useState(false);
            const [isUploadingVideo, setIsUploadingVideo] = useState(false);
            
            const [toastMessage, setToastMessage] = useState(null);
            const [toastType, setToastType] = useState('success'); 
            
            const [selectedExercise, setSelectedExercise] = useState(null);
            const [selectedGroup, setSelectedGroup] = useState(null); 
            
            const [searchQuery, setSearchQuery] = useState("");
            const [doctorSearchQuery, setDoctorSearchQuery] = useState("");
            const [databaseSearchQuery, setDatabaseSearchQuery] = useState("");

            const [editingId, setEditingId] = useState(null);
            const [newExercise, setNewExercise] = useState({ name: '', description: '', imageUrl: '', videoUrl: '', tags: '' });
            
            const [editingGroupId, setEditingGroupId] = useState(null);
            const [newGroup, setNewGroup] = useState({ name: '', description: '', imageUrl: '', exerciseIds: [] });
            
            const [prescriptionData, setPrescriptionData] = useState({ patientName: '', age: '', gender: '', notes: '', selectedExerciseIds: [], exerciseParams: {} });
            const [adminTab, setAdminTab] = useState('exercises'); 

            const showToast = (message, type = 'success') => { setToastMessage(message); setToastType(type); setTimeout(() => setToastMessage(null), 4500); };

            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 1024) setColCount(4);
                    else if (window.innerWidth >= 768) setColCount(3);
                    else setColCount(2);
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleDeepLink = (exercisesData, groupsData) => {
                const path = window.location.pathname;
                if (path.startsWith('/exercises/')) {
                    const parts = path.split('/');
                    const endpoint = decodeURIComponent(parts[2] || '');
                    
                    if (endpoint === 'dashboard') {
                        setCurrentView('login'); setLoginTab('doctor');
                    } else if (endpoint === 'group') {
                        const slug = decodeURIComponent(parts[3] || '');
                        const foundGroup = groupsData.find(g => slugify(g.name) === slug);
                        if (foundGroup) {
                            setSelectedGroup(foundGroup);
                            setCurrentView('group-detail');
                        }
                    } else if (endpoint !== 'login' && endpoint !== '') {
                        setLoginName(endpoint);
                        setUser({ role: 'patient', name: endpoint, phone: 'Verified' });
                        setCurrentView('exercise-list');
                    }
                } else if (path.startsWith('/exercise/')) {
                    const slug = decodeURIComponent(path.split('/')[2] || '');
                    const foundEx = exercisesData.find(e => slugify(e.name) === slug);
                    if (foundEx) {
                        setSelectedExercise(foundEx);
                        setCurrentView('exercise-detail');
                    }
                }
            };

            const fetchFirebaseData = async () => {
                try {
                    setIsLoading(true);
                    const [exSnap, grpSnap] = await Promise.all([ get(ref(db, 'exercises')), get(ref(db, 'exerciseGroups')) ]);
                    
                    let exData = [];
                    if (exSnap.exists()) {
                        const data = exSnap.val();
                        exData = Object.keys(data).map(key => ({ ...data[key], id: key })).reverse();
                        setExercises(exData);
                    } else { setExercises([]); }
                    
                    let grpData = [];
                    if (grpSnap.exists()) {
                        const data = grpSnap.val();
                        grpData = Object.keys(data).map(key => ({ ...data[key], id: key }));
                        setGroups(grpData);
                    } else { setGroups([]); }
                    
                    handleDeepLink(exData, grpData);

                } catch (error) { 
                    console.error("Firebase Read Error:", error);
                } finally { 
                    setIsLoading(false); 
                }
            };

            useEffect(() => {
                fetchFirebaseData();
                const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
                    if (firebaseUser) {
                        setUser({ role: 'doctor', name: firebaseUser.displayName, email: firebaseUser.email });
                        setCurrentView(prev => { 
                            if (prev === 'login' || prev === 'exercise-list') {
                                window.history.pushState({}, '', '/exercises/dashboard');
                                return 'doctor-dashboard'; 
                            }
                            return prev; 
                        });
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                if (user.role === 'doctor') { try { await signOut(auth); } catch (error) {} }
                setUser({role: 'guest'}); setCurrentView('exercise-list'); showToast("Logged out"); window.history.pushState({}, '', '/exercises');
            };

            const handlePatientLogin = (e) => {
                e.preventDefault();
                if (loginPhone.length >= 10) {
                    setUser({ role: 'patient', phone: loginPhone, name: loginName });
                    setCurrentView('exercise-list'); showToast("Logged in as Patient");
                    window.history.pushState({}, '', '/exercises/' + encodeURIComponent(loginName.trim().toLowerCase().replace(/\s+/g, '-')));
                } else { showToast("Please enter a valid mobile number.", 'error'); }
            };

            const handleDoctorGoogleLogin = async () => {
                try { await signInWithPopup(auth, googleProvider); showToast("Welcome to the Doctor Dashboard"); } 
                catch (error) { showToast("Google login failed.", 'error'); }
            };

            const uploadFileToCloudinary = async (file, type = 'image') => {
                const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                const endpoint = type === 'video' ? 'video/upload' : 'image/upload';
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${endpoint}`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.secure_url) return data.secure_url; else throw new Error("Upload Failed");
                } catch (err) { showToast(`Cloudinary Error: ${err.message}`, 'error'); return null; }
            };

            const handleImageUpload = async (e, isGroup = false) => { 
                const file = e.target.files[0]; 
                if (file) { 
                    setIsUploadingImage(true); 
                    const secureUrl = await uploadFileToCloudinary(file, 'image'); 
                    if(secureUrl) {
                        if(isGroup === true) setNewGroup(prev => ({...prev, imageUrl: secureUrl}));
                        else setNewExercise(prev => ({ ...prev, imageUrl: secureUrl })); 
                    }
                    setIsUploadingImage(false); 
                } 
            };

            const handleVideoUpload = async (e) => { 
                const file = e.target.files[0]; 
                if (file) { 
                    setIsUploadingVideo(true); 
                    const secureUrl = await uploadFileToCloudinary(file, 'video'); 
                    if(secureUrl) {
                        setNewExercise(prev => ({ ...prev, videoUrl: secureUrl })); 
                    }
                    setIsUploadingVideo(false); 
                } 
            };

            // --- EXERCISE CRUD ---
            const handleAddOrUpdateExercise = async (e) => {
                e.preventDefault();
                if (!auth.currentUser) { showToast("Error: Must be logged in.", 'error'); return; }
                const tagsArray = typeof newExercise.tags === 'string' ? newExercise.tags.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : newExercise.tags;
                const exerciseData = { name: newExercise.name, description: newExercise.description, imageUrl: newExercise.imageUrl, videoUrl: newExercise.videoUrl, tags: tagsArray };
                setIsLoading(true);
                try {
                    if (editingId) { await set(ref(db, 'exercises/' + editingId), exerciseData); showToast("Exercise updated"); } 
                    else { await set(push(ref(db, 'exercises')), exerciseData); showToast("Exercise added"); }
                    setEditingId(null); setNewExercise({ name: '', description: '', imageUrl: '', videoUrl: '', tags: '' }); await fetchFirebaseData();
                } catch (error) { showToast("Failed to save.", 'error'); } finally { setIsLoading(false); }
            };

            const handleDeleteClick = async (id) => {
                if (window.confirm("Delete this exercise permanently?")) {
                    setIsLoading(true);
                    try { 
                        await remove(ref(db, 'exercises/' + id)); 
                        setPrescriptionData(prev => {
                            const newIds = (prev.selectedExerciseIds || []).filter(eId => eId !== id);
                            const newParams = { ...(prev.exerciseParams || {}) }; 
                            delete newParams[id];
                            return { ...prev, selectedExerciseIds: newIds, exerciseParams: newParams };
                        });
                        await fetchFirebaseData(); showToast("Exercise deleted"); 
                    } 
                    catch (error) { showToast("Failed to delete.", 'error'); } finally { setIsLoading(false); }
                }
            };
            const editEx = (ex) => { setEditingId(ex.id); setNewExercise({ name: ex.name, description: ex.description, imageUrl: ex.imageUrl, videoUrl: ex.videoUrl || '', tags: ex.tags ? ex.tags.join(', ') : '' }); setCurrentView('database-management'); setAdminTab('exercises'); };

            // --- GROUP CRUD ---
            const toggleGroupExercise = (exId) => {
                setNewGroup(prev => {
                    const ids = prev.exerciseIds || [];
                    return { ...prev, exerciseIds: ids.includes(exId) ? ids.filter(id => id !== exId) : [...ids, exId] };
                });
            };

            const handleAddOrUpdateGroup = async (e) => {
                e.preventDefault();
                if (!auth.currentUser) return;
                const groupData = { name: newGroup.name, description: newGroup.description, imageUrl: newGroup.imageUrl, exerciseIds: newGroup.exerciseIds || [] };
                setIsLoading(true);
                try {
                    if (editingGroupId) { await set(ref(db, 'exerciseGroups/' + editingGroupId), groupData); showToast("Group updated"); } 
                    else { await set(push(ref(db, 'exerciseGroups')), groupData); showToast("Group created"); }
                    setEditingGroupId(null); setNewGroup({ name: '', description: '', imageUrl: '', exerciseIds: [] }); await fetchFirebaseData();
                } catch (error) { showToast("Failed to save group.", 'error'); } finally { setIsLoading(false); }
            };
            
            const handleDeleteGroup = async (id) => {
                if(window.confirm("Delete this Group?")) {
                    setIsLoading(true);
                    try { await remove(ref(db, 'exerciseGroups/' + id)); await fetchFirebaseData(); showToast("Group deleted"); } catch (e) {} finally { setIsLoading(false); }
                }
            }
            const editGroup = (g) => { setEditingGroupId(g.id); setNewGroup({ name: g.name, description: g.description, imageUrl: g.imageUrl, exerciseIds: g.exerciseIds || [] }); setAdminTab('groups'); setCurrentView('database-management'); }

            const togglePrescriptionExercise = (id) => {
                setPrescriptionData(prev => {
                    const isSelected = (prev.selectedExerciseIds || []).includes(id); 
                    let newIds = [...(prev.selectedExerciseIds || [])]; 
                    let newParams = { ...(prev.exerciseParams || {}) };
                    if (isSelected) { newIds = newIds.filter(eId => eId !== id); delete newParams[id]; } 
                    else { newIds.push(id); newParams[id] = { reps: '10', sets: '3', freq: '2x/Day', note: '' }; }
                    return { ...prev, selectedExerciseIds: newIds, exerciseParams: newParams };
                });
            };
            const handleParamChange = (id, field, value) => { setPrescriptionData(prev => ({ ...prev, exerciseParams: { ...(prev.exerciseParams||{}), [id]: { ...(prev.exerciseParams||{})[id], [field]: value } } })); };

            // Filtering
            const filteredPatientExercises = useMemo(() => exercises.filter(ex => (ex.name || "").toLowerCase().includes(searchQuery.toLowerCase()) || (Array.isArray(ex.tags) && ex.tags.some(tag => tag.includes(searchQuery.toLowerCase())))), [exercises, searchQuery]);
            const filteredDatabaseItems = adminTab === 'exercises' ? exercises.filter(ex => (ex.name || "").toLowerCase().includes(databaseSearchQuery.toLowerCase())) : groups.filter(g => (g.name || "").toLowerCase().includes(databaseSearchQuery.toLowerCase()));

            // --- VIEWS ---

            const renderHeader = () => (
                <header className="bg-white/95 backdrop-blur-md px-4 shadow-[0_2px_10px_rgba(0,0,0,0.03)] flex items-center justify-between sticky top-0 z-50 print:hidden h-[60px]">
                    <div className="flex items-center flex-shrink-0">
                        <div className="cursor-pointer flex items-center" onClick={() => { setCurrentView('exercise-list'); window.history.pushState({}, '', '/exercises'); }}>
                            <img src="/favicon.png" alt="Logo" className="w-[36px] h-[36px] object-cover rounded-[10px]" />
                        </div>
                    </div>
                    {(currentView === 'exercise-list' || currentView === 'exercise-detail' || currentView === 'group-detail') && (
                        <div className="flex-grow flex justify-center mx-2">
                            <div className="relative w-full max-w-[220px]">
                                <Icons.Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 w-4 h-4" />
                                <input type="text" placeholder="Search library..." value={searchQuery} onChange={(e) => {setSearchQuery(e.target.value); setCurrentView('exercise-list'); window.history.pushState({}, '', '/exercises');}} className="w-full bg-[#f1f5f9] border-none rounded-full py-2 pl-9 pr-4 focus:outline-none focus:ring-2 focus:ring-[#dbeafe] text-[0.9rem] text-[#0f172a] h-[36px]" />
                            </div>
                        </div>
                    )}
                    <div className="flex-shrink-0 flex items-center gap-[15px]">
                        <button onClick={handleUserIconClick} className="w-[36px] h-[36px] flex items-center justify-center cursor-pointer border-none bg-transparent" title={user.role === 'guest' ? 'Login' : 'Dashboard / Profile'}>{user.role === 'guest' ? <Icons.User className="w-[20px] h-[20px]"/> : <Icons.UserActive className="w-[20px] h-[20px]" />}</button>
                        <button onClick={() => setIsMenuOpen(true)} className="flex flex-col justify-between w-[24px] h-[18px] cursor-pointer bg-transparent border-none p-0" title="Menu"><span className="block w-full h-[2px] bg-[#0f172a] rounded-[2px]"></span><span className="block w-full h-[2px] bg-[#0f172a] rounded-[2px]"></span><span className="block w-full h-[2px] bg-[#0f172a] rounded-[2px]"></span></button>
                    </div>
                </header>
            );

            const renderLoginView = () => (
                <div className="min-h-screen bg-[#f8faff] flex flex-col items-center justify-center p-4 relative">
                    <button onClick={() => setLoginTab(loginTab === 'patient' ? 'doctor' : 'patient')} className="absolute top-4 right-4 flex items-center gap-1.5 bg-white border border-slate-200 text-[#1e3a8a] px-3 py-1.5 rounded-full text-xs font-bold shadow-sm hover:bg-slate-50 transition-colors">
                        {loginTab === 'patient' ? <><Icons.Stethoscope className="w-4 h-4 text-blue-600"/> Staff</> : <><Icons.User className="w-4 h-4 text-blue-600"/> Patient</>}
                    </button>

                                    <h3 className="text-base md:text-lg font-bold text-slate-800 mb-3">{editingGroupId ? 'Edit Group' : 'Create New Group'}</h3>
                                    <form onSubmit={handleAddOrUpdateGroup} className="space-y-3">
                                        <div><label className="text-xs font-bold text-slate-500 mb-1 block">Group Title (e.g. Core Protocols)</label><input required type="text" value={newGroup.name} onChange={e => setNewGroup({...newGroup, name: e.target.value})} className="w-full text-sm border border-slate-200 rounded-md p-2 outline-none focus:border-blue-500" /></div>
                                        <div><label className="text-xs font-bold text-slate-500 mb-1 block">Description</label><textarea required value={newGroup.description} onChange={e => setNewGroup({...newGroup, description: e.target.value})} className="w-full text-sm border border-slate-200 rounded-md p-2 outline-none focus:border-blue-500" rows="2" /></div>
                                        <div className="p-3 bg-slate-50 border border-slate-100 rounded-lg space-y-1.5"><label className="text-[10px] font-bold text-slate-500 uppercase">Anatomy/Group Image</label><input type="file" accept="image/*" onChange={(e)=>handleImageUpload(e,true)} className="w-full text-xs" /><input type="url" value={newGroup.imageUrl} onChange={e => setNewGroup({...newGroup, imageUrl: e.target.value})} className="w-full text-xs border border-slate-200 rounded p-1.5 mt-2" />{newGroup.imageUrl && <img src={newGroup.imageUrl} className="h-10 w-10 object-contain rounded mt-1 bg-white border border-slate-200" />}</div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 mb-1 block">Select Exercises</label>
                                            <div className="h-[150px] overflow-y-auto border border-slate-200 rounded p-2 bg-slate-50 space-y-1">
                                                {exercises.map(ex => (
                                                    <label key={ex.id} className="flex items-center text-xs p-1 hover:bg-slate-200 rounded cursor-pointer">
                                                        <input type="checkbox" checked={(newGroup.exerciseIds||[]).includes(ex.id)} onChange={()=>toggleGroupExercise(ex.id)} className="mr-2" /> {ex.name}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex space-x-2 mt-2"><button type="submit" disabled={isLoading||isUploadingImage} className="flex-1 bg-blue-700 text-white rounded-md py-2.5 text-sm font-bold shadow-sm">{editingGroupId ? "Update Group" : "Create Group"}</button>{editingGroupId && <button type="button" onClick={()=>{setEditingGroupId(null); setNewGroup({name:'',description:'',imageUrl:'',exerciseIds:[]});}} className="px-4 bg-slate-200 text-slate-700 rounded-md font-bold">Cancel</button>}</div>
                                    </form>
                                </>
                            )}
                        </div>

                        <div className="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[500px] lg:h-auto">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="text-base md:text-lg font-bold text-slate-800">Existing {adminTab === 'exercises' ? 'Exercises' : 'Groups'}</h3>
                            </div>
                            <div className="relative mb-3"><Icons.Search className="absolute left-2.5 top-2 text-slate-400 w-4 h-4" /><input type="text" placeholder="Search..." value={databaseSearchQuery} onChange={(e) => setDatabaseSearchQuery(e.target.value)} className="w-full text-xs md:text-sm border border-slate-200 rounded-md py-1.5 pl-8 pr-2 outline-none focus:border-blue-500" /></div>
                            <div className="flex-1 overflow-y-auto space-y-2 pr-1">
                                {isLoading ? <div className="text-center p-4 text-slate-500 text-xs">Loading...</div> :
                                filteredDatabaseItems.map(item => (
                                    <div key={item.id} className="flex items-center justify-between border border-slate-100 rounded-lg p-2 bg-white shadow-sm">
                                        <div className="flex items-center flex-1 min-w-0 mr-2 text-left">
                                            <div className="w-10 h-10 shrink-0 bg-slate-50 flex items-center justify-center rounded border border-slate-100 mr-3"><img src={item.imageUrl} className="max-w-full max-h-full object-contain mix-blend-multiply" /></div>
                                            <div className="flex-1 min-w-0"><p className="font-bold text-[13px] md:text-sm text-slate-800 truncate">{item.name}</p><p className="text-[10px] text-slate-500 truncate mt-0.5">{adminTab==='groups' ? `${(item.exerciseIds||[]).length} Exercises` : formatTags(item.tags)}</p></div>
                                        </div>
                                        <div className="flex items-center space-x-0.5 shrink-0">
                                            <button onClick={() => adminTab==='exercises' ? editEx(item) : editGroup(item)} className="p-1.5 text-slate-400 hover:text-blue-600 rounded bg-slate-50"><Icons.Edit /></button>
                                            <button onClick={() => adminTab==='exercises' ? handleDeleteClick(item.id) : handleDeleteGroup(item.id)} className="p-1.5 text-slate-400 hover:text-red-600 rounded bg-slate-50"><Icons.Trash /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderPrintPrescriptionView = () => {
                const prescribedExercises = exercises.filter(ex => (prescriptionData.selectedExerciseIds || []).includes(ex.id));
                const today = new Date().toLocaleDateString('en-GB');

                return (
                    <div className="bg-slate-200 min-h-screen pt-4 md:pt-8 pb-20 print:bg-white print:p-0">
                        <div className="max-w-4xl mx-auto mb-4 flex justify-between items-center print:hidden px-3 md:px-4">
                            <button onClick={() => setCurrentView('doctor-dashboard')} className="flex items-center text-slate-600 font-semibold bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-lg shadow-sm text-sm md:text-base"><Icons.ArrowLeft className="h-4 w-4 mr-1" /> Edit</button>
                            <button onClick={() => window.print()} className="flex items-center text-white bg-blue-600 font-bold px-4 py-1.5 md:px-6 md:py-2 rounded-lg shadow-sm text-sm md:text-base"><Icons.Printer className="h-4 w-4 mr-1 md:mr-2" /> Print</button>
                        </div>
                        
                        <div className="bg-white max-w-[21cm] min-h-[29.7cm] mx-auto print:shadow-none p-6 sm:p-10 text-slate-900 flex flex-col font-sans">
                            <div className="flex justify-between items-start mb-4 text-left">
                                <div><h1 className="text-3xl font-bold text-[#1e3a8a] italic tracking-tight" style={{fontFamily: 'Georgia, serif'}}>Dr. Arpan Das (PT)</h1><p className="text-[#1e3a8a] font-bold text-[11px] mt-1">BPT (KPC Medical College and Hospital)</p><p className="text-[#1e3a8a] font-bold text-[11px]">Consultant Physiotherapist</p></div>
                                <div className="text-right"><p className="font-bold text-[#1e3a8a] flex items-center justify-end text-sm"><Icons.Phone /> +91 9641568109</p><div className="flex items-center justify-end mt-4 text-[11px] font-bold text-[#1e3a8a]"><span className="mr-2">Date:</span><span className="border-b border-[#1e3a8a] pb-0.5 px-2 text-black">{today}</span></div></div>
                            </div>
                            <div className="flex justify-between items-end border-t border-b border-[#1e3a8a] py-2 mb-6 text-[11px] font-bold text-left">
                                <div className="flex-1 flex items-end"><span className="text-[#1e3a8a] mr-2">Patient's name:</span><span className="text-black">{prescriptionData.patientName}</span></div>
                                <div className="w-24 flex items-end"><span className="text-[#1e3a8a] mr-2">Age:</span><span className="text-black">{prescriptionData.age}</span></div>
                                <div className="w-32 flex items-end"><span className="text-[#1e3a8a] mr-2">Gender:</span><span className="text-black">{prescriptionData.gender === 'M' ? 'Male' : prescriptionData.gender === 'F' ? 'Female' : ''}</span></div>
                                <div className="w-24 flex items-end justify-end"><span className="text-[#1e3a8a] mr-2">UPID:</span><span className="text-black">{Math.floor(Math.random() * 9000) + 1000}</span></div>
                            </div>
                            {prescriptionData.notes && <div className="mb-6 px-1"><p className="text-slate-800 text-xs font-medium whitespace-pre-line text-left">{prescriptionData.notes}</p></div>}
                            <div className="flex-1">
                                <div className="grid grid-cols-3 gap-x-6 gap-y-10">
                                    {prescribedExercises.map((ex) => {
                                        const params = (prescriptionData.exerciseParams || {})[ex.id] || {};
                                        const customNote = params.note;
                                        return (
                                            <div key={ex.id} className="flex flex-col items-start break-inside-avoid text-left">
                                                <div className="h-32 sm:h-40 w-full flex items-center justify-center mb-2">
                                                    {typeof ex.imageUrl === 'string' && ex.imageUrl.startsWith('blob:') ? (
                                                        <div className="text-[10px] text-red-500 font-bold border border-red-200 bg-red-50 p-2 text-center w-full">Image Broken.<br/>Please re-upload.</div>
                                                    ) : (
                                                        <img src={ex.imageUrl} alt={ex.name} className="max-w-full max-h-full object-contain mix-blend-multiply" />
                                                    )}
                                                </div>
                                                <div className="w-full px-1 text-left">
                                                    <h4 className="font-bold text-slate-800 text-[12px] mb-1 text-left">{ex.name}</h4>
                                                    <div className="flex justify-start items-center space-x-3 text-[9px] font-bold text-[#1e3a8a] mb-1">{params.reps && <span>Reps: <span className="text-black">{params.reps}</span></span>}{params.sets && <span>Sets: <span className="text-black">{params.sets}</span></span>}{params.freq && <span>Freq: <span className="text-black">{params.freq}</span></span>}</div>
                                                    {customNote && <p className="text-[9px] text-slate-600 leading-tight font-medium text-left">{customNote}</p>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <main className="relative">
                    {toastMessage && (
                        <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[100] toast-enter w-[90vw] md:w-auto">
                            <div className={`text-white px-6 py-3 rounded-full shadow-lg font-semibold text-sm flex items-center justify-center text-center leading-snug ${toastType === 'error' ? 'bg-red-600' : 'bg-slate-800'}`}>
                                {toastType === 'error' ? <Icons.Error /> : <Icons.Check />}
                                <span className="ml-2">{toastMessage}</span>
                            </div>
                        </div>
                    )}
                    
                    <div className={`fixed inset-0 bg-black/40 z-[1000] transition-opacity duration-300 print:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)}></div>

                    <div className={`fixed top-0 right-0 h-full w-[260px] bg-white z-[1001] transform transition-transform duration-300 ease-[cubic-bezier(0.25,0.8,0.25,1)] shadow-2xl flex flex-col pt-16 px-4 print:hidden ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <button onClick={() => setIsMenuOpen(false)} className="absolute top-4 right-4 bg-slate-100 border-none w-9 h-9 rounded-full text-lg cursor-pointer text-slate-800 font-bold flex items-center justify-center">✕</button>
                        <ul className="list-none p-0 m-0">
                            <li><a href="/" className="block py-4 border-b border-slate-100 font-semibold text-[1.05rem] text-slate-800">Home</a></li>
                            <li><a href="/services" className="block py-4 border-b border-slate-100 font-semibold text-[1.05rem] text-slate-800">Services</a></li>
                            <li><a href="/doctors" className="block py-4 border-b border-slate-100 font-semibold text-[1.05rem] text-slate-800">Doctors</a></li>
                            <li><a href="/products" className="block py-4 border-b border-slate-100 font-semibold text-[1.05rem] text-slate-800">Store</a></li>
                            <li><a href="/articles" className="block py-4 border-b border-slate-100 font-semibold text-[1.05rem] text-slate-800">Health Feed</a></li>
                            <li><a href="/exercises" className="block py-4 border-b border-slate-100 font-bold text-[1.05rem] text-blue-600">Exercise Library</a></li>
                            <li><a href="/prescription" className="block py-4 border-b border-slate-100 font-semibold text-[1.05rem] text-slate-800">My Reports</a></li>
                            <li><a href="/admin" className="block py-3 mt-4 text-center border border-blue-200 bg-blue-50 text-blue-700 rounded-lg font-bold text-[1.05rem]">Admin</a></li>
                        </ul>
                    </div>
                
                    {currentView !== 'login' && renderHeader()}
                    {currentView === 'login' && renderLoginView()}
                    {currentView === 'exercise-list' && renderPatientExerciseList()}
                    {currentView === 'group-detail' && renderGroupDetail()}
                    {currentView === 'exercise-detail' && renderPatientExerciseDetail()}
                    {currentView === 'doctor-dashboard' && user.role === 'doctor' && renderDoctorDashboard()}
                    {currentView === 'database-management' && user.role === 'doctor' && renderDatabaseManagement()}
                    {currentView === 'print-prescription' && user.role === 'doctor' && renderPrintPrescriptionView()}
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
