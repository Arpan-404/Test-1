<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Library - Therapeutic Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #f4f7fb; color: #0f172a; font-family: sans-serif; }
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); padding: 0.6rem 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .wiki-article-container { max-width: 1000px; margin: 80px auto 0; background: #ffffff; padding: 2rem; font-family: sans-serif; color: #202122; border: 1px solid #a2a9b1; min-height: calc(100vh - 80px); }
        .wiki-article-title { font-family: "Linux Libertine", "Georgia", "Times", serif; font-size: 2.2rem; border-bottom: 1px solid #a2a9b1; margin-bottom: 1.5rem; padding-bottom: 0.5rem; }
        .wiki-infobox { float: right; width: 350px; background: #f8f9fa; border: 1px solid #a2a9b1; padding: 12px; margin: 0 0 1rem 1.5rem; }
        .wiki-infobox-media { background: white; border: 1px solid #a2a9b1; padding: 8px; margin-bottom: 12px; display: flex; justify-content: center; }
        .wiki-infobox-media img { max-width: 100%; max-height: 250px; object-fit: contain; }
        .wiki-infobox-media iframe, .wiki-infobox-media video { width: 100%; aspect-ratio: 16/9; }
        
        .mobile-menu { position: fixed; top: 0; right: -100%; width: 260px; height: 100vh; background: white; z-index: 1001; transition: 0.3s ease; padding: 4rem 1rem 2rem; box-shadow: -5px 0 20px rgba(0,0,0,0.05); }
        .mobile-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        .overlay.active { display: block; }
        
        @media (max-width: 768px) {
            .wiki-article-container { padding: 1.5rem 1rem; margin-top: 60px; border: none; }
            .wiki-infobox { float: none; width: 100%; margin: 1rem 0; }
            .grid-col-strict { grid-template-columns: repeat(2, 1fr) !important; }
        }
        @media (min-width: 769px) and (max-width: 1024px) { .grid-col-strict { grid-template-columns: repeat(3, 1fr) !important; } }
        @media (min-width: 1025px) { .grid-col-strict { grid-template-columns: repeat(4, 1fr) !important; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="font-bold text-blue-800 text-xl"><i class="ph-bold ph-activity text-blue-600"></i> Library</a>
        <div class="relative w-full max-w-[220px] mx-4">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="search" oninput="window.filterGrid()" placeholder="Search exercises..." class="w-full bg-slate-100 border-none rounded-full py-1.5 pl-9 pr-4 outline-none focus:ring-2 focus:ring-blue-200 text-sm">
        </div>
        <button onclick="window.toggleMenu()" class="text-2xl text-slate-700"><i class="ph-bold ph-list"></i></button>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <button onclick="window.toggleMenu()" class="absolute top-4 right-4 bg-slate-100 w-8 h-8 rounded-full font-bold">✕</button>
        <ul class="space-y-4 font-bold text-slate-700">
            <li><a href="/" class="block border-b pb-2">Home</a></li>
            <li><a href="/services" class="block border-b pb-2">Services</a></li>
            <li><a href="/doctor-panel.html" class="block text-blue-600 bg-blue-50 p-2 rounded text-center mt-4">Doctor Login</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay" onclick="window.toggleMenu()"></div>

    <!-- Dynamic Content Container -->
    <main id="app-content" class="pt-[80px] pb-20"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const app = initializeApp({ apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus", databaseURL: "https://patient-records-arpan-default-rtdb.firebaseio.com", projectId: "patient-records-arpan" });
        const db = getDatabase(app);

        window.exercises = [];
        window.slugify = (text) => (text || '').toString().toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
        window.toggleMenu = () => { document.getElementById('mobileMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };

        // Safe URL Routing (Immune to Vercel 404s)
        const urlParams = new URLSearchParams(window.location.search);
        const viewEx = urlParams.get('ex');

        onValue(ref(db, 'exercises'), (snap) => {
            window.exercises = [];
            if(snap.exists()) {
                const data = snap.val();
                Object.keys(data).forEach(k => window.exercises.push({id: k, ...data[k]}));
                window.exercises.reverse();
            }
            
            if(viewEx) renderPhysiopedia(viewEx);
            else renderGrid();
        });

        function renderGrid(query = '') {
            const container = document.getElementById('app-content');
            const filtered = window.exercises.filter(ex => ex.name.toLowerCase().includes(query.toLowerCase()));
            
            if(filtered.length === 0) {
                container.innerHTML = '<div class="text-center mt-20 text-slate-500">No exercises found.</div>';
                return;
            }

            container.innerHTML = `
            <div class="max-w-6xl mx-auto px-4">
                <h1 class="text-2xl font-bold text-slate-800 mb-6">Exercise Library</h1>
                <div class="grid grid-col-strict gap-4">
                    ${filtered.map(ex => `
                        <a href="?ex=${window.slugify(ex.name)}" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:-translate-y-1 transition block">
                            <div class="w-full aspect-square bg-slate-50 relative">
                                <img src="${ex.imageUrl}" class="w-full h-full object-cover mix-blend-multiply">
                                ${ex.videoUrl ? '<div class="absolute top-2 right-2 bg-black/50 text-white p-1.5 rounded-full"><i class="ph-fill ph-play"></i></div>' : ''}
                            </div>
                            <div class="p-3 text-center"><h3 class="font-bold text-[14px] text-slate-800 line-clamp-2">${ex.name}</h3></div>
                        </a>
                    `).join('')}
                </div>
            </div>`;
        }

        window.filterGrid = () => {
            if(!urlParams.get('ex')) renderGrid(document.getElementById('search').value);
        };

        function renderPhysiopedia(slug) {
            const ex = window.exercises.find(e => window.slugify(e.name) === slug);
            const container = document.getElementById('app-content');
            
            if(!ex) {
                container.innerHTML = '<div class="text-center mt-20"><h2 class="text-2xl font-bold text-red-500 mb-4">Exercise Not Found</h2><a href="/exercises" class="text-blue-600 font-bold underline">Back to Library</a></div>';
                return;
            }

            let videoHtml = '';
            if (ex.videoUrl) {
                if (ex.videoUrl.includes('youtube') || ex.videoUrl.includes('youtu.be')) {
                    let videoId = ex.videoUrl.split('v=')[1] || ex.videoUrl.split('youtu.be/')[1];
                    if(videoId) { const amp = videoId.indexOf('&'); if(amp !== -1) videoId = videoId.substring(0, amp); videoHtml = `<div class="wiki-infobox-media"><iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>`; }
                } else { videoHtml = `<div class="wiki-infobox-media"><video src="${ex.videoUrl}" controls playsinline poster="${ex.imageUrl}"></video></div>`; }
            }

            container.innerHTML = `
            <div class="wiki-article-container">
                <div class="mb-4"><a href="/exercises" class="text-blue-600 font-bold hover:underline">← Back to Library</a></div>
                <h1 class="wiki-article-title">${ex.name}</h1>
                
                <div class="wiki-infobox">
                    <div class="text-center font-bold bg-[#eaecf0] p-2 mb-3 border border-[#a2a9b1]">${ex.name}</div>
                    ${ex.imageUrl ? `<div class="wiki-infobox-media"><img src="${ex.imageUrl}" alt="${ex.name}"></div>` : ''}
                    ${videoHtml}
                    ${ex.tags ? `<div class="text-xs bg-white border border-[#a2a9b1] p-2 mt-2"><span class="font-bold">Keywords:</span> <span class="text-[#0645ad]">${(ex.tags||[]).join(', ')}</span></div>` : ''}
                </div>

                <div class="text-[15px] leading-relaxed whitespace-pre-line text-[#202122]">
                    <h2 class="text-2xl border-b border-[#a2a9b1] pb-1 mb-3 font-serif mt-0">Description & Technique</h2>
                    ${ex.description}
                </div>
            </div>`;
        }
    </script>
</body>
</html>
