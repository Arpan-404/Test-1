<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Library</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        @media print {
            body { background-color: white !important; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { margin: 1cm; }
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Hide scrollbar for clean Pinterest look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-sm md:text-base font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // =====================================================================
        // UNIFIED FIREBASE CONFIGURATION
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            storageBucket: "patient-records-arpan.firebasestorage.app",
            messagingSenderId: "599041105903",
            appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        setPersistence(auth, browserLocalPersistence).catch(console.error);
        const googleProvider = new GoogleAuthProvider();

        const { useState, useEffect, useMemo } = React;

        // =====================================================================
        // CLOUD CREDENTIALS & ENDPOINTS
        // =====================================================================
        const FIREBASE_DB_URL = "https://patient-records-arpan-default-rtdb.firebaseio.com/exercises";
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dyunl0dx5/auto/upload";
        const CLOUDINARY_UPLOAD_PRESET = "unsigned_preset"; 

        const Icons = {
            Search: ({className="w-4 h-4 md:w-5 md:h-5 text-slate-400"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            ArrowLeft: ({className="h-5 w-5"}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            PlayCircle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>,
            Stethoscope: ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>,
            Database: ({className="w-4 h-4 md:w-5 md:h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Printer: ({className="h-4 w-4 md:h-5 md:w-5 mr-2"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect width="12" height="8" x="6" y="14"/></svg>,
            User: ({className="w-6 h-6 text-slate-600 hover:text-blue-600 transition"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            UserActive: ({className="w-6 h-6 text-blue-600"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Phone: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
            Google: () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px" className="mr-2"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 text-green-500"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        const INITIAL_EXERCISES = [
            { id: 1, name: "Pelvic Tilt", description: "Tighten your stomach muscles.", imageUrl: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&q=80&w=400&h=600", videoUrl: "", tags: ["low back pain", "core"] },
            { id: 2, name: "Knee to Chest Stretch", description: "Pull one knee up to your chest.", imageUrl: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&q=80&w=400&h=300", videoUrl: "", tags: ["low back pain", "stretching"] }
        ];

        function App() {
            const [user, setUser] = useState({ role: 'guest' }); 
            const [currentView, setCurrentView] = useState('exercise-list'); 
            
            const [loginTab, setLoginTab] = useState('patient'); 
            const [loginName, setLoginName] = useState('');
            const [loginPhone, setLoginPhone] = useState('');
            
            const [exercises, setExercises] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isUploadingImage, setIsUploadingImage] = useState(false);
            const [isUploadingVideo, setIsUploadingVideo] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            
            const [selectedExercise, setSelectedExercise] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [doctorSearchQuery, setDoctorSearchQuery] = useState("");
            const [databaseSearchQuery, setDatabaseSearchQuery] = useState("");

            const [editingId, setEditingId] = useState(null);
            const [newExercise, setNewExercise] = useState({ name: '', description: '', imageUrl: '', videoUrl: '', tags: '' });
            const [prescriptionData, setPrescriptionData] = useState({ 
                patientName: '', age: '', gender: '', notes: '', selectedExerciseIds: [], exerciseParams: {} 
            });

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(null), 3500);
            };

            // Firebase Auth Listener
            useEffect(() => {
                fetchExercisesFromFirebase();

                const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
                    if (firebaseUser) {
                        setUser({ role: 'doctor', name: firebaseUser.displayName, email: firebaseUser.email });
                        setCurrentView(prev => {
                            if (prev === 'login' || prev === 'exercise-list') return 'doctor-dashboard';
                            return prev;
                        });
                    }
                });

                return () => unsubscribe();
            }, []);

            // Safe Firebase Fetch
            const fetchExercisesFromFirebase = async () => {
                try {
                    setIsLoading(true);
                    const res = await fetch(`${FIREBASE_DB_URL}.json`);
                    if (!res.ok) throw new Error("Network error");
                    
                    const data = await res.json();
                    if (data && typeof data === 'object' && !data.error) {
                        const exArray = Object.keys(data).map(key => ({ ...data[key], id: key }));
                        setExercises(exArray.reverse()); 
                    } else {
                        setExercises(INITIAL_EXERCISES);
                    }
                } catch (error) {
                    console.error("Firebase Read Error:", error);
                    setExercises(INITIAL_EXERCISES); 
                } finally {
                    setIsLoading(false);
                }
            };

            const handleUserIconClick = () => {
                if (user.role === 'doctor') {
                    setCurrentView('doctor-dashboard');
                } else if (user.role === 'patient') {
                    if(window.confirm("Do you want to log out from Patient mode?")) {
                        setUser({role: 'guest'});
                        showToast("Logged out");
                        // Clear the URL when logging out
                        window.history.pushState({}, '', '/exercises');
                    }
                } else {
                    setCurrentView('login');
                }
            };

            const handleLogout = async () => {
                if (user.role === 'doctor') {
                    try { await signOut(auth); } catch (error) { console.error(error); }
                }
                setUser({role: 'guest'});
                setCurrentView('exercise-list');
                showToast("Logged out successfully");
                // Clear the URL when logging out
                window.history.pushState({}, '', '/exercises');
            };

            const handlePatientLogin = (e) => {
                e.preventDefault();
                if (loginPhone.length >= 10) {
                    setUser({ role: 'patient', phone: loginPhone, name: loginName });
                    setCurrentView('exercise-list');
                    showToast("Logged in as Patient");

                    // MAGIC LINE: Update the URL to /exercises/(UPID)
                    const urlPath = encodeURIComponent(loginName.trim().toLowerCase().replace(/\s+/g, '-'));
                    window.history.pushState({}, '', '/exercises/' + urlPath);

                } else {
                    showToast("Please enter a valid mobile number.");
                }
            };

            const handleDoctorGoogleLogin = async () => {
                try {
                    await signInWithPopup(auth, googleProvider);
                    showToast("Welcome to the Doctor Dashboard");
                } catch (error) {
                    console.error("Google Login Error:", error);
                    showToast("Google login failed. Ensure Firebase keys are valid.");
                }
            };

            const uploadFileToCloudinary = async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                try {
                    const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    if (data.secure_url) {
                        return data.secure_url;
                    } else {
                        throw new Error(data.error?.message || "Upload Failed");
                    }
                } catch (err) {
                    console.error("Cloudinary Error:", err);
                    showToast("Cloudinary error: Fallback to local preview.");
                    return URL.createObjectURL(file);
                }
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsUploadingImage(true);
                    const secureUrl = await uploadFileToCloudinary(file);
                    if(secureUrl) setNewExercise({ ...newExercise, imageUrl: secureUrl });
                    setIsUploadingImage(false);
                }
            };

            const handleVideoUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsUploadingVideo(true);
                    const secureUrl = await uploadFileToCloudinary(file);
                    if(secureUrl) setNewExercise({ ...newExercise, videoUrl: secureUrl });
                    setIsUploadingVideo(false);
                }
            };

            const handleAddOrUpdateExercise = async (e) => {
                e.preventDefault();
                const tagsArray = typeof newExercise.tags === 'string' ? newExercise.tags.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : newExercise.tags;
                let finalImageUrl = newExercise.imageUrl || 'https://images.unsplash.com/photo-1576091160550-2173ff9e5ee5?auto=format&fit=crop&q=80&w=400';
                
                const exerciseData = { name: newExercise.name, description: newExercise.description, imageUrl: finalImageUrl, videoUrl: newExercise.videoUrl, tags: tagsArray };
                setIsLoading(true);

                try {
                    if (editingId) {
                        await fetch(`${FIREBASE_DB_URL}/${editingId}.json`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(exerciseData) });
                        showToast("Exercise updated in Cloud");
                    } else {
                        await fetch(`${FIREBASE_DB_URL}.json`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(exerciseData) });
                        showToast("New exercise added");
                    }
                    setEditingId(null);
                    setNewExercise({ name: '', description: '', imageUrl: '', videoUrl: '', tags: '' });
                    await fetchExercisesFromFirebase();
                } catch (error) {
                    showToast("Failed to save to database.");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDeleteClick = async (id) => {
                if (window.confirm("Delete this exercise permanently?")) {
                    setIsLoading(true);
                    try {
                        await fetch(`${FIREBASE_DB_URL}/${id}.json`, { method: 'DELETE' });
                        setPrescriptionData(prev => {
                            const newIds = prev.selectedExerciseIds.filter(eId => eId !== id);
                            const newParams = { ...prev.exerciseParams };
                            delete newParams[id];
                            return { ...prev, selectedExerciseIds: newIds, exerciseParams: newParams };
                        });
                        if (editingId === id) cancelEdit();
                        await fetchExercisesFromFirebase();
                        showToast("Exercise deleted");
                    } catch (error) {
                        showToast("Failed to delete exercise.");
                    } finally {
                        setIsLoading(false);
                    }
                }
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNewExercise({ name: '', description: '', imageUrl: '', videoUrl: '', tags: '' });
            };

            const togglePrescriptionExercise = (id) => {
                setPrescriptionData(prev => {
                    const isSelected = prev.selectedExerciseIds.includes(id);
                    let newIds = [...prev.selectedExerciseIds];
                    let newParams = { ...prev.exerciseParams };

                    if (isSelected) {
                        newIds = newIds.filter(eId => eId !== id);
                        delete newParams[id];
                    } else {
                        newIds.push(id);
                        newParams[id] = { reps: '10', sets: '3', freq: '2x/Day', note: '' };
                    }
                    return { ...prev, selectedExerciseIds: newIds, exerciseParams: newParams };
                });
            };

            const handleParamChange = (id, field, value) => {
                setPrescriptionData(prev => ({
                    ...prev, exerciseParams: { ...prev.exerciseParams, [id]: { ...prev.exerciseParams[id], [field]: value } }
                }));
            };

            // Safe Array Check
            const formatTags = (tags) => Array.isArray(tags) ? tags.join(', ') : (tags || '');

            const filteredPatientExercises = useMemo(() => exercises.filter(ex => 
                (ex.name || "").toLowerCase().includes(searchQuery.toLowerCase()) || 
                (Array.isArray(ex.tags) && ex.tags.some(tag => tag.includes(searchQuery.toLowerCase())))
            ), [exercises, searchQuery]);
            
            const filteredDoctorExercises = useMemo(() => exercises.filter(ex => 
                (ex.name || "").toLowerCase().includes(doctorSearchQuery.toLowerCase()) || 
                (Array.isArray(ex.tags) && ex.tags.some(tag => tag.includes(doctorSearchQuery.toLowerCase())))
            ), [exercises, doctorSearchQuery]);
            
            const filteredDatabaseExercises = useMemo(() => exercises.filter(ex => 
                (ex.name || "").toLowerCase().includes(databaseSearchQuery.toLowerCase()) || 
                (Array.isArray(ex.tags) && ex.tags.some(tag => tag.includes(databaseSearchQuery.toLowerCase())))
            ), [exercises, databaseSearchQuery]);


            // --- UI RENDERERS ---

            // CLEAN HEADER: Logo, Search Bar, User Icon
            const renderHeader = () => (
                <header className="bg-white px-3 py-2 md:px-4 md:py-3 shadow-sm flex items-center justify-between sticky top-0 z-50 print:hidden border-b border-slate-200">
                    <div className="flex-shrink-0 cursor-pointer" onClick={() => setCurrentView('exercise-list')}>
                        <img src="/favicon.png" alt="Logo" className="w-8 h-8 md:w-10 md:h-10 object-contain rounded-md" />
                    </div>
                    
                    {/* Always visible search bar in the middle */}
                    {(currentView === 'exercise-list' || currentView === 'exercise-detail') && (
                        <div className="flex-grow max-w-xl mx-3 md:mx-4 relative">
                            <Icons.Search className="absolute left-3 top-2.5 md:top-3 text-slate-400 w-4 h-4 md:w-5 md:h-5" />
                            <input 
                                type="text" 
                                placeholder="Search exercises..." 
                                value={searchQuery} 
                                onChange={(e) => {setSearchQuery(e.target.value); setCurrentView('exercise-list');}} 
                                className="w-full bg-slate-100 border border-slate-200 rounded-full py-2 md:py-2.5 pl-9 md:pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs md:text-sm transition-shadow" 
                            />
                        </div>
                    )}
                    
                    <div className="flex-shrink-0 flex items-center">
                        <button onClick={handleUserIconClick} className="p-1.5 md:p-2 rounded-full bg-slate-50 hover:bg-slate-100 transition shadow-sm border border-slate-200" title={user.role === 'guest' ? 'Login' : 'Dashboard / Profile'}>
                            {user.role === 'guest' ? <Icons.User className="w-5 h-5 md:w-6 md:h-6 text-slate-600"/> : <Icons.UserActive className="w-5 h-5 md:w-6 md:h-6 text-blue-600" />}
                        </button>
                    </div>
                </header>
            );

            // Login View matches Screenshot
            const renderLoginView = () => (
                <div className="min-h-screen bg-[#f8faff] flex flex-col items-center justify-center p-4 relative">
                    <button onClick={() => setLoginTab(loginTab === 'patient' ? 'doctor' : 'patient')} className="absolute top-4 right-4 flex items-center gap-1.5 bg-white border border-slate-200 text-[#1e3a8a] px-3 py-1.5 rounded-full text-xs font-bold shadow-sm hover:bg-slate-50 transition-colors">

                        </div>
                        
                        <div className="bg-white max-w-[21cm] min-h-[29.7cm] mx-auto print:shadow-none p-6 sm:p-10 text-slate-900 flex flex-col font-sans">
                            <div className="flex justify-between items-start mb-4 text-left">
                                <div>
                                    <h1 className="text-3xl font-bold text-[#1e3a8a] italic tracking-tight" style={{fontFamily: 'Georgia, serif'}}>Dr. Arpan Das (PT)</h1>
                                    <p className="text-[#1e3a8a] font-bold text-[11px] mt-1">BPT (KPC Medical College and Hospital)</p>
                                    <p className="text-[#1e3a8a] font-bold text-[11px]">Consultant Physiotherapist</p>
                                </div>
                                <div className="text-right">
                                    <p className="font-bold text-[#1e3a8a] flex items-center justify-end text-sm"><Icons.Phone /> +91 9641568109</p>
                                    <div className="flex items-center justify-end mt-4 text-[11px] font-bold text-[#1e3a8a]">
                                        <span className="mr-2">Date:</span> 
                                        <span className="border-b border-[#1e3a8a] pb-0.5 px-2 text-black">{today}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex justify-between items-end border-t border-b border-[#1e3a8a] py-2 mb-6 text-[11px] font-bold text-left">
                                <div className="flex-1 flex items-end">
                                    <span className="text-[#1e3a8a] mr-2">Patient's name:</span>
                                    <span className="text-black">{prescriptionData.patientName}</span>
                                </div>
                                <div className="w-24 flex items-end">
                                    <span className="text-[#1e3a8a] mr-2">Age:</span>
                                    <span className="text-black">{prescriptionData.age}</span>
                                </div>
                                <div className="w-32 flex items-end">
                                    <span className="text-[#1e3a8a] mr-2">Gender:</span>
                                    <span className="text-black">{prescriptionData.gender === 'M' ? 'Male' : prescriptionData.gender === 'F' ? 'Female' : ''}</span>
                                </div>
                                <div className="w-24 flex items-end justify-end">
                                    <span className="text-[#1e3a8a] mr-2">UPID:</span>
                                    <span className="text-black">{Math.floor(Math.random() * 9000) + 1000}</span>
                                </div>
                            </div>
                            
                            {prescriptionData.notes && (
                                <div className="mb-6 px-1">
                                    <p className="text-slate-800 text-xs font-medium whitespace-pre-line text-left">{prescriptionData.notes}</p>
                                </div>
                            )}

                            <div className="flex-1">
                                <div className="grid grid-cols-3 gap-x-6 gap-y-10">
                                    {prescribedExercises.map((ex) => {
                                        const params = prescriptionData.exerciseParams[ex.id] || {};
                                        const customNote = params.note;
                                        
                                        return (
                                            <div key={ex.id} className="flex flex-col items-start break-inside-avoid text-left">
                                                <div className="h-32 sm:h-40 w-full flex items-center justify-center mb-2">
                                                    <img src={ex.imageUrl} alt={ex.name} className="max-w-full max-h-full object-contain mix-blend-multiply" />
                                                </div>
                                                <div className="w-full px-1 text-left">
                                                    
                                                    {/* NO NUMBERING - Just the clean name */}
                                                    <h4 className="font-bold text-slate-800 text-[12px] mb-1 text-left">{ex.name}</h4>
                                                    
                                                    <div className="flex justify-start items-center space-x-3 text-[9px] font-bold text-[#1e3a8a] mb-1">
                                                        {params.reps && <span>Reps: <span className="text-black">{params.reps}</span></span>}
                                                        {params.sets && <span>Sets: <span className="text-black">{params.sets}</span></span>}
                                                        {params.freq && <span>Freq: <span className="text-black">{params.freq}</span></span>}
                                                    </div>
                                                    
                                                    {customNote && (
                                                        <p className="text-[9px] text-slate-600 leading-tight font-medium text-left">{customNote}</p>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <main className="relative">
                    {toastMessage && (
                        <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[100] toast-enter">
                            <div className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg font-semibold text-sm flex items-center whitespace-nowrap">
                                <Icons.Check />
                                {toastMessage}
                            </div>
                        </div>
                    )}
                
                    {currentView !== 'login' && renderHeader()}
                    {currentView === 'login' && renderLoginView()}
                    {currentView === 'exercise-list' && renderPatientExerciseList()}
                    {currentView === 'exercise-detail' && renderPatientExerciseDetail()}
                    {currentView === 'doctor-dashboard' && user.role === 'doctor' && renderDoctorDashboard()}
                    {currentView === 'database-management' && user.role === 'doctor' && renderDatabaseManagement()}
                    {currentView === 'print-prescription' && user.role === 'doctor' && renderPrintPrescriptionView()}
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
