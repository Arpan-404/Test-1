<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehabilitation Exercises - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f8fafc', surface: '#ffffff' },
            boxShadow: { 'soft': '0 4px 20px rgba(15, 23, 42, 0.05)', 'float': '0 10px 30px rgba(15, 23, 42, 0.08)' }
          }
        }
      }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #0f172a; overflow-x: hidden; padding-bottom: 4rem;}
        
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }

        /* Rich Text Formatting for Physiopedia Style */
        .wiki-content { font-size: 1.05rem; line-height: 1.7; color: #334155; }
        .wiki-content h2 { font-size: 1.5rem; font-weight: 800; color: #1e3a8a; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
        .wiki-content h3 { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .wiki-content p { margin-bottom: 1.25rem; }
        .wiki-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .wiki-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .wiki-content a { color: #1d4ed8; text-decoration: underline; }
        .wiki-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Smooth Sidebar */
        .mobile-menu { 
            position: fixed; top: 0; right: 0; width: 280px; height: 100vh; 
            background: var(--surface); z-index: 1001; 
            transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 1rem 0 2rem; box-shadow: -5px 0 25px rgba(15, 23, 42, 0.1); 
            overflow-y: auto; border-left: 1px solid #e2e8f0;
        }
        .mobile-menu.active { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); z-index: 999; visibility: hidden; opacity: 0; transition: opacity 0.3s, visibility 0.3s;}
        .overlay.active { visibility: visible; opacity: 1; }

        @media print {
            body { background: white !important; }
            .print-hidden { display: none !important; }
            .print-shadow-none { box-shadow: none !important; border: none !important; }
            .wiki-content { font-size: 12pt; color: black; }
            .wiki-content h2 { color: black; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #1e3a8a;">
            <div class="native-loader"></div>
            <div style="font-weight: bold;">Loading Exercise Library...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js';

        // --- FIREBASE CONFIG (Unified Database) ---
        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "clinic-bdf92.firebaseapp.com",
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };
        const appSite = initializeApp(siteConfig, "AppSite");
        const dbSite = getDatabase(appSite);

        const slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

        function App() {
            const [siteData, setSiteData] = useState({ hero: {}, exercises: [] });
            const [isLoading, setIsLoading] = useState(true);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeHash, setActiveHash] = useState(window.location.hash || '');

            // --- DATA FETCHING ---
            useEffect(() => {
                const unsubSite = onValue(ref(dbSite, 'site'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setSiteData({
                            hero: data.hero || {},
                            exercises: data.exercises || [] // Fetching exercises from unified DB
                        });
                    }
                    setIsLoading(false);
                });
                return () => unsubSite();
            }, []);

            // --- ROUTING ---
            useEffect(() => {
                const handleHashChange = () => {
                    setActiveHash(window.location.hash);
                    window.scrollTo(0, 0); // Scroll to top on navigation
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            // --- YOUTUBE EXTRACTOR ---
            const getYoutubeEmbedUrl = (url) => {
                if (!url) return null;
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null;
            };

            // --- RENDERERS ---
            if (isLoading) return null;

            const renderHeader = () => (
                <header className="fixed top-0 left-0 right-0 h-16 bg-white/95 backdrop-blur-md border-b border-slate-200 z-40 flex items-center justify-between px-4 max-w-6xl mx-auto w-full print-hidden">
                    <a href="/" className="flex items-center gap-3">
                        {siteData.hero.logoUrl ? 
                            <img src={siteData.hero.logoUrl} alt="Logo" className="w-10 h-10 rounded-xl object-contain" /> : 
                            <div className="w-10 h-10 rounded-xl bg-azure text-white flex items-center justify-center font-black text-xl shadow-sm">T</div>
                        }
                    </a>
                    <div className="flex items-center gap-2">
                        <button onClick={() => setIsMenuOpen(true)} className="p-1.5 text-slate-500 hover:bg-slate-100 hover:text-navy rounded-full transition">
                            <i className="ph-bold ph-list text-2xl"></i>
                        </button>
                    </div>
                </header>
            );

            const renderMenu = () => (
                <>
                    <div className={`overlay ${isMenuOpen ? 'active' : ''} print-hidden`} onClick={() => setIsMenuOpen(false)}></div>
                    <aside className={`mobile-menu ${isMenuOpen ? 'active' : ''} print-hidden`}>
                        <div className="flex justify-between items-center px-6 pb-4 border-b border-slate-200">
                            <h2 className="text-lg font-black text-navy m-0">Menu</h2>
                            <button onClick={() => setIsMenuOpen(false)} className="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:text-navy hover:bg-slate-200 transition"><i className="ph-bold ph-x text-lg"></i></button>
                        </div>
                        <ul className="mt-2">
                            <li><a href="/" className="flex items-center px-6 py-4 border-b border-slate-50 font-bold text-slate-700 hover:text-azure transition"><i className="ph-bold ph-house mr-3 text-xl text-slate-400"></i> Home</a></li>
                            <li><a href="/services" className="flex items-center px-6 py-4 border-b border-slate-50 font-bold text-slate-700 hover:text-azure transition"><i className="ph-bold ph-first-aid mr-3 text-xl text-slate-400"></i> Services</a></li>
                            <li><a href="/doctors" className="flex items-center px-6 py-4 border-b border-slate-50 font-bold text-slate-700 hover:text-azure transition"><i className="ph-bold ph-stethoscope mr-3 text-xl text-slate-400"></i> Team</a></li>
                            <li><a href="/products" className="flex items-center px-6 py-4 border-b border-slate-50 font-bold text-slate-700 hover:text-azure transition"><i className="ph-bold ph-shopping-bag mr-3 text-xl text-slate-400"></i> Products</a></li>
                            <li><a href="/exercises" className="flex items-center px-6 py-4 border-b border-slate-50 font-bold text-azure bg-ice/50"><i className="ph-bold ph-person-simple-walk mr-3 text-xl text-azure"></i> Exercises</a></li>
                        </ul>
                    </aside>
                </>
            );

            // Determine what to show based on hash
            let content;
            const routePrefix = '#/';
            
            if (activeHash && activeHash.startsWith(routePrefix)) {
                // --- PHYSIOPEDIA DETAIL VIEW ---
                const slug = activeHash.replace(routePrefix, '');
                const exercise = siteData.exercises.find(ex => slugify(ex.name) === slug);
                
                if (exercise) {
                    const embedUrl = getYoutubeEmbedUrl(exercise.videoUrl);
                    
                    content = (
                        <div className="max-w-4xl mx-auto px-4 pt-24 pb-12 animate-in fade-in">
                            <div className="flex justify-between items-center mb-6 print-hidden">
                                <a href="#" className="flex items-center gap-2 text-slate-500 font-bold hover:text-navy transition px-4 py-2 bg-white rounded-full shadow-sm border border-slate-200">
                                    <i className="ph-bold ph-arrow-left text-lg"></i> Back to Library
                                </a>
                                <button onClick={() => window.print()} className="flex items-center gap-2 bg-azure text-white px-4 py-2 rounded-full font-bold shadow-sm hover:bg-navy transition">
                                    <i className="ph-bold ph-printer text-lg"></i> Print
                                </button>
                            </div>

                            <article className="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden print-shadow-none">
                                {/* Media Header */}
                                {(embedUrl || exercise.videoUrl || exercise.imageUrl) && (
                                    <div className="w-full bg-slate-100 border-b border-slate-200 relative print-hidden">
                                        {embedUrl ? (
                                            <div className="aspect-video w-full">
                                                <iframe src={embedUrl} className="w-full h-full" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                                            </div>
                                        ) : exercise.videoUrl ? (
                                            <div className="aspect-video w-full">
                                                <video src={exercise.videoUrl} className="w-full h-full" controls poster={exercise.imageUrl}></video>
                                            </div>
                                        ) : exercise.imageUrl ? (
                                            <div className="h-64 sm:h-96 w-full flex items-center justify-center p-4">
                                                <img src={exercise.imageUrl} alt={exercise.name} className="max-w-full max-h-full object-contain mix-blend-multiply" />
                                            </div>
                                        ) : null}
                                    </div>
                                )}

                                {/* Print-only Image */}
                                <div className="hidden print:block text-center mb-4 border-b border-slate-300 pb-4">
                                    {exercise.imageUrl && <img src={exercise.imageUrl} style={{maxHeight: '300px'}} />}
                                </div>

                                {/* Article Body */}
                                <div className="p-6 sm:p-10">
                                    <h1 className="text-3xl sm:text-4xl font-black text-navy mb-6 tracking-tight leading-tight border-b-2 border-azure pb-4 inline-block">{exercise.name}</h1>
                                    
                                    <div className="wiki-content" dangerouslySetInnerHTML={{ __html: exercise.description || '<p>No description provided.</p>' }} />
                                    
                                    {/* Categories/Tags */}
                                    {exercise.tags && exercise.tags.length > 0 && (
                                        <div className="mt-10 pt-6 border-t border-slate-200 print-hidden">
                                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Categories</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {exercise.tags.map((tag, i) => (
                                                    <span key={i} className="bg-ice text-azure px-3 py-1 rounded-full text-xs font-bold capitalize shadow-sm">
                                                        {tag}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </article>
                        </div>
                    );
                } else {
                    content = <div className="pt-32 text-center text-slate-500 font-bold">Exercise not found.</div>;
                }
            } else {
                // --- LIBRARY GRID VIEW ---
                const filteredExercises = siteData.exercises.filter(ex => 
                    (ex.name || "").toLowerCase().includes(searchQuery.toLowerCase()) || 
                    (ex.tags || []).some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))
                );

                content = (
                    <div className="max-w-6xl mx-auto px-4 pt-24 pb-12 animate-in fade-in">
                        <div className="text-center mb-10">
                            <span className="text-azure font-bold text-xs tracking-widest uppercase mb-2 block">Clinical Database</span>
                            <h1 className="text-3xl sm:text-4xl font-black text-navy mb-4">Rehabilitation Exercises</h1>
                            
                            <div className="max-w-md mx-auto relative mt-6">
                                <i className="ph-bold ph-magnifying-glass absolute left-4 top-3 text-slate-400 text-lg"></i>
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search for exercises, muscles, tags..." className="w-full bg-white shadow-soft border border-slate-200 rounded-full py-3 pl-12 pr-4 outline-none focus:border-azure focus:ring-1 focus:ring-azure transition" />
                            </div>
                        </div>

                        {filteredExercises.length === 0 ? (
                            <div className="text-center text-slate-400 py-10 font-medium bg-white rounded-2xl border border-slate-200">No exercises found matching your search.</div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {filteredExercises.map(ex => (
                                    <a key={ex.id} href={`#/${slugify(ex.name)}`} className="bg-white rounded-2xl shadow-soft border border-slate-200 flex flex-col hover:shadow-float hover:-translate-y-1 transition duration-300 overflow-hidden group">
                                        <div className="w-full h-48 bg-slate-50 flex items-center justify-center p-4 border-b border-slate-100">
                                            {ex.imageUrl ? 
                                                <img src={ex.imageUrl} className="max-w-full max-h-full object-contain mix-blend-multiply group-hover:scale-105 transition duration-500" /> :
                                                <i className="ph-bold ph-person-simple-walk text-5xl text-slate-300"></i>
                                            }
                                        </div>
                                        <div className="p-5 flex-1 flex flex-col">
                                            <h3 className="font-black text-navy text-lg leading-tight group-hover:text-azure transition line-clamp-2 mb-2">{ex.name}</h3>
                                            
                                            <div className="mt-auto pt-3 flex flex-wrap gap-1.5">
                                                {ex.tags && ex.tags.slice(0, 3).map((tag, i) => (
                                                    <span key={i} className="text-[9px] font-bold uppercase tracking-wider bg-slate-100 text-slate-500 px-2 py-1 rounded">
                                                        {tag}
                                                    </span>
                                                ))}
                                                {ex.tags && ex.tags.length > 3 && <span className="text-[9px] font-bold text-slate-400 py-1">+{ex.tags.length - 3}</span>}
                                            </div>
                                        </div>
                                    </a>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <>
                    {renderHeader()}
                    {renderMenu()}
                    {content}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
