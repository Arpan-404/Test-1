<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f4f7fb', surface: '#ffffff' },
            boxShadow: { 'soft': '0 2px 10px rgba(29, 78, 216, 0.05)' }
          }
        }
      }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #334155; overflow-x: hidden;}
        
        .h-scroll::-webkit-scrollbar { display: none; }
        .h-scroll { scrollbar-width: none; }
        
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }
        
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Quill Editor Edge-to-Edge Overrides for Mobile */
        .ql-toolbar { background: #f8fafc; border-color: #e2e8f0 !important; }
        .ql-container { border-color: #e2e8f0 !important; background: #ffffff; font-family: inherit; font-size: 16px; }
        .ql-editor { min-height: 300px; padding: 1rem; }
        
        @media (max-width: 639px) {
            /* Remove borders on extreme edges for mobile to save space */
            .mobile-edge-editor .ql-toolbar { border-left: none !important; border-right: none !important; border-top: 1px solid #e2e8f0 !important; border-radius: 0 !important; }
            .mobile-edge-editor .ql-container { border-left: none !important; border-right: none !important; border-radius: 0 !important; border-bottom: 1px solid #e2e8f0 !important; }
        }
        @media (min-width: 640px) {
            .ql-toolbar { border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; }
            .ql-container { border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #1e3a8a;">
            <div class="native-loader"></div>
            <div style="font-weight: bold; font-size: 1.1rem;">Loading Admin Panel...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "clinic-bdf92.firebaseapp.com",
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };
        const recordsConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            databaseURL: "https://patient-records-arpan-default-rtdb.firebaseio.com"
        };

        const appSite = initializeApp(siteConfig, "AppSite");
        const auth = getAuth(appSite);
        const dbSite = getDatabase(appSite);
        const appRecords = initializeApp(recordsConfig, "AppRecords");
        const dbRecords = getDatabase(appRecords);
        const googleProvider = new GoogleAuthProvider();
        const slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

        // Add Custom Undo/Redo Icons to Quill
        const icons = Quill.import('ui/icons');
        icons['undo'] = '<svg viewBox="0 0 18 18"><path class="ql-fill ql-stroke" d="M3,8A5,5,0,1,1,12.2,12.6L10.8,11.2A3,3,0,1,0,5,8Z"></path><polygon class="ql-fill ql-stroke" points="5.5 4 5.5 8 1.5 8"></polygon></svg>';
        icons['redo'] = '<svg viewBox="0 0 18 18"><path class="ql-fill ql-stroke" d="M15,8A5,5,0,1,0,5.8,12.6L7.2,11.2A3,3,0,1,1,13,8Z"></path><polygon class="ql-fill ql-stroke" points="12.5 4 12.5 8 16.5 8"></polygon></svg>';

        // --- CLOUDINARY WYSIWYG RICH TEXT EDITOR ---
        function RichTextEditor({ initialValue, onChange, placeholder }) {
            const editorRef = useRef(null);
            const quillRef = useRef(null);

            useEffect(() => {
                if (!quillRef.current && editorRef.current) {
                    quillRef.current = new Quill(editorRef.current, {
                        theme: 'snow',
                        placeholder: placeholder || 'Write content here...',
                        modules: {
                            history: { delay: 500, maxStack: 100, userOnly: true },
                            toolbar: {
                                container: [
                                    [{ 'header': [1, 2, 3, false] }],
                                    ['bold', 'italic', 'underline'],
                                    [{ 'color': [] }, { 'background': [] }],
                                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                    ['link', 'image', 'video'],
                                    ['undo', 'redo'],
                                    ['clean']
                                ],
                                handlers: {
                                    'undo': function() { this.quill.history.undo(); },
                                    'redo': function() { this.quill.history.redo(); }
                                }
                            }
                        }
                    });

                    if (initialValue) {
                        quillRef.current.clipboard.dangerouslyPasteHTML(initialValue);
                    }

                    // Cloudinary Image Handler
                    quillRef.current.getModule('toolbar').addHandler('image', () => {
                        const input = document.createElement('input');
                        input.setAttribute('type', 'file');
                        input.setAttribute('accept', 'image/*');
                        input.click();
                        
                        input.onchange = async () => {
                            const file = input.files[0];
                            if (file) {
                                const formData = new FormData();
                                formData.append('file', file);
                                formData.append('upload_preset', 'Physio_uploads');
                                
                                const range = quillRef.current.getSelection(true);
                                quillRef.current.insertText(range.index, 'Uploading image...', 'user');
                                
                                try {
                                    const res = await fetch(`https://api.cloudinary.com/v1_1/dyuni0dx5/image/upload`, { method: 'POST', body: formData });
                                    const data = await res.json();
                                    quillRef.current.deleteText(range.index, 18);
                                    if (data.secure_url) quillRef.current.insertEmbed(range.index, 'image', data.secure_url, 'user');
                                } catch (err) {
                                    quillRef.current.deleteText(range.index, 18);
                                    alert("Image upload failed.");
                                }
                            }
                        };
                    });

                    quillRef.current.on('text-change', (delta, oldDelta, source) => {
                        if (source === 'user') {
                            onChange(quillRef.current.root.innerHTML);
                        }
                    });
                }
            }, []); 

            return <div ref={editorRef} className="bg-white"></div>;
        }

        // --- REUSABLE IMAGE UPLOADER COMPONENT ---
        function ImageUploader({ url, onUploadComplete, label, isIcon = false }) {
            const [isUploading, setIsUploading] = useState(false);
            
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                const formData = new FormData(); 
                formData.append('file', file); 
                formData.append('upload_preset', 'Physio_uploads');
                
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/dyuni0dx5/image/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.secure_url) onUploadComplete(data.secure_url);
                } catch (err) { alert("Upload failed."); }
                setIsUploading(false);
            };

            return (
                <div className="w-full">
                    <label className="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">{label}</label>
                    <div className={`relative border border-dashed border-slate-300 sm:rounded-xl bg-slate-50 flex items-center justify-center overflow-hidden hover:bg-slate-100 transition cursor-pointer ${isIcon ? 'w-24 h-24 rounded-lg' : 'w-full h-40 rounded-lg'}`}>
                        {isUploading ? (
                            <div className="flex flex-col items-center"><i className="ph-bold ph-spinner animate-spin text-azure text-2xl"></i></div>
                        ) : url ? (
                            <>
                                <img src={url} alt="Preview" className="w-full h-full object-contain p-1" />
                                <div className="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition flex items-center justify-center">
                                    <span className="text-white text-xs font-bold bg-black/50 px-2 py-1 rounded">Change</span>
                                </div>
                            </>
                        ) : (
                            <div className="flex flex-col items-center text-slate-400">
                                <i className="ph-bold ph-image text-3xl mb-1"></i>
                                <span className="text-[11px] font-bold">Tap to Upload</span>
                            </div>
                        )}
                        <input type="file" accept="image/*" onChange={handleUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                    </div>
                </div>
            );
        }

        // ============================================================================
        // ISOLATED FORM COMPONENT: Fixes keyboard crash by stopping App re-renders
        // ============================================================================
        function ItemEditForm({ item, formType, onSave, onCancel }) {
            // Local state so typing doesn't trigger the main App to re-render
            const [d, setD] = useState(item || {});
            
            const updateField = (field, val) => setD(prev => ({ ...prev, [field]: val }));
            
            const handleSave = () => {
                let finalData = { ...d };
                if (formType === 'article' && !finalData.title) return alert("Title required");
                if (formType === 'article' && !finalData.id) finalData.date = new Date().toISOString();
                
                if (formType === 'exercise') {
                    const tagsArray = typeof finalData.tags === 'string' ? finalData.tags.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : (finalData.tags || []);
                    finalData.tags = tagsArray;
                }
                
                onSave(finalData, formType);
            };

            const headerTitle = {
                'doctor': d.id ? "Edit Specialist" : "Add Specialist",
                'exercise': d.id ? "Edit Exercise" : "Add Exercise",
                'product': d.id ? "Edit Product" : "Add Product",
                'service': d.id ? "Edit Service" : "Add Service",
                'article': d.id ? "Edit Article" : "Write Article",
                'clinicInfo': "Website Details"
            }[formType];

            // Edge-to-Edge Form Wrapper
            const FormWrapper = ({ children }) => (
                <div className="bg-white sm:rounded-2xl sm:shadow-soft sm:border border-slate-200 flex flex-col h-[calc(100vh-56px)] sm:h-[calc(100vh-100px)] animate-in slide-in-from-right-4 absolute inset-0 sm:relative z-40">
                    <div className="px-3 sm:px-4 py-3 border-b border-slate-200 flex items-center justify-between bg-slate-50 sm:rounded-t-2xl shrink-0">
                        <h2 className="text-lg font-bold text-navy flex items-center gap-2"><button onClick={onCancel} className="flex items-center justify-center w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-500 hover:text-navy"><i className="ph-bold ph-arrow-left"></i></button> {headerTitle}</h2>
                        <button onClick={handleSave} className="px-5 py-2 rounded-lg text-sm font-bold text-white bg-azure hover:bg-navy shadow-sm transition flex items-center gap-1"><i className="ph-bold ph-floppy-disk text-lg"></i> Save</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-0 sm:p-6 bg-white sm:rounded-b-2xl">
                        <div className="max-w-3xl mx-auto space-y-5 p-4 sm:p-0">
                            {children}
                        </div>
                    </div>
                </div>
            );

            // FIELD RENDERING
            if (formType === 'doctor') {
                return (
                    <FormWrapper>
                        <ImageUploader label="Profile Photo" url={d.photoUrl} onUploadComplete={(url) => updateField('photoUrl', url)} isIcon={true} />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Name</label><input type="text" value={d.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Qualifications</label><input type="text" value={d.qualification||''} onChange={e=>updateField('qualification', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5 sm:col-span-2"><label className="text-[11px] font-bold text-slate-500 uppercase">Biography</label><textarea rows="3" value={d.details||''} onChange={e=>updateField('details', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5 sm:col-span-2 mt-2">
                                <label className="text-[11px] font-bold text-[#25D366] uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo text-base"></i> Custom WhatsApp Message</label>
                                <textarea rows="2" value={d.whatsappMsg||''} onChange={e=>updateField('whatsappMsg', e.target.value)} placeholder="Hello, I want to book an appointment with {doctor_name}." className="w-full p-3 text-sm bg-green-50 border border-green-200 rounded-lg outline-none focus:border-[#25D366]" />
                                <p className="text-[11px] text-slate-500 font-medium">Use tag: <span className="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-slate-700">{`{doctor_name}`}</span></p>
                            </div>
                        </div>
                    </FormWrapper>
                );
            }

            if (formType === 'exercise') {
                return (
                    <FormWrapper>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Exercise Name</label><input type="text" value={d.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Tags (comma separated)</label><input type="text" value={Array.isArray(d.tags)?d.tags.join(', '):(d.tags||'')} onChange={e=>updateField('tags', e.target.value)} placeholder="knee, stretch" className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                        </div>
                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Video URL (Optional)</label><input type="url" value={d.videoUrl||''} onChange={e=>updateField('videoUrl', e.target.value)} placeholder="YouTube Link" className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                        <div className="pt-2"><ImageUploader label="Exercise Illustration" url={d.imageUrl} onUploadComplete={(url) => updateField('imageUrl', url)} /></div>
                        
                        {/* EDGE-TO-EDGE EDITOR CONTAINER ON MOBILE */}
                        <div className="space-y-1.5 pt-2">
                            <label className="text-[11px] font-bold text-slate-500 uppercase">Description / Instructions</label>
                            <div className="-mx-4 sm:mx-0 mobile-edge-editor">
                                <RichTextEditor initialValue={d.description||''} onChange={html => updateField('description', html)} placeholder="Write instructions..." />
                            </div>
                        </div>
                    </FormWrapper>
                );
            }

            if (formType === 'product') {
                return (
                    <FormWrapper>
                        <ImageUploader label="Product Photo" url={d.profilePhoto} onUploadComplete={(url) => updateField('profilePhoto', url)} isIcon={true} />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Product Name</label><input type="text" value={d.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Price</label><input type="text" value={d.price||''} onChange={e=>updateField('price', e.target.value)} placeholder="₹500" className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5 sm:col-span-2"><label className="text-[11px] font-bold text-slate-500 uppercase">Description</label><textarea rows="3" value={d.description||''} onChange={e=>updateField('description', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5 sm:col-span-2 mt-2">
                                <label className="text-[11px] font-bold text-[#25D366] uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo text-base"></i> Custom WhatsApp Message</label>
                                <textarea rows="2" value={d.whatsappMsg||''} onChange={e=>updateField('whatsappMsg', e.target.value)} placeholder="Hello, I want to purchase {product_name}." className="w-full p-3 text-sm bg-green-50 border border-green-200 rounded-lg outline-none focus:border-[#25D366]" />
                                <p className="text-[11px] text-slate-500 font-medium">Use tags: <span className="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-slate-700">{`{product_name}`}</span> <span className="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-slate-700">{`{price}`}</span></p>
                            </div>
                        </div>
                    </FormWrapper>
                );
            }

            if (formType === 'service') {
                return (
                    <FormWrapper>
                        <ImageUploader label="Banner Image (Optional)" url={d.bannerImageUrl} onUploadComplete={(url) => updateField('bannerImageUrl', url)} />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Service Title</label><input type="text" value={d.title||''} onChange={e=>updateField('title', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Icon (Emoji)</label><input type="text" value={d.icon||''} onChange={e=>updateField('icon', e.target.value)} placeholder="⚕️" className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5 sm:col-span-2"><label className="text-[11px] font-bold text-slate-500 uppercase">Description</label><textarea rows="3" value={d.description||''} onChange={e=>updateField('description', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                            <div className="space-y-1.5 sm:col-span-2 mt-2">
                                <label className="text-[11px] font-bold text-[#25D366] uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo text-base"></i> Custom WhatsApp Message</label>
                                <textarea rows="2" value={d.whatsappMsg||''} onChange={e=>updateField('whatsappMsg', e.target.value)} placeholder="Hello, I want to book the {service_title} service." className="w-full p-3 text-sm bg-green-50 border border-green-200 rounded-lg outline-none focus:border-[#25D366]" />
                                <p className="text-[11px] text-slate-500 font-medium">Use tag: <span className="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-slate-700">{`{service_title}`}</span></p>
                            </div>
                        </div>
                    </FormWrapper>
                );
            }

            if (formType === 'article') {
                return (
                    <FormWrapper>
                        <ImageUploader label="Cover Image" url={d.imageUrl} onUploadComplete={(url) => updateField('imageUrl', url)} />
                        <div className="space-y-1.5 mt-2">
                            <label className="text-[11px] font-bold text-slate-500 uppercase">Article Title</label>
                            <input type="text" value={d.title||''} onChange={e=> { updateField('title', e.target.value); if(!d.id) updateField('slug', slugify(e.target.value)); }} className="w-full p-3 text-base bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure font-bold" />
                        </div>
                        <div className="space-y-1.5">
                            <label className="text-[11px] font-bold text-slate-500 uppercase">URL Slug (Auto)</label>
                            <input type="text" readOnly value={d.slug||''} className="w-full p-2.5 text-xs bg-slate-100 border border-slate-200 rounded-lg text-slate-500" />
                        </div>
                        
                        {/* EDGE-TO-EDGE EDITOR CONTAINER ON MOBILE */}
                        <div className="space-y-1.5 pt-2">
                            <label className="text-[11px] font-bold text-slate-500 uppercase">Article Content (Rich Text)</label>
                            <div className="-mx-4 sm:mx-0 mobile-edge-editor">
                                <RichTextEditor initialValue={d.content||''} onChange={html => updateField('content', html)} />
                            </div>
                        </div>
                    </FormWrapper>
                );
            }

            if (formType === 'clinicInfo') {
                return (
                    <FormWrapper>
                        <div>
                            <h3 className="font-bold text-sm text-navy mb-3 border-b pb-2">Branding</h3>
                            <ImageUploader label="Clinic Logo" url={d.logoUrl} onUploadComplete={(url) => updateField('logoUrl', url)} isIcon={true} />
                            <div className="mt-4"><ImageUploader label="Main Hero Banner" url={d.bannerImageUrl} onUploadComplete={(url) => updateField('bannerImageUrl', url)} /></div>
                        </div>
                        
                        <div className="pt-4">
                            <h3 className="font-bold text-sm text-navy mb-3 border-b pb-2">Contact Details</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Clinic Name</label><input type="text" value={d.clinicName||''} onChange={e=>updateField('clinicName', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">WhatsApp Number</label><input type="text" value={d.whatsappNumber||''} onChange={e=>updateField('whatsappNumber', e.target.value)} className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                
                                <div className="space-y-1.5 sm:col-span-2 mt-2">
                                    <label className="text-[11px] font-bold text-[#25D366] uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo text-base"></i> Global Default WhatsApp Message</label>
                                    <textarea rows="2" value={d.defaultWhatsAppMsg||''} onChange={e=>updateField('defaultWhatsAppMsg', e.target.value)} placeholder="Hello, I want to inquire about your services." className="w-full p-3 text-sm bg-green-50 border border-green-200 rounded-lg outline-none focus:border-[#25D366]" />
                                    <p className="text-[11px] text-slate-500 font-medium">This message is used if a specific product/doctor doesn't have a custom message set.</p>
                                </div>
                            </div>
                        </div>
                    </FormWrapper>
                );
            }
            
            return null;
        }

        // --- ROOT COMPONENT ---
        function AdminApp() {
            const [user, setUser] = useState(null);
            const [isConnecting, setIsConnecting] = useState(true);
            const [activeTab, setActiveTab] = useState('overview');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            const [siteData, setSiteData] = useState({ hero: {}, doctors: [], services: [], products: [], articles: [] });
            const [exercises, setExercises] = useState([]);

            const [editingItem, setEditingItem] = useState(null); 
            const [formType, setFormType] = useState(null); 
            const [searchQuery, setSearchQuery] = useState("");

            const [toast, setToast] = useState({ show: false, msg: '' });
            const showToast = (msg) => { setToast({ show: true, msg }); setTimeout(() => setToast({ show: false, msg: '' }), 3000); };

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#/', '');
                    if (hash && hash !== activeTab) { setActiveTab(hash); }
                };
                window.addEventListener('hashchange', handleHashChange);
                handleHashChange(); 

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setIsConnecting(false);
                });
                return () => { window.removeEventListener('hashchange', handleHashChange); unsubscribe(); }
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSite = onValue(ref(dbSite, 'site'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setSiteData({ hero: data.hero || {}, doctors: data.doctors || [], services: data.services || [], products: data.products || [], articles: data.articles || [] });
                    }
                });

                const unsubEx = onValue(ref(dbRecords, 'exercises'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        const exArray = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
                        setExercises(exArray);
                    } else { setExercises([]); }
                });

                return () => { unsubSite(); unsubEx(); };
            }, [user]);

            const handleLogin = async () => { try { await signInWithPopup(auth, googleProvider); } catch (e) { alert("Login failed"); } };
            const handleLogout = async () => { try { await signOut(auth); } catch (e) {} };

            const handleSaveItem = async (finalData, type) => {
                if (type === 'exercise') {
                    try {
                        if (finalData.id) { await set(ref(dbRecords, `exercises/${finalData.id}`), finalData); } 
                        else { await set(push(ref(dbRecords, 'exercises')), finalData); }
                        showToast('Exercise Saved!');
                        setEditingItem(null);
                    } catch (e) { alert("Error saving exercise"); }
                } else if (type === 'clinicInfo') {
                    try { await set(ref(dbSite, `site/hero`), finalData); showToast('Saved Successfully!'); setEditingItem(null); } 
                    catch (e) { alert("Error saving data"); }
                } else {
                    const nodeName = type + 's'; // doctor -> doctors
                    const arr = [...siteData[nodeName]];
                    if (!finalData.id) { finalData.id = Date.now(); arr.push(finalData); } 
                    else { const idx = arr.findIndex(x=>x.id===finalData.id); arr[idx]=finalData; }
                    try { await set(ref(dbSite, `site/${nodeName}`), arr); showToast('Saved Successfully!'); setEditingItem(null); } 
                    catch (e) { alert("Error saving data"); }
                }
            };

            const deleteSiteItem = async (node, arr, id) => {
                if(confirm("Are you sure you want to delete this?")) {
                    const newArr = arr.filter(item => item.id !== id);
                    try { await set(ref(dbSite, `site/${node}`), newArr); showToast('Deleted!'); } catch(e){}
                }
            };

            const deleteExercise = async (id) => {
                if(confirm("Delete this exercise permanently?")) {
                    try { await remove(ref(dbRecords, `exercises/${id}`)); showToast('Deleted!'); } catch(e){}
                }
            };

            if (isConnecting) return null;

            if (!user) {
                return (
                    <div className="min-h-screen bg-appbg flex flex-col items-center justify-center p-4">
                        <div className="max-w-sm w-full bg-surface rounded-xl shadow-soft border border-slate-200 p-8 text-center">
                            <i className="ph-bold ph-shield-check text-5xl text-azure mb-3"></i>
                            <h1 className="text-2xl font-bold text-navy mb-6">Admin Panel</h1>
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 py-3 rounded-lg font-bold hover:bg-slate-50 transition shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" className="w-5 h-5"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                                Admin Login
                            </button>
                        </div>
                    </div>
                );
            }

            const navItems = [
                { id: 'overview', icon: 'ph-squares-four', label: 'Overview' },
                { id: 'clinic', icon: 'ph-buildings', label: 'Website Details' },
                { id: 'doctors', icon: 'ph-stethoscope', label: 'Clinical Team' },
                { id: 'services', icon: 'ph-first-aid', label: 'Services' },
                { id: 'products', icon: 'ph-shopping-bag', label: 'Products' },
                { id: 'articles', icon: 'ph-article', label: 'Articles' },
                { id: 'exercises', icon: 'ph-person-simple-walk', label: 'Exercise DB' },
            ];

            const changeTab = (tab) => {
                window.location.hash = `/${tab}`;
                setEditingItem(null); 
                setSearchQuery("");
                setIsSidebarOpen(false);
            };

            const renderSidebar = () => (
                <>
                    <div className={`fixed inset-0 bg-navy/50 z-40 lg:hidden transition-opacity ${isSidebarOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsSidebarOpen(false)}></div>
                    <aside className={`sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-slate-200 flex flex-col z-50 lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                            <h2 className="text-navy font-bold text-xl flex items-center gap-2"><i className="ph-fill ph-shield-check text-azure"></i> Admin</h2>
                            <button className="lg:hidden text-slate-400 hover:text-navy" onClick={() => setIsSidebarOpen(false)}><i className="ph-bold ph-x text-xl"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto py-4">
                            <nav className="space-y-1 px-3">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => changeTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-bold text-sm transition ${activeTab === item.id ? 'bg-ice text-azure' : 'text-slate-600 hover:bg-slate-50'}`}>
                                        <i className={`ph-bold ${item.icon} text-lg`}></i> {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="p-4 border-t border-slate-100">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 bg-slate-50 text-red-600 border border-slate-200 px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-50 transition"><i className="ph-bold ph-sign-out"></i> Logout</button>
                        </div>
                    </aside>
                </>
            );

            // COMPACT LIST VIEW
            const renderList = (title, data, renderRow, onAdd) => {
                const filteredData = data.filter(item => (item.name || item.title || "").toLowerCase().includes(searchQuery.toLowerCase()));
                return (
                    <div className="animate-in fade-in">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                            <h2 className="text-xl font-bold text-navy">{title}</h2>
                            <button onClick={onAdd} className="bg-azure text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-navy transition flex items-center gap-2"><i className="ph-bold ph-plus"></i> Add New</button>
                        </div>
                        
                        <div className="bg-surface p-2.5 rounded-xl shadow-soft border border-slate-200 flex items-center gap-2 mb-4">
                            <i className="ph-bold ph-magnifying-glass text-slate-400 ml-1"></i>
                            <input type="text" placeholder={`Search ${title.toLowerCase()}...`} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-transparent outline-none text-sm text-slate-700" />
                        </div>

                        {filteredData.length === 0 ? (
                            <div className="text-center py-12 text-slate-400 text-sm bg-surface rounded-xl border border-dashed border-slate-200">No items found. Click "Add New" to start.</div>
                        ) : (
                            <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-soft">
                                {filteredData.map((item, index) => renderRow(item, index === filteredData.length - 1))}
                            </div>
                        )}
                    </div>
                );
            };

            const renderDoctorRow = (d, isLast) => (
                <div key={d.id} className={`flex items-center gap-3 p-3 ${isLast ? '' : 'border-b border-slate-100'} hover:bg-slate-50 transition`}>
                    <img src={d.photoUrl || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded-full object-cover bg-slate-100 border border-slate-200 shrink-0" />
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-sm text-navy truncate">{d.name}</h4>
                        <p className="text-[10px] text-slate-500 truncate">{d.qualification}</p>
                    </div>
                    <div className="flex items-center gap-1 shrink-0">
                        <button onClick={() => {setEditingItem(d); setFormType('doctor');}} className="p-2 text-slate-400 hover:text-azure bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('doctors', siteData.doctors, d.id)} className="p-2 text-slate-400 hover:text-red-500 bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderProductRow = (p, isLast) => (
                <div key={p.id} className={`flex items-center gap-3 p-3 ${isLast ? '' : 'border-b border-slate-100'} hover:bg-slate-50 transition`}>
                    <img src={p.profilePhoto || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded object-contain bg-white border border-slate-200 p-0.5 shrink-0" />
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-sm text-navy truncate">{p.name}</h4>
                        <p className="text-xs font-bold text-azure">{p.price}</p>
                    </div>
                    <div className="flex items-center gap-1 shrink-0">
                        <button onClick={() => {setEditingItem(p); setFormType('product');}} className="p-2 text-slate-400 hover:text-azure bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('products', siteData.products, p.id)} className="p-2 text-slate-400 hover:text-red-500 bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderServiceRow = (s, isLast) => (
                <div key={s.id} className={`flex items-center gap-3 p-3 ${isLast ? '' : 'border-b border-slate-100'} hover:bg-slate-50 transition`}>
                    {s.bannerImageUrl ? <img src={s.bannerImageUrl} className="w-10 h-10 rounded object-cover border border-slate-200 shrink-0" /> : <div className="w-10 h-10 rounded bg-slate-50 border border-slate-200 flex items-center justify-center text-lg shrink-0">{s.icon || '⚕️'}</div>}
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-sm text-navy truncate">{s.title}</h4>
                        <p className="text-[10px] text-slate-500 truncate">{(s.tests || []).length} Sub-services</p>
                    </div>
                    <div className="flex items-center gap-1 shrink-0">
                        <button onClick={() => {setEditingItem(s); setFormType('service');}} className="p-2 text-slate-400 hover:text-azure bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('services', siteData.services, s.id)} className="p-2 text-slate-400 hover:text-red-500 bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderExerciseRow = (ex, isLast) => (
                <div key={ex.id} className={`flex items-center gap-3 p-3 ${isLast ? '' : 'border-b border-slate-100'} hover:bg-slate-50 transition`}>
                    <img src={ex.imageUrl || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded object-contain bg-white border border-slate-200 p-0.5 shrink-0" />
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-sm text-navy truncate">{ex.name}</h4>
                        <p className="text-[10px] text-slate-400 truncate mt-0.5">{ex.tags ? ex.tags.join(', ') : 'No tags'}</p>
                    </div>
                    <div className="flex items-center gap-1 shrink-0">
                        <button onClick={() => {setEditingItem(ex); setFormType('exercise');}} className="p-2 text-slate-400 hover:text-azure bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteExercise(ex.id)} className="p-2 text-slate-400 hover:text-red-500 bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderArticleRow = (a, isLast) => (
                <div key={a.id || a.slug} className={`flex items-center gap-3 p-3 ${isLast ? '' : 'border-b border-slate-100'} hover:bg-slate-50 transition`}>
                    {a.imageUrl ? <img src={a.imageUrl} className="w-10 h-10 rounded object-cover border border-slate-200 shrink-0" /> : <div className="w-10 h-10 rounded bg-slate-50 border border-slate-200 flex items-center justify-center text-lg shrink-0">📄</div>}
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-sm text-navy truncate">{a.title}</h4>
                        <p className="text-[10px] text-slate-400 truncate">/{a.slug}</p>
                    </div>
                    <div className="flex items-center gap-1 shrink-0">
                        <button onClick={() => {setEditingItem(a); setFormType('article');}} className="p-2 text-slate-400 hover:text-azure bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('articles', siteData.articles, a.id)} className="p-2 text-slate-400 hover:text-red-500 bg-white border border-slate-200 rounded shadow-sm"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden bg-appbg relative">
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[9999] transition-all duration-300 ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4 pointer-events-none'}`}>
                        <div className="bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg text-sm font-bold flex items-center gap-2">
                            <i className="ph-bold ph-check-circle text-emerald-400"></i> {toast.msg}
                        </div>
                    </div>

                    {renderSidebar()}

                    <div className="flex-1 flex flex-col min-w-0 lg:pl-64 transition-all">
                        <header className="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-4 lg:hidden shrink-0 z-30 relative shadow-sm">
                            <h1 className="font-bold text-navy flex items-center gap-2 text-lg"><i className="ph-fill ph-shield-check text-azure"></i> Admin</h1>
                            <button onClick={() => setIsSidebarOpen(true)} className="p-1.5 text-slate-600 bg-slate-50 rounded border border-slate-200"><i className="ph-bold ph-list text-xl"></i></button>
                        </header>

                        <main className={`flex-1 overflow-y-auto relative ${editingItem ? 'p-0 sm:p-6' : 'p-3 md:p-6'}`}>
                            {editingItem ? (
                                <ItemEditForm 
                                    item={editingItem} 
                                    formType={formType} 
                                    onSave={handleSaveItem} 
                                    onCancel={() => setEditingItem(null)} 
                                />
                            ) : (
                                <>
                                    {activeTab === 'overview' && (
                                        <div className="animate-in fade-in space-y-4 md:space-y-6">
                                            <h2 className="text-xl font-bold text-navy">Dashboard Overview</h2>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                <div className="bg-white p-4 rounded-xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-azure transition" onClick={() => changeTab('exercises')}>
                                                    <i className="ph-fill ph-person-simple-walk text-3xl text-azure mb-1"></i>
                                                    <span className="text-2xl font-black text-navy">{exercises.length}</span>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">Exercises</span>
                                                </div>
                                                <div className="bg-white p-4 rounded-xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-emerald-500 transition" onClick={() => changeTab('doctors')}>
                                                    <i className="ph-fill ph-stethoscope text-3xl text-emerald-500 mb-1"></i>
                                                    <span className="text-2xl font-black text-navy">{siteData.doctors.length}</span>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">Doctors</span>
                                                </div>
                                                <div className="bg-white p-4 rounded-xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-purple-500 transition" onClick={() => changeTab('products')}>
                                                    <i className="ph-fill ph-shopping-bag text-3xl text-purple-500 mb-1"></i>
                                                    <span className="text-2xl font-black text-navy">{siteData.products.length}</span>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">Products</span>
                                                </div>
                                                <div className="bg-white p-4 rounded-xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-orange-500 transition" onClick={() => changeTab('articles')}>
                                                    <i className="ph-fill ph-article text-3xl text-orange-500 mb-1"></i>
                                                    <span className="text-2xl font-black text-navy">{siteData.articles.length}</span>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">Articles</span>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-white p-4 md:p-5 rounded-xl shadow-soft border border-slate-200 mt-4">
                                                <h3 className="font-bold text-sm text-navy mb-3 border-b pb-1">Quick Actions</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    <button onClick={() => {setEditingItem(siteData.hero || {}); setFormType('clinicInfo');}} className="px-3 py-1.5 bg-ice text-azure text-xs font-bold rounded-lg hover:bg-blue-200 flex items-center gap-1.5"><i className="ph-bold ph-pencil-simple"></i> Edit Website Info</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'clinic' && (
                                        <div className="animate-in fade-in">
                                            <div className="flex justify-between items-center mb-4">
                                                <h2 className="text-xl font-bold text-navy">Website Details</h2>
                                                <button onClick={() => {setEditingItem(siteData.hero || {}); setFormType('clinicInfo');}} className="bg-azure text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-navy transition flex items-center gap-1.5"><i className="ph-bold ph-pencil-simple"></i> Edit Info</button>
                                            </div>
                                            <div className="bg-white p-4 md:p-6 rounded-xl shadow-soft border border-slate-200 space-y-4">
                                                <div className="flex items-center gap-4 border-b pb-4"><img src={siteData.hero.logoUrl || '/favicon.png'} className="w-12 h-12 rounded bg-slate-50 object-contain p-1 border border-slate-200" /> <div><p className="text-[10px] font-bold text-slate-400 uppercase">Clinic Name</p><p className="font-bold text-base text-navy">{siteData.hero.clinicName || 'Not Set'}</p></div></div>
                                                <div><p className="text-[10px] font-bold text-slate-400 uppercase">WhatsApp Number</p><p className="font-medium text-sm text-slate-800">{siteData.hero.whatsappNumber || 'Not Set'}</p></div>
                                                <div><p className="text-[10px] font-bold text-[#25D366] uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo text-sm"></i> Global Default Message</p><p className="font-medium text-sm text-slate-800">{siteData.hero.defaultWhatsAppMsg || 'Not Set'}</p></div>
                                                <div><p className="text-[10px] font-bold text-slate-400 uppercase">Main Banner</p><img src={siteData.hero.bannerImageUrl} className="w-full max-w-xs rounded-lg mt-1 border border-slate-200" /></div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'doctors' && renderList("Clinical Team", siteData.doctors, renderDoctorRow, () => {setEditingItem({name:''}); setFormType('doctor');})}
                                    {activeTab === 'services' && renderList("Services", siteData.services, renderServiceRow, () => {setEditingItem({title:''}); setFormType('service');})}
                                    {activeTab === 'products' && renderList("Wellness Products", siteData.products, renderProductRow, () => {setEditingItem({name:'', price:''}); setFormType('product');})}
                                    {activeTab === 'articles' && renderList("Health Articles", siteData.articles, renderArticleRow, () => {setEditingItem({title:'', content:''}); setFormType('article');})}
                                    {activeTab === 'exercises' && renderList("Exercise DB", exercises, renderExerciseRow, () => {setEditingItem({name:'', tags:''}); setFormType('exercise');})}
                                </>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
