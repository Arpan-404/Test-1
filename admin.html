<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#0f172a', primary: '#2563eb', surface: '#ffffff', appbg: '#f8fafc', border: '#e2e8f0' },
            boxShadow: { 'soft': '0 4px 15px rgba(15, 23, 42, 0.04)', 'float': '0 -4px 15px rgba(0,0,0,0.05)' }
          }
        }
      }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #334155; overflow-x: hidden;}
        .h-scroll::-webkit-scrollbar { display: none; }
        .h-scroll { scrollbar-width: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loader { width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        
        /* Sidebar transition for mobile */
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root">
        <div class="h-screen flex flex-col justify-center items-center">
            <div class="loader mb-4 w-10 h-10 border-4"></div>
            <div class="font-bold text-navy">Loading Admin Panel...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // App 1: Clinic Site Data
        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "clinic-bdf92.firebaseapp.com",
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };

        // App 2: Exercises Database
        const recordsConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            databaseURL: "https://patient-records-arpan-default-rtdb.firebaseio.com"
        };

        const appSite = initializeApp(siteConfig, "AppSite");
        const auth = getAuth(appSite);
        const dbSite = getDatabase(appSite);
        
        const appRecords = initializeApp(recordsConfig, "AppRecords");
        const dbRecords = getDatabase(appRecords);

        const googleProvider = new GoogleAuthProvider();

        const slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

        // --- REUSABLE IMAGE UPLOADER COMPONENT ---
        function ImageUploader({ url, onUploadComplete, label, isIcon = false }) {
            const [isUploading, setIsUploading] = useState(false);
            
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                const formData = new FormData(); 
                formData.append('file', file); 
                formData.append('upload_preset', 'Physio_uploads');
                
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/dyuni0dx5/image/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.secure_url) onUploadComplete(data.secure_url);
                } catch (err) { alert("Upload failed."); }
                setIsUploading(false);
            };

            return (
                <div className="w-full">
                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">{label}</label>
                    <div className={`relative border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 flex items-center justify-center overflow-hidden hover:bg-slate-100 transition cursor-pointer ${isIcon ? 'w-24 h-24' : 'w-full h-40'}`}>
                        {isUploading ? (
                            <div className="flex flex-col items-center"><div className="loader"></div><span className="text-[10px] mt-2 font-bold text-slate-500">Uploading...</span></div>
                        ) : url ? (
                            <>
                                <img src={url} alt="Preview" className="w-full h-full object-contain p-1" />
                                <div className="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition flex items-center justify-center">
                                    <span className="text-white text-xs font-bold bg-black/50 px-2 py-1 rounded">Change</span>
                                </div>
                            </>
                        ) : (
                            <div className="flex flex-col items-center text-slate-400">
                                <i className="ph-bold ph-image text-2xl mb-1"></i>
                                <span className="text-[10px] font-bold">Click to Upload</span>
                            </div>
                        )}
                        <input type="file" accept="image/*" onChange={handleUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                    </div>
                </div>
            );
        }

        // --- MAIN ADMIN APP ---
        function AdminApp() {
            const [user, setUser] = useState(null);
            const [isConnecting, setIsConnecting] = useState(true);
            const [activeTab, setActiveTab] = useState('overview');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            // Databases
            const [siteData, setSiteData] = useState({ hero: {}, doctors: [], services: [], products: [], articles: [] });
            const [exercises, setExercises] = useState([]);

            // Form States
            const [editingItem, setEditingItem] = useState(null); // The item being edited
            const [formType, setFormType] = useState(null); // 'doctor', 'service', 'product', 'article', 'exercise'
            const [searchQuery, setSearchQuery] = useState("");

            // Toast
            const [toast, setToast] = useState({ show: false, msg: '' });
            const showToast = (msg) => { setToast({ show: true, msg }); setTimeout(() => setToast({ show: false, msg: '' }), 3000); };

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setIsConnecting(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Fetch Site Data
                const unsubSite = onValue(ref(dbSite, 'site'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setSiteData({
                            hero: data.hero || {},
                            doctors: data.doctors || [],
                            services: data.services || [],
                            products: data.products || [],
                            articles: data.articles || []
                        });
                    }
                });

                // Fetch Exercises Data
                const unsubEx = onValue(ref(dbRecords, 'exercises'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        const exArray = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
                        setExercises(exArray);
                    } else {
                        setExercises([]);
                    }
                });

                return () => { unsubSite(); unsubEx(); };
            }, [user]);

            const handleLogin = async () => { try { await signInWithPopup(auth, googleProvider); } catch (e) { alert("Login failed"); } };
            const handleLogout = async () => { try { await signOut(auth); } catch (e) {} };

            // Data Mutators
            const saveSiteData = async (node, data) => {
                try { await set(ref(dbSite, `site/${node}`), data); showToast('Saved Successfully!'); setEditingItem(null); } 
                catch (e) { alert("Error saving data"); }
            };

            const deleteSiteItem = async (node, arr, id) => {
                if(confirm("Are you sure you want to delete this?")) {
                    const newArr = arr.filter(item => item.id !== id);
                    saveSiteData(node, newArr);
                }
            };

            const saveExercise = async (data) => {
                try {
                    if (data.id) { await set(ref(dbRecords, `exercises/${data.id}`), data); } 
                    else { await set(push(ref(dbRecords, 'exercises')), data); }
                    showToast('Exercise Saved!');
                    setEditingItem(null);
                } catch (e) { alert("Error saving exercise"); }
            };

            const deleteExercise = async (id) => {
                if(confirm("Delete this exercise permanently?")) {
                    try { await remove(ref(dbRecords, `exercises/${id}`)); showToast('Deleted!'); } 
                    catch(e) { alert("Error deleting."); }
                }
            };

            if (isConnecting) return null;

            if (!user) {
                return (
                    <div className="min-h-screen bg-appbg flex flex-col items-center justify-center p-4">
                        <div className="max-w-sm w-full bg-surface rounded-xl shadow-soft border border-slate-200 p-8 text-center">
                            <i className="ph-bold ph-shield-check text-5xl text-primary mb-3"></i>
                            <h1 className="text-2xl font-bold text-navy mb-6">Admin Panel</h1>
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 py-3 rounded-lg font-bold hover:bg-slate-50 transition shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" className="w-5 h-5"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                                Admin Login
                            </button>
                        </div>
                    </div>
                );
            }

            // --- TABS & NAVIGATION ---
            const navItems = [
                { id: 'overview', icon: 'ph-squares-four', label: 'Overview' },
                { id: 'clinic', icon: 'ph-buildings', label: 'Website Details' },
                { id: 'doctors', icon: 'ph-stethoscope', label: 'Clinical Team' },
                { id: 'services', icon: 'ph-first-aid', label: 'Services' },
                { id: 'products', icon: 'ph-shopping-bag', label: 'Products' },
                { id: 'articles', icon: 'ph-article', label: 'Articles' },
                { id: 'exercises', icon: 'ph-person-simple-walk', label: 'Exercise DB' },
            ];

            const changeTab = (tab) => {
                setActiveTab(tab);
                setEditingItem(null); // Reset form when switching tabs
                setSearchQuery("");
                setIsSidebarOpen(false);
            };

            const renderSidebar = () => (
                <>
                    {/* Mobile Overlay */}
                    <div className={`fixed inset-0 bg-navy/50 z-40 lg:hidden transition-opacity ${isSidebarOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsSidebarOpen(false)}></div>
                    
                    {/* Sidebar */}
                    <aside className={`sidebar fixed top-0 left-0 h-full w-64 bg-navy text-slate-300 flex flex-col z-50 lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b border-slate-800 flex justify-between items-center">
                            <h2 className="text-white font-bold text-xl flex items-center gap-2"><i className="ph-fill ph-shield-check text-primary"></i> Admin</h2>
                            <button className="lg:hidden text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}><i className="ph-bold ph-x text-xl"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto py-4">
                            <nav className="space-y-1 px-3">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => changeTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-semibold transition ${activeTab === item.id ? 'bg-primary text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                        <i className={`ph-bold ${item.icon} text-lg`}></i> {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg font-bold hover:bg-slate-700 transition"><i className="ph-bold ph-sign-out"></i> Logout</button>
                        </div>
                    </aside>
                </>
            );

            // --- LIST VIEWS ---
            const renderList = (title, data, renderCard, onAdd) => {
                const filteredData = data.filter(item => (item.name || item.title || "").toLowerCase().includes(searchQuery.toLowerCase()));
                return (
                    <div className="animate-in fade-in">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                            <h2 className="text-2xl font-bold text-navy">{title}</h2>
                            <button onClick={onAdd} className="bg-primary text-white px-5 py-2 rounded-xl font-bold shadow-sm hover:bg-blue-700 transition flex items-center gap-2"><i className="ph-bold ph-plus"></i> Add New</button>
                        </div>
                        
                        <div className="bg-surface rounded-2xl shadow-soft border border-slate-200 p-4 mb-6">
                            <div className="relative">
                                <i className="ph-bold ph-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
                                <input type="text" placeholder={`Search ${title.toLowerCase()}...`} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-10 pr-4 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-sm" />
                            </div>
                        </div>

                        {filteredData.length === 0 ? (
                            <div className="text-center py-12 text-slate-500 bg-surface rounded-2xl border border-dashed border-slate-300">No items found. Click "Add New" to start.</div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                                {filteredData.map(item => renderCard(item))}
                            </div>
                        )}
                    </div>
                );
            };

            const renderDoctorCard = (d) => (
                <div key={d.id} className="bg-surface border border-slate-200 p-4 rounded-xl shadow-sm flex items-center gap-4">
                    <img src={d.photoUrl || 'https://via.placeholder.com/150'} className="w-16 h-16 rounded-full object-cover bg-slate-100" />
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-navy truncate">{d.name}</h4>
                        <p className="text-xs text-slate-500 truncate">{d.qualification}</p>
                    </div>
                    <div className="flex flex-col gap-2 border-l border-slate-100 pl-3">
                        <button onClick={() => {setEditingItem(d); setFormType('doctor');}} className="text-slate-400 hover:text-primary"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('doctors', siteData.doctors, d.id)} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderProductCard = (p) => (
                <div key={p.id} className="bg-surface border border-slate-200 p-3 rounded-xl shadow-sm flex items-center gap-3">
                    <img src={p.profilePhoto || 'https://via.placeholder.com/150'} className="w-16 h-16 rounded-lg object-contain bg-slate-50 p-1" />
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-navy truncate text-sm">{p.name}</h4>
                        <p className="text-xs font-bold text-primary">{p.price}</p>
                    </div>
                    <div className="flex flex-col gap-2 border-l border-slate-100 pl-3">
                        <button onClick={() => {setEditingItem(p); setFormType('product');}} className="text-slate-400 hover:text-primary"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('products', siteData.products, p.id)} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderExerciseCard = (ex) => (
                <div key={ex.id} className="bg-surface border border-slate-200 p-3 rounded-xl shadow-sm flex items-center gap-3">
                    <img src={ex.imageUrl || 'https://via.placeholder.com/150'} className="w-16 h-16 rounded-lg object-contain bg-slate-50 p-1" />
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-navy truncate text-sm">{ex.name}</h4>
                        <p className="text-[10px] text-slate-400 truncate">{ex.tags ? ex.tags.join(', ') : 'No tags'}</p>
                    </div>
                    <div className="flex flex-col gap-2 border-l border-slate-100 pl-3">
                        <button onClick={() => {setEditingItem(ex); setFormType('exercise');}} className="text-slate-400 hover:text-primary"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteExercise(ex.id)} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderServiceCard = (s) => (
                <div key={s.id} className="bg-surface border border-slate-200 p-4 rounded-xl shadow-sm flex items-center gap-4">
                    {s.bannerImageUrl ? <img src={s.bannerImageUrl} className="w-16 h-16 rounded-lg object-cover" /> : <div className="w-16 h-16 rounded-lg bg-slate-100 flex items-center justify-center text-2xl">{s.icon || '⚕️'}</div>}
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-navy truncate">{s.title}</h4>
                        <p className="text-xs text-slate-500 truncate">{(s.tests || []).length} Sub-services</p>
                    </div>
                    <div className="flex flex-col gap-2 border-l border-slate-100 pl-3">
                        <button onClick={() => {setEditingItem(s); setFormType('service');}} className="text-slate-400 hover:text-primary"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('services', siteData.services, s.id)} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            const renderArticleCard = (a) => (
                <div key={a.id || a.slug} className="bg-surface border border-slate-200 p-4 rounded-xl shadow-sm flex items-center gap-4">
                    {a.imageUrl ? <img src={a.imageUrl} className="w-16 h-16 rounded-lg object-cover" /> : <div className="w-16 h-16 rounded-lg bg-slate-100 flex items-center justify-center text-2xl">📄</div>}
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-navy truncate">{a.title}</h4>
                        <p className="text-xs text-slate-500 truncate">/{a.slug}</p>
                    </div>
                    <div className="flex flex-col gap-2 border-l border-slate-100 pl-3">
                        <button onClick={() => {setEditingItem(a); setFormType('article');}} className="text-slate-400 hover:text-primary"><i className="ph-bold ph-pencil-simple"></i></button>
                        <button onClick={() => deleteSiteItem('articles', siteData.articles, a.id)} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            // --- FORM WRAPPER (Sticky Save Button) ---
            const FormWrapper = ({ title, onSave, onCancel, children }) => (
                <div className="bg-surface rounded-2xl shadow-soft border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-100px)] animate-in slide-in-from-right-4">
                    <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-white z-10">
                        <h2 className="text-xl font-bold text-navy flex items-center gap-2"><button onClick={onCancel} className="text-slate-400 hover:text-navy"><i className="ph-bold ph-arrow-left"></i></button> {title}</h2>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 bg-slate-50/50">
                        <div className="max-w-3xl mx-auto space-y-6">
                            {children}
                        </div>
                    </div>
                    <div className="p-4 border-t border-slate-200 bg-white flex justify-end gap-3 sticky bottom-0 z-20 shadow-float">
                        <button onClick={onCancel} className="px-6 py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition">Cancel</button>
                        <button onClick={onSave} className="px-8 py-2.5 rounded-xl font-bold text-white bg-primary hover:bg-blue-700 shadow-sm transition flex items-center gap-2"><i className="ph-bold ph-floppy-disk"></i> Save Changes</button>
                    </div>
                </div>
            );


            // --- SPECIFIC FORMS ---
            const renderEditForm = () => {
                if (!editingItem) return null;
                const d = editingItem;

                const updateField = (field, val) => setEditingItem({ ...d, [field]: val });

                if (formType === 'doctor') {
                    return (
                        <FormWrapper title={d.id ? "Edit Specialist" : "Add Specialist"} onCancel={() => setEditingItem(null)} onSave={() => {
                            const arr = [...siteData.doctors];
                            if(!d.id) { d.id = Date.now(); arr.push(d); } else { const idx = arr.findIndex(x=>x.id===d.id); arr[idx]=d; }
                            saveSiteData('doctors', arr);
                        }}>
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <ImageUploader label="Profile Photo" url={d.photoUrl} onUploadComplete={(url) => updateField('photoUrl', url)} isIcon={true} />
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                                    <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Name</label><input type="text" value={d.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                    <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Qualifications</label><input type="text" value={d.qualification||''} onChange={e=>updateField('qualification', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                    <div className="space-y-1 sm:col-span-2"><label className="text-xs font-bold text-slate-500 uppercase">Biography / Details</label><textarea rows="3" value={d.details||''} onChange={e=>updateField('details', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                </div>
                            </div>
                        </FormWrapper>
                    );
                }

                if (formType === 'exercise') {
                    return (
                        <FormWrapper title={d.id ? "Edit Exercise" : "Add Exercise"} onCancel={() => setEditingItem(null)} onSave={() => {
                            const tagsArray = typeof d.tags === 'string' ? d.tags.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : (d.tags||[]);
                            saveExercise({ ...d, tags: tagsArray });
                        }}>
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
                                <ImageUploader label="Exercise Illustration" url={d.imageUrl} onUploadComplete={(url) => updateField('imageUrl', url)} />
                                <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Exercise Name</label><input type="text" value={d.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Description / Instructions</label><textarea rows="3" value={d.description||''} onChange={e=>updateField('description', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Tags (comma separated)</label><input type="text" value={Array.isArray(d.tags)?d.tags.join(', '):(d.tags||'')} onChange={e=>updateField('tags', e.target.value)} placeholder="knee, back, stretching" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Video URL (Optional)</label><input type="url" value={d.videoUrl||''} onChange={e=>updateField('videoUrl', e.target.value)} placeholder="YouTube Link" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                            </div>
                        </FormWrapper>
                    );
                }

                if (formType === 'product') {
                    return (
                        <FormWrapper title={d.id ? "Edit Product" : "Add Product"} onCancel={() => setEditingItem(null)} onSave={() => {
                            const arr = [...siteData.products];
                            if(!d.id) { d.id = Date.now(); arr.push(d); } else { const idx = arr.findIndex(x=>x.id===d.id); arr[idx]=d; }
                            saveSiteData('products', arr);
                        }}>
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
                                <ImageUploader label="Main Product Photo" url={d.profilePhoto} onUploadComplete={(url) => updateField('profilePhoto', url)} isIcon={true} />
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                                    <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Product Name</label><input type="text" value={d.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                    <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Price</label><input type="text" value={d.price||''} onChange={e=>updateField('price', e.target.value)} placeholder="₹500" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                    <div className="space-y-1 sm:col-span-2"><label className="text-xs font-bold text-slate-500 uppercase">Description</label><textarea rows="4" value={d.description||''} onChange={e=>updateField('description', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                </div>
                            </div>
                        </FormWrapper>
                    );
                }

                if (formType === 'service') {
                    return (
                        <FormWrapper title={d.id ? "Edit Service" : "Add Service"} onCancel={() => setEditingItem(null)} onSave={() => {
                            const arr = [...siteData.services];
                            if(!d.id) { d.id = Date.now(); arr.push(d); } else { const idx = arr.findIndex(x=>x.id===d.id); arr[idx]=d; }
                            saveSiteData('services', arr);
                        }}>
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
                                <ImageUploader label="Banner Image (Optional)" url={d.bannerImageUrl} onUploadComplete={(url) => updateField('bannerImageUrl', url)} />
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                                    <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Service Title</label><input type="text" value={d.title||''} onChange={e=>updateField('title', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                    <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Small Icon (Emoji)</label><input type="text" value={d.icon||''} onChange={e=>updateField('icon', e.target.value)} placeholder="⚕️" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                    <div className="space-y-1 sm:col-span-2"><label className="text-xs font-bold text-slate-500 uppercase">Description</label><textarea rows="3" value={d.description||''} onChange={e=>updateField('description', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                </div>
                            </div>
                        </FormWrapper>
                    );
                }

                if (formType === 'article') {
                    return (
                        <FormWrapper title={d.id ? "Edit Article" : "Write Article"} onCancel={() => setEditingItem(null)} onSave={() => {
                            if(!d.title) return alert("Title required");
                            const arr = [...siteData.articles];
                            if(!d.id) { d.id = Date.now(); d.date = new Date().toISOString(); arr.push(d); } else { const idx = arr.findIndex(x=>x.id===d.id); arr[idx]=d; }
                            saveSiteData('articles', arr);
                        }}>
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
                                <ImageUploader label="Cover Image" url={d.imageUrl} onUploadComplete={(url) => updateField('imageUrl', url)} />
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">Article Title</label>
                                    <input type="text" value={d.title||''} onChange={e=> { updateField('title', e.target.value); if(!d.id) updateField('slug', slugify(e.target.value)); }} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary font-bold text-lg" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">URL Slug (Auto)</label>
                                    <input type="text" readOnly value={d.slug||''} className="w-full p-2 bg-slate-100 border border-slate-200 rounded-lg text-slate-500 text-sm" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">Article Content</label>
                                    <textarea rows="12" value={d.content||''} onChange={e=>updateField('content', e.target.value)} placeholder="Write your article here..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary font-serif" />
                                </div>
                            </div>
                        </FormWrapper>
                    );
                }

                if (formType === 'clinicInfo') {
                    return (
                        <FormWrapper title="Website Details" onCancel={() => setEditingItem(null)} onSave={() => saveSiteData('hero', d)}>
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-6">
                                <div>
                                    <h3 className="font-bold text-navy mb-4 border-b pb-2">Branding</h3>
                                    <ImageUploader label="Clinic Logo" url={d.logoUrl} onUploadComplete={(url) => updateField('logoUrl', url)} isIcon={true} />
                                    <div className="mt-4"><ImageUploader label="Main Hero Banner" url={d.bannerImageUrl} onUploadComplete={(url) => updateField('bannerImageUrl', url)} /></div>
                                </div>
                                
                                <div>
                                    <h3 className="font-bold text-navy mb-4 border-b pb-2">Contact & Texts</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">Clinic Name</label><input type="text" value={d.clinicName||''} onChange={e=>updateField('clinicName', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                        <div className="space-y-1"><label className="text-xs font-bold text-slate-500 uppercase">WhatsApp Number</label><input type="text" value={d.whatsappNumber||''} onChange={e=>updateField('whatsappNumber', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-primary" /></div>
                                    </div>
                                </div>
                            </div>
                        </FormWrapper>
                    );
                }
            };

            // --- MAIN RENDER ---
            return (
                <div className="flex h-screen overflow-hidden relative">
                    
                    {/* Toast */}
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[9999] transition-all duration-300 ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4 pointer-events-none'}`}>
                        <div className="bg-emerald-500 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2">
                            <i className="ph-bold ph-check-circle"></i> {toast.msg}
                        </div>
                    </div>

                    {renderSidebar()}

                    <div className="flex-1 flex flex-col min-w-0 lg:pl-64 transition-all">
                        {/* Top Header Mobile */}
                        <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 lg:hidden shrink-0 z-30 relative">
                            <h1 className="font-bold text-navy flex items-center gap-2"><i className="ph-fill ph-shield-check text-primary"></i> Admin</h1>
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-slate-600"><i className="ph-bold ph-list text-2xl"></i></button>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 md:p-8 relative">
                            {editingItem ? renderEditForm() : (
                                <>
                                    {activeTab === 'overview' && (
                                        <div className="animate-in fade-in space-y-6">
                                            <h2 className="text-2xl font-bold text-navy">Dashboard Overview</h2>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <div className="bg-white p-6 rounded-2xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-primary transition" onClick={() => changeTab('exercises')}>
                                                    <i className="ph-fill ph-person-simple-walk text-4xl text-blue-500 mb-2"></i>
                                                    <span className="text-3xl font-black text-navy">{exercises.length}</span>
                                                    <span className="text-xs font-bold text-slate-500 uppercase mt-1">Exercises</span>
                                                </div>
                                                <div className="bg-white p-6 rounded-2xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-primary transition" onClick={() => changeTab('doctors')}>
                                                    <i className="ph-fill ph-stethoscope text-4xl text-emerald-500 mb-2"></i>
                                                    <span className="text-3xl font-black text-navy">{siteData.doctors.length}</span>
                                                    <span className="text-xs font-bold text-slate-500 uppercase mt-1">Doctors</span>
                                                </div>
                                                <div className="bg-white p-6 rounded-2xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-primary transition" onClick={() => changeTab('products')}>
                                                    <i className="ph-fill ph-shopping-bag text-4xl text-purple-500 mb-2"></i>
                                                    <span className="text-3xl font-black text-navy">{siteData.products.length}</span>
                                                    <span className="text-xs font-bold text-slate-500 uppercase mt-1">Products</span>
                                                </div>
                                                <div className="bg-white p-6 rounded-2xl shadow-soft border border-slate-200 flex flex-col items-center justify-center text-center cursor-pointer hover:border-primary transition" onClick={() => changeTab('articles')}>
                                                    <i className="ph-fill ph-article text-4xl text-orange-500 mb-2"></i>
                                                    <span className="text-3xl font-black text-navy">{siteData.articles.length}</span>
                                                    <span className="text-xs font-bold text-slate-500 uppercase mt-1">Articles</span>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-white p-6 rounded-2xl shadow-soft border border-slate-200 mt-6">
                                                <h3 className="font-bold text-navy mb-4 border-b pb-2">Quick Actions</h3>
                                                <div className="flex flex-wrap gap-3">
                                                    <button onClick={() => {setEditingItem(siteData.hero || {}); setFormType('clinicInfo');}} className="px-4 py-2 bg-slate-100 text-navy font-bold rounded-lg hover:bg-slate-200 flex items-center gap-2"><i className="ph-bold ph-pencil-simple"></i> Edit Website Info</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'clinic' && (
                                        <div className="animate-in fade-in">
                                            <div className="flex justify-between items-center mb-6">
                                                <h2 className="text-2xl font-bold text-navy">Website Details</h2>
                                                <button onClick={() => {setEditingItem(siteData.hero || {}); setFormType('clinicInfo');}} className="bg-primary text-white px-5 py-2 rounded-xl font-bold shadow-sm hover:bg-blue-700 transition flex items-center gap-2"><i className="ph-bold ph-pencil-simple"></i> Edit Info</button>
                                            </div>
                                            <div className="bg-white p-6 rounded-2xl shadow-soft border border-slate-200 space-y-4">
                                                <div className="flex items-center gap-4 border-b pb-4"><img src={siteData.hero.logoUrl || '/favicon.png'} className="w-16 h-16 rounded bg-slate-50 object-contain p-1" /> <div><p className="text-xs font-bold text-slate-500 uppercase">Clinic Name</p><p className="font-bold text-lg text-navy">{siteData.hero.clinicName || 'Not Set'}</p></div></div>
                                                <div><p className="text-xs font-bold text-slate-500 uppercase">WhatsApp Number</p><p className="font-medium text-slate-800">{siteData.hero.whatsappNumber || 'Not Set'}</p></div>
                                                <div><p className="text-xs font-bold text-slate-500 uppercase">Main Banner</p><img src={siteData.hero.bannerImageUrl} className="w-full max-w-sm rounded-lg mt-1 border" /></div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'doctors' && renderList("Clinical Team", siteData.doctors, renderDoctorCard, () => {setEditingItem({name:''}); setFormType('doctor');})}
                                    {activeTab === 'services' && renderList("Services", siteData.services, renderServiceCard, () => {setEditingItem({title:''}); setFormType('service');})}
                                    {activeTab === 'products' && renderList("Wellness Products", siteData.products, renderProductCard, () => {setEditingItem({name:'', price:''}); setFormType('product');})}
                                    {activeTab === 'articles' && renderList("Health Articles", siteData.articles, renderArticleCard, () => {setEditingItem({title:'', content:''}); setFormType('article');})}
                                    {activeTab === 'exercises' && renderList("Rehabilitation Exercises", exercises, renderExerciseCard, () => {setEditingItem({name:'', tags:''}); setFormType('exercise');})}
                                </>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
