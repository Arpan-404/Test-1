<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Quill Editor CSS & JS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f4f7fb', surface: '#ffffff' },
            boxShadow: { 'soft': '0 2px 10px rgba(29, 78, 216, 0.05)', 'float': '0 -4px 15px rgba(0,0,0,0.05)' }
          }
        }
      }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #0f172a; overflow-x: hidden;}
        
        .h-scroll::-webkit-scrollbar { display: none; }
        .h-scroll { scrollbar-width: none; }
        
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }
        
        /* Mobile Edge-to-Edge Quill Overrides */
        @media (max-width: 639px) {
            .mobile-edge-quill .ql-toolbar { border-left: none !important; border-right: none !important; border-radius: 0 !important; }
            .mobile-edge-quill .ql-container { border-left: none !important; border-right: none !important; border-radius: 0 !important; border-bottom: none !important; }
            .form-edge { padding-left: 0 !important; padding-right: 0 !important; border-radius: 0 !important; border-left: none !important; border-right: none !important; }
            .field-pad { padding-left: 1rem; padding-right: 1rem; }
        }
        
        /* Clean Quill Container */
        .ql-editor { min-height: 250px; font-size: 16px; font-family: inherit; line-height: 1.6; }
        .ql-toolbar { background: #f8fafc; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; border-color: #e2e8f0 !important; }
        .ql-container { border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; border-color: #e2e8f0 !important; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #1e3a8a;">
            <div class="native-loader"></div>
            <div style="font-weight: bold;">Loading Admin...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useCallback } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // --- FIREBASE CONFIG ---
        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "clinic-bdf92.firebaseapp.com",
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };

        const recordsConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            databaseURL: "https://patient-records-arpan-default-rtdb.firebaseio.com"
        };

        const appSite = initializeApp(siteConfig, "AppSite");
        const auth = getAuth(appSite);
        const dbSite = getDatabase(appSite);
        
        const appRecords = initializeApp(recordsConfig, "AppRecords");
        const dbRecords = getDatabase(appRecords);
        const googleProvider = new GoogleAuthProvider();

        const slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

        // --- CLOUDINARY UPLOAD HELPER ---
        const uploadToCloudinary = async (file, type = 'image') => {
            const formData = new FormData(); 
            formData.append('file', file); 
            formData.append('upload_preset', 'Physio_uploads');
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/dyuni0dx5/${type}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.secure_url) {
                    // Optimize images automatically
                    if(type === 'image') return data.secure_url.replace('/upload/', '/upload/q_auto,f_auto/');
                    return data.secure_url;
                }
            } catch (err) { alert("Upload failed."); }
            return null;
        };


        // --- COMPONENT: QUILL EDITOR ---
        function QuillEditor({ value, onChange, placeholder }) {
            const editorRef = useRef(null);
            const quillInstance = useRef(null);

            useEffect(() => {
                if (!quillInstance.current && editorRef.current) {
                    quillInstance.current = new Quill(editorRef.current, {
                        theme: 'snow',
                        placeholder: placeholder || 'Write content here...',
                        modules: {
                            toolbar: {
                                container: [
                                    [{ 'header': [2, 3, false] }],
                                    ['bold', 'italic', 'underline', 'strike'],
                                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                    ['link', 'image', 'video'],
                                    ['clean']
                                ],
                                handlers: {
                                    image: function() {
                                        const input = document.createElement('input');
                                        input.setAttribute('type', 'file');
                                        input.setAttribute('accept', 'image/*');
                                        input.click();
                                        input.onchange = async () => {
                                            const file = input.files[0];
                                            if (file) {
                                                const range = this.quill.getSelection(true);
                                                this.quill.insertText(range.index, 'Uploading image...', 'user');
                                                const url = await uploadToCloudinary(file);
                                                this.quill.deleteText(range.index, 18); // remove 'uploading...'
                                                if (url) {
                                                    this.quill.insertEmbed(range.index, 'image', url);
                                                }
                                            }
                                        };
                                    }
                                }
                            }
                        }
                    });

                    // Set initial value
                    if (value) quillInstance.current.root.innerHTML = value;

                    // Listen for changes
                    quillInstance.current.on('text-change', () => {
                        onChange(quillInstance.current.root.innerHTML);
                    });
                }
            }, []);

            return <div className="mobile-edge-quill w-full bg-white"><div ref={editorRef}></div></div>;
        }


        // --- COMPONENT: IMAGE UPLOADER ---
        function ImageUploader({ url, onUploadComplete, label, isIcon = false }) {
            const [isUploading, setIsUploading] = useState(false);
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                const finalUrl = await uploadToCloudinary(file);
                if (finalUrl) onUploadComplete(finalUrl);
                setIsUploading(false);
            };

            return (
                <div className="w-full">
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1.5">{label}</label>
                    <div className={`relative border border-dashed border-slate-300 rounded-xl bg-slate-50 flex items-center justify-center overflow-hidden hover:bg-slate-100 transition cursor-pointer ${isIcon ? 'w-20 h-20' : 'w-full h-32'}`}>
                        {isUploading ? (
                            <div className="flex flex-col items-center"><div className="w-5 h-5 border-2 border-slate-200 border-t-azure rounded-full animate-spin"></div></div>
                        ) : url ? (
                            <>
                                <img src={url} alt="Preview" className="w-full h-full object-contain p-1" />
                                <div className="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition flex items-center justify-center">
                                    <span className="text-white text-[10px] font-bold bg-black/50 px-2 py-1 rounded">Change</span>
                                </div>
                            </>
                        ) : (
                            <div className="flex flex-col items-center text-slate-400">
                                <i className="ph-bold ph-image text-xl mb-1"></i>
                                <span className="text-[10px] font-bold">Upload</span>
                            </div>
                        )}
                        <input type="file" accept="image/*" onChange={handleUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                    </div>
                </div>
            );
        }

        // --- MAIN ADMIN APP ---
        function AdminApp() {
            const [user, setUser] = useState(null);
            const [isConnecting, setIsConnecting] = useState(true);
            const [activeHash, setActiveHash] = useState(window.location.hash || '#/overview');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            // Databases
            const [siteData, setSiteData] = useState({ hero: {}, doctors: [], services: [], products: [], articles: [] });
            const [exercises, setExercises] = useState([]);

            // Form States
            const [editingItem, setEditingItem] = useState(null); 
            const [formType, setFormType] = useState(null); 
            const [searchQuery, setSearchQuery] = useState("");

            // Toast
            const [toast, setToast] = useState({ show: false, msg: '' });
            const showToast = (msg) => { setToast({ show: true, msg }); setTimeout(() => setToast({ show: false, msg: '' }), 3000); };

            // Handle Hash Routing manually
            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash || '#/overview';
                    setActiveHash(hash);
                    setEditingItem(null); // Close forms on nav
                    setSearchQuery("");
                    setIsSidebarOpen(false);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setIsConnecting(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSite = onValue(ref(dbSite, 'site'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setSiteData({
                            hero: data.hero || {},
                            doctors: data.doctors || [],
                            services: data.services || [],
                            products: data.products || [],
                            articles: data.articles || []
                        });
                    }
                });
                const unsubEx = onValue(ref(dbRecords, 'exercises'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        setExercises(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    } else setExercises([]);
                });
                return () => { unsubSite(); unsubEx(); };
            }, [user]);

            const handleLogin = async () => { try { await signInWithPopup(auth, googleProvider); } catch (e) { alert("Login failed"); } };
            const handleLogout = async () => { try { await signOut(auth); } catch (e) {} };

            // Data Mutators
            const saveSiteData = async (node, data) => {
                try { await set(ref(dbSite, `site/${node}`), data); showToast('Saved Successfully!'); setEditingItem(null); } 
                catch (e) { alert("Error saving data"); }
            };

            const deleteSiteItem = async (node, arr, id) => {
                if(confirm("Are you sure you want to delete this?")) {
                    saveSiteData(node, arr.filter(item => item.id !== id));
                }
            };

            const saveExercise = async (data) => {
                try {
                    if (data.id) { await set(ref(dbRecords, `exercises/${data.id}`), data); } 
                    else { await set(push(ref(dbRecords, 'exercises')), data); }
                    showToast('Exercise Saved!');
                    setEditingItem(null);
                } catch (e) { alert("Error saving exercise"); }
            };

            const deleteExercise = async (id) => {
                if(confirm("Delete this exercise permanently?")) {
                    try { await remove(ref(dbRecords, `exercises/${id}`)); showToast('Deleted!'); } 
                    catch(e) { alert("Error deleting."); }
                }
            };

            if (isConnecting) return null;

            if (!user) {
                return (
                    <div className="min-h-screen bg-appbg flex flex-col items-center justify-center p-4">
                        <div className="max-w-sm w-full bg-surface rounded-2xl shadow-soft border border-slate-200 p-8 text-center">
                            <i className="ph-bold ph-shield-check text-5xl text-azure mb-3"></i>
                            <h1 className="text-2xl font-bold text-navy mb-6">Admin Login</h1>
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 py-3 rounded-lg font-bold hover:bg-slate-50 transition shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" className="w-5 h-5"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                                Continue with Google
                            </button>
                        </div>
                    </div>
                );
            }

            // --- TABS & NAVIGATION ---
            const navItems = [
                { id: '#/overview', icon: 'ph-squares-four', label: 'Overview' },
                { id: '#/clinic', icon: 'ph-buildings', label: 'Website Details' },
                { id: '#/doctors', icon: 'ph-stethoscope', label: 'Doctors' },
                { id: '#/services', icon: 'ph-first-aid', label: 'Services' },
                { id: '#/products', icon: 'ph-shopping-bag', label: 'Products' },
                { id: '#/articles', icon: 'ph-article', label: 'Articles' },
                { id: '#/exercises', icon: 'ph-person-simple-walk', label: 'Exercises' },
            ];

            const renderSidebar = () => (
                <>
                    <div className={`fixed inset-0 bg-navy/40 backdrop-blur-sm z-40 lg:hidden transition-opacity ${isSidebarOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsSidebarOpen(false)}></div>
                    <aside className={`fixed top-0 left-0 h-full w-64 bg-white border-r border-slate-200 flex flex-col z-50 transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="h-16 border-b border-slate-200 flex items-center px-6 shrink-0">
                            <h2 className="text-navy font-black text-lg flex items-center gap-2"><i className="ph-fill ph-shield-check text-azure text-2xl"></i> Admin Hub</h2>
                        </div>
                        <div className="flex-1 overflow-y-auto py-4">
                            <nav className="space-y-1 px-3">
                                {navItems.map(item => (
                                    <a key={item.id} href={item.id} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold transition-colors ${activeHash === item.id ? 'bg-ice text-azure' : 'text-slate-600 hover:bg-slate-50'}`}>
                                        <i className={`ph-bold ${item.icon} text-lg ${activeHash === item.id ? 'text-azure' : 'text-slate-400'}`}></i> {item.label}
                                    </a>
                                ))}
                            </nav>
                        </div>
                        <div className="p-4 border-t border-slate-200">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 bg-slate-100 text-slate-600 px-4 py-2.5 rounded-lg text-sm font-bold hover:bg-slate-200 transition"><i className="ph-bold ph-sign-out"></i> Logout</button>
                        </div>
                    </aside>
                </>
            );

            // --- COMPACT LIST VIEWS (Inbox Style) ---
            const renderInboxList = (title, data, renderRow, onAdd) => {
                const filteredData = data.filter(item => (item.name || item.title || "").toLowerCase().includes(searchQuery.toLowerCase()));
                return (
                    <div className="animate-in fade-in flex flex-col h-full">
                        <div className="flex justify-between items-center mb-4 px-1">
                            <h2 className="text-xl font-black text-navy">{title}</h2>
                            <button onClick={onAdd} className="bg-azure text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-navy transition flex items-center gap-1"><i className="ph-bold ph-plus"></i> Add New</button>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-soft border border-slate-200 overflow-hidden flex flex-col">
                            {/* Sticky Search Bar */}
                            <div className="p-2 border-b border-slate-100 bg-slate-50 sticky top-0 z-10">
                                <div className="relative">
                                    <i className="ph-bold ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
                                    <input type="text" placeholder={`Search ${title.toLowerCase()}...`} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-white border border-slate-200 rounded-md py-2 pl-9 pr-4 outline-none focus:border-azure text-sm" />
                                </div>
                            </div>
                            
                            <div className="overflow-y-auto">
                                {filteredData.length === 0 ? (
                                    <div className="text-center py-10 text-slate-400 text-sm font-medium">No items found.</div>
                                ) : (
                                    <div className="flex flex-col">
                                        {filteredData.map(item => renderRow(item))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const RowItem = ({ img, fallback, title, subtitle, onEdit, onDelete }) => (
                <div className="flex items-center gap-3 p-3 border-b border-slate-100 hover:bg-slate-50 transition cursor-pointer" onClick={onEdit}>
                    <div className="w-10 h-10 rounded-full shrink-0 bg-slate-100 flex items-center justify-center overflow-hidden border border-slate-200">
                        {img ? <img src={img} className="w-full h-full object-cover" /> : <span className="text-lg">{fallback}</span>}
                    </div>
                    <div className="flex-1 min-w-0">
                        <h4 className="font-bold text-sm text-slate-800 truncate leading-tight">{title}</h4>
                        <p className="text-xs text-slate-500 truncate mt-0.5">{subtitle}</p>
                    </div>
                    <div className="flex items-center gap-1 shrink-0 pl-2">
                        <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-2 text-slate-300 hover:text-red-500 rounded"><i className="ph-bold ph-trash"></i></button>
                    </div>
                </div>
            );

            // --- ISOLATED EDIT FORM WRAPPER ---
            const IsolatedForm = ({ item, title, type, onSave, onCancel }) => {
                const [localData, setLocalData] = useState(item || {});
                
                useEffect(() => { setLocalData(item || {}); }, [item]);

                const updateField = (f, v) => setLocalData(prev => ({ ...prev, [f]: v }));
                
                const handleSave = () => {
                    if (type === 'article' && !localData.title) return alert("Title required");
                    if (type === 'article' && !localData.slug) localData.slug = slugify(localData.title);
                    
                    if (type === 'exercise') {
                        localData.tags = typeof localData.tags === 'string' ? localData.tags.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : (localData.tags||[]);
                    }
                    onSave(localData);
                };

                return (
                    <div className="bg-white form-edge rounded-xl shadow-soft border border-slate-200 flex flex-col h-[calc(100vh-80px)] sm:h-[calc(100vh-100px)] animate-in slide-in-from-right-4 relative z-20">
                        <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between bg-white shrink-0">
                            <h2 className="text-base font-black text-navy flex items-center gap-2"><button onClick={onCancel} className="text-slate-400 hover:text-navy mr-1"><i className="ph-bold ph-arrow-left"></i></button> {title}</h2>
                            <button onClick={handleSave} className="bg-azure text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-sm hover:bg-navy">Save</button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 field-pad bg-slate-50/30 space-y-5">
                            
                            {/* Doctor Form */}
                            {type === 'doctor' && (
                                <>
                                    <ImageUploader label="Profile Photo" url={localData.photoUrl} onUploadComplete={(url) => updateField('photoUrl', url)} isIcon={true} />
                                    <div className="space-y-3">
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Name</label><input type="text" value={localData.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Qualifications</label><input type="text" value={localData.qualification||''} onChange={e=>updateField('qualification', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Biography</label><textarea rows="3" value={localData.details||''} onChange={e=>updateField('details', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div className="bg-green-50 p-3 rounded-lg border border-green-100">
                                            <label className="text-[10px] font-bold text-green-700 uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo"></i> WhatsApp Message Template</label>
                                            <p className="text-[9px] text-green-600 mb-2 leading-tight">Default message when booking this doctor. Use tag: {"{doctor_name}"}</p>
                                            <textarea rows="2" value={localData.waMessage||''} onChange={e=>updateField('waMessage', e.target.value)} placeholder="Hello, I want to book an appointment with {doctor_name}..." className="w-full p-2 text-sm bg-white border border-green-200 rounded outline-none focus:border-green-500" />
                                        </div>
                                    </div>
                                </>
                            )}

                            {/* Service Form */}
                            {type === 'service' && (
                                <>
                                    <ImageUploader label="Banner Image" url={localData.bannerImageUrl} onUploadComplete={(url) => updateField('bannerImageUrl', url)} />
                                    <div className="space-y-3">
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Title</label><input type="text" value={localData.title||''} onChange={e=>updateField('title', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Icon (Emoji)</label><input type="text" value={localData.icon||''} onChange={e=>updateField('icon', e.target.value)} placeholder="⚕️" className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Description</label><textarea rows="2" value={localData.description||''} onChange={e=>updateField('description', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div className="bg-green-50 p-3 rounded-lg border border-green-100">
                                            <label className="text-[10px] font-bold text-green-700 uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo"></i> WhatsApp Message Template</label>
                                            <p className="text-[9px] text-green-600 mb-2 leading-tight">Default message. Use tag: {"{service_title}"}</p>
                                            <textarea rows="2" value={localData.waMessage||''} onChange={e=>updateField('waMessage', e.target.value)} placeholder="Hello, I need consultation for {service_title}..." className="w-full p-2 text-sm bg-white border border-green-200 rounded outline-none focus:border-green-500" />
                                        </div>
                                    </div>
                                </>
                            )}

                            {/* Product Form */}
                            {type === 'product' && (
                                <>
                                    <ImageUploader label="Product Photo" url={localData.profilePhoto} onUploadComplete={(url) => updateField('profilePhoto', url)} isIcon={true} />
                                    <div className="space-y-3">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div><label className="text-[10px] font-bold text-slate-400 uppercase">Name</label><input type="text" value={localData.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                            <div><label className="text-[10px] font-bold text-slate-400 uppercase">Price</label><input type="text" value={localData.price||''} onChange={e=>updateField('price', e.target.value)} placeholder="₹500" className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        </div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Description</label><textarea rows="3" value={localData.description||''} onChange={e=>updateField('description', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div className="bg-green-50 p-3 rounded-lg border border-green-100">
                                            <label className="text-[10px] font-bold text-green-700 uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo"></i> WhatsApp Message Template</label>
                                            <p className="text-[9px] text-green-600 mb-2 leading-tight">Use tags: {"{product_name}"}, {"{price}"}</p>
                                            <textarea rows="2" value={localData.waMessage||''} onChange={e=>updateField('waMessage', e.target.value)} placeholder="Hello, I want to buy {product_name} at {price}..." className="w-full p-2 text-sm bg-white border border-green-200 rounded outline-none focus:border-green-500" />
                                        </div>
                                    </div>
                                </>
                            )}

                            {/* Exercise Form */}
                            {type === 'exercise' && (
                                <>
                                    <ImageUploader label="Illustration" url={localData.imageUrl} onUploadComplete={(url) => updateField('imageUrl', url)} />
                                    <div className="space-y-3">
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Name</label><input type="text" value={localData.name||''} onChange={e=>updateField('name', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Tags (comma separated)</label><input type="text" value={Array.isArray(localData.tags)?localData.tags.join(', '):(localData.tags||'')} onChange={e=>updateField('tags', e.target.value)} placeholder="knee, stretch" className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Video Link</label><input type="url" value={localData.videoUrl||''} onChange={e=>updateField('videoUrl', e.target.value)} placeholder="YouTube URL" className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Rich Description</label>
                                            <QuillEditor value={localData.description||''} onChange={val => updateField('description', val)} placeholder="Detailed exercise instructions..." />
                                        </div>
                                    </div>
                                </>
                            )}

                            {/* Article Form */}
                            {type === 'article' && (
                                <>
                                    <ImageUploader label="Cover Image" url={localData.imageUrl} onUploadComplete={(url) => updateField('imageUrl', url)} />
                                    <div className="space-y-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Title</label>
                                            <input type="text" value={localData.title||''} onChange={e=>{ updateField('title', e.target.value); if(!localData.id) updateField('slug', slugify(e.target.value)); }} className="w-full p-2.5 text-base font-bold bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Slug</label>
                                            <input type="text" value={localData.slug||''} onChange={e=>updateField('slug', e.target.value)} className="w-full p-2 text-xs bg-slate-100 border border-slate-200 rounded outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Article Body</label>
                                            <QuillEditor value={localData.content||''} onChange={val => updateField('content', val)} placeholder="Write your health article here..." />
                                        </div>
                                    </div>
                                </>
                            )}

                            {/* Website Details Form */}
                            {type === 'clinicInfo' && (
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <ImageUploader label="Logo" url={localData.logoUrl} onUploadComplete={(url) => updateField('logoUrl', url)} isIcon={true} />
                                        <ImageUploader label="Hero Banner" url={localData.bannerImageUrl} onUploadComplete={(url) => updateField('bannerImageUrl', url)} />
                                    </div>
                                    <div className="space-y-3">
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Clinic Name</label><input type="text" value={localData.clinicName||''} onChange={e=>updateField('clinicName', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Primary WhatsApp Number</label><input type="text" value={localData.whatsappNumber||''} onChange={e=>updateField('whatsappNumber', e.target.value)} placeholder="+919876543210" className="w-full p-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-azure" /></div>
                                        <div className="bg-green-50 p-3 rounded-lg border border-green-100 mt-4">
                                            <label className="text-[10px] font-bold text-green-700 uppercase flex items-center gap-1"><i className="ph-bold ph-whatsapp-logo"></i> Global Default WhatsApp Message</label>
                                            <p className="text-[9px] text-green-600 mb-2 leading-tight">Fallback message used when clicking general contact buttons.</p>
                                            <textarea rows="2" value={localData.waDefaultMessage||''} onChange={e=>updateField('waDefaultMessage', e.target.value)} placeholder="Hello, I want to book a general consultation..." className="w-full p-2 text-sm bg-white border border-green-200 rounded outline-none focus:border-green-500" />
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // --- SAVE HANDLERS FOR LISTS ---
            const saveListItem = (node, arr, item) => {
                const newArr = [...arr];
                if (!item.id) { item.id = Date.now(); newArr.push(item); } 
                else { const idx = newArr.findIndex(x => x.id === item.id); newArr[idx] = item; }
                saveSiteData(node, newArr);
            };

            // --- MAIN RENDER ---
            return (
                <div className="flex h-screen overflow-hidden bg-appbg">
                    
                    {/* Toast */}
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[9999] transition-all duration-300 ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4 pointer-events-none'}`}>
                        <div className="bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg text-sm font-bold flex items-center gap-2"><i className="ph-bold ph-check-circle text-emerald-400"></i> {toast.msg}</div>
                    </div>

                    {renderSidebar()}

                    <div className="flex-1 flex flex-col min-w-0 lg:pl-64 transition-all">
                        {/* Mobile Header */}
                        <header className="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-4 lg:hidden shrink-0 z-30">
                            <h1 className="font-black text-navy flex items-center gap-2"><i className="ph-fill ph-shield-check text-azure"></i> Admin Hub</h1>
                            <button onClick={() => setIsSidebarOpen(true)} className="p-1 text-slate-600"><i className="ph-bold ph-list text-2xl"></i></button>
                        </header>

                        <main className="flex-1 overflow-y-auto p-3 sm:p-6 relative">
                            {editingItem ? (
                                <IsolatedForm 
                                    item={editingItem} 
                                    title={editingItem.id ? `Edit Item` : `Create New`} 
                                    type={formType} 
                                    onCancel={() => setEditingItem(null)} 
                                    onSave={(data) => {
                                        if(formType === 'doctor') saveListItem('doctors', siteData.doctors, data);
                                        else if(formType === 'service') saveListItem('services', siteData.services, data);
                                        else if(formType === 'product') saveListItem('products', siteData.products, data);
                                        else if(formType === 'article') { if(!data.date) data.date = new Date().toISOString(); saveListItem('articles', siteData.articles, data); }
                                        else if(formType === 'exercise') saveExercise(data);
                                        else if(formType === 'clinicInfo') saveSiteData('hero', data);
                                    }} 
                                />
                            ) : (
                                <>
                                    {activeHash === '#/overview' && (
                                        <div className="animate-in fade-in space-y-4">
                                            <h2 className="text-xl font-black text-navy mb-4">Overview</h2>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                {[
                                                    { h: '#/exercises', i: 'ph-person-simple-walk', c: 'text-blue-500', num: exercises.length, label: 'Exercises' },
                                                    { h: '#/doctors', i: 'ph-stethoscope', c: 'text-emerald-500', num: siteData.doctors.length, label: 'Doctors' },
                                                    { h: '#/products', i: 'ph-shopping-bag', c: 'text-purple-500', num: siteData.products.length, label: 'Products' },
                                                    { h: '#/articles', i: 'ph-article', c: 'text-orange-500', num: siteData.articles.length, label: 'Articles' }
                                                ].map((stat, idx) => (
                                                    <a key={idx} href={stat.h} className="bg-white p-4 rounded-xl shadow-soft border border-slate-200 flex flex-col items-center text-center hover:border-azure transition">
                                                        <i className={`ph-fill ${stat.i} text-3xl ${stat.c} mb-1`}></i>
                                                        <span className="text-2xl font-black text-navy leading-none">{stat.num}</span>
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase mt-1">{stat.label}</span>
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {activeHash === '#/clinic' && (
                                        <div className="animate-in fade-in">
                                            <div className="flex justify-between items-center mb-4 px-1">
                                                <h2 className="text-xl font-black text-navy">Website Details</h2>
                                                <button onClick={() => {setEditingItem(siteData.hero || {}); setFormType('clinicInfo');}} className="bg-azure text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-navy flex items-center gap-1"><i className="ph-bold ph-pencil-simple"></i> Edit Info</button>
                                            </div>
                                            <div className="bg-white p-5 rounded-xl shadow-soft border border-slate-200 space-y-4">
                                                <div className="flex items-center gap-3 border-b border-slate-100 pb-4">
                                                    <img src={siteData.hero.logoUrl || '/favicon.png'} className="w-12 h-12 rounded bg-slate-50 object-contain p-1 border border-slate-200" /> 
                                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase">Clinic Name</p><p className="font-bold text-navy">{siteData.hero.clinicName || 'Not Set'}</p></div>
                                                </div>
                                                <div><p className="text-[10px] font-bold text-slate-400 uppercase">WhatsApp Number</p><p className="text-sm font-medium text-slate-800">{siteData.hero.whatsappNumber || 'Not Set'}</p></div>
                                                <div><p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Main Banner</p><img src={siteData.hero.bannerImageUrl} className="w-full max-w-sm rounded-lg border border-slate-200" /></div>
                                            </div>
                                        </div>
                                    )}

                                    {activeHash === '#/doctors' && renderInboxList("Team", siteData.doctors, d => <RowItem key={d.id} img={d.photoUrl} fallback="👨‍⚕️" title={d.name} subtitle={d.qualification} onEdit={()=>{setEditingItem(d); setFormType('doctor');}} onDelete={()=>deleteSiteItem('doctors', siteData.doctors, d.id)} />, () => {setEditingItem({name:''}); setFormType('doctor');})}
                                    {activeHash === '#/services' && renderInboxList("Services", siteData.services, s => <RowItem key={s.id} img={s.bannerImageUrl} fallback={s.icon||"⚕️"} title={s.title} subtitle={s.description} onEdit={()=>{setEditingItem(s); setFormType('service');}} onDelete={()=>deleteSiteItem('services', siteData.services, s.id)} />, () => {setEditingItem({title:''}); setFormType('service');})}
                                    {activeHash === '#/products' && renderInboxList("Products", siteData.products, p => <RowItem key={p.id} img={p.profilePhoto} fallback="📦" title={p.name} subtitle={p.price} onEdit={()=>{setEditingItem(p); setFormType('product');}} onDelete={()=>deleteSiteItem('products', siteData.products, p.id)} />, () => {setEditingItem({name:'', price:''}); setFormType('product');})}
                                    {activeHash === '#/articles' && renderInboxList("Articles", siteData.articles, a => <RowItem key={a.id||a.slug} img={a.imageUrl} fallback="📄" title={a.title} subtitle={`/${a.slug}`} onEdit={()=>{setEditingItem(a); setFormType('article');}} onDelete={()=>deleteSiteItem('articles', siteData.articles, a.id)} />, () => {setEditingItem({title:''}); setFormType('article');})}
                                    {activeHash === '#/exercises' && renderInboxList("Exercises", exercises, ex => <RowItem key={ex.id} img={ex.imageUrl} fallback="🏃" title={ex.name} subtitle={ex.tags ? ex.tags.join(', ') : ''} onEdit={()=>{setEditingItem(ex); setFormType('exercise');}} onDelete={()=>deleteExercise(ex.id)} />, () => {setEditingItem({name:'', tags:''}); setFormType('exercise');})}
                                </>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
