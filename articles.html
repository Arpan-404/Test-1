<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Articles - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        :root {
            --app-bg: #f4f7fb;        
            --surface: #ffffff;       
            --primary: #1d4ed8;       
            --primary-dark: #1e3a8a;  
            --primary-light: #dbeafe; 
            --text-dark: #0f172a;     
            --text-muted: #64748b;    
            
            /* Wiki Specific Colors */
            --wiki-blue: #0645ad;
            --wiki-border: #eaecf0;
            --wiki-text: #202122;
            --wiki-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--wiki-bg); color: var(--wiki-text); line-height: 1.6; padding-bottom: 2rem; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 0.6rem 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; gap: 8px; border-bottom: 1px solid var(--wiki-border); }
        .logo { display: flex; align-items: center; text-decoration: none;}
        .logo-img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; }
        .search-container { flex-grow: 1; display: flex; justify-content: center; }
        .search-input { width: 100%; max-width: 220px; padding: 8px 16px; border-radius: 100px; border: 1px solid var(--wiki-border); background: #f8f9fa; font-size: 0.9rem; transition: 0.2s; color: var(--text-dark); }
        .search-input:focus { background: var(--surface); box-shadow: 0 0 0 2px var(--primary-light); outline: none; border-color: transparent; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .hamburger { padding: 4px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 36px; height: 36px; }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--text-dark); margin: 3px 0; border-radius: 2px; }

        .search-results { position: fixed; top: 65px; left: 1rem; right: 1rem; max-height: 60vh; overflow-y: auto; background: var(--surface); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1002; display: none; padding: 0.5rem; border: 1px solid var(--wiki-border); }
        .search-results.active { display: block; }
        .search-result-item { padding: 10px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; border-radius: 4px; text-decoration: none; color: inherit; }
        .search-category-title { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 10px 5px 5px; font-weight: 700; }

        .mobile-menu { position: fixed; top: 0; right: -100%; width: 260px; height: 100vh; background: var(--surface); z-index: 1001; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 4rem 1rem 2rem; border-left: 1px solid var(--wiki-border); box-shadow: -5px 0 20px rgba(0,0,0,0.05); }
        .mobile-menu.active { right: 0; }
        .mobile-menu ul { list-style: none; }
        .mobile-menu ul li a { display: block; padding: 1rem; border-bottom: 1px solid #f1f5f9; font-weight: 600; font-size: 1.05rem; text-decoration: none; color: var(--text-dark);}
        .close-menu { position: absolute; top: 1rem; right: 1rem; background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: var(--text-dark); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        .overlay.active { display: block; }

        .main { margin-top: 60px; max-width: 900px; margin-left: auto; margin-right: auto; padding: 1.5rem; background: var(--wiki-bg); }
        
        .wiki-header { border-bottom: 1px solid #a2a9b1; margin-bottom: 1.5rem; padding-bottom: 0.5rem; }
        .page-title { font-family: "Linux Libertine", "Georgia", "Times", serif; font-size: 2.2rem; font-weight: normal; color: #000; line-height: 1.2; }
        
        .wiki-list { display: flex; flex-direction: column; }
        
        .wiki-list-item { display: flex; gap: 15px; padding: 16px 0; border-bottom: 1px solid var(--wiki-border); text-decoration: none; color: inherit; align-items: flex-start; }
        .wiki-list-item:hover .wiki-title { text-decoration: underline; }
        
        .wiki-thumb { width: 130px; height: 90px; object-fit: cover; border: 1px solid #c8ccd1; background: #f8f9fa; padding: 2px; }
        .wiki-thumb-placeholder { width: 130px; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 1px solid #c8ccd1; background: #f8f9fa; padding: 2px; color: #a2a9b1; }
        
        .wiki-content { flex: 1; }
        .wiki-title { font-size: 1.15rem; font-weight: 600; color: var(--wiki-blue); line-height: 1.3; margin-bottom: 6px; }
        .wiki-snippet { font-size: 0.95rem; color: var(--wiki-text); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        @media (max-width: 600px) {
            .wiki-thumb, .wiki-thumb-placeholder { width: 100px; height: 80px; }
            .wiki-title { font-size: 1.05rem; }
            .wiki-snippet { font-size: 0.9rem; -webkit-line-clamp: 3; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo"><img src="" alt="PT" class="logo-img" id="clinicLogo"></a>
        <div class="search-container"><input type="text" id="globalSearch" class="search-input" placeholder="Search articles..." oninput="window.handleSearch()"></div>
        <div class="header-actions"><div class="hamburger" onclick="window.toggleMenu()"><span></span><span></span><span></span></div></div>
    </header>

    <div id="searchResults" class="search-results"></div>

    <div class="mobile-menu" id="mobileMenu">
        <button class="close-menu" onclick="window.toggleMenu()">✕</button>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/services">Services</a></li>
            <li><a href="/doctors">Doctors</a></li>
            <li><a href="/products">Store</a></li>
            <li><a href="/articles">Health Feed</a></li>
            <li><a href="/prescription">My Reports</a></li>
            <li><a href="/admin" style="color: var(--primary); background: var(--primary-light); border-radius: 8px; margin: 1rem; text-align: center;">Admin</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay" onclick="window.toggleMenu()"></div>

    <main class="main">
        <div class="wiki-header">
            <h1 class="page-title">Health Articles Index</h1>
        </div>
        
        <div class="wiki-list" id="articleFeed">
            <p style="padding: 1rem 0; color: #54595d;">Loading encyclopedia entries...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js';

        const app = initializeApp({ apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", projectId: "clinic-bdf92" });
        const db = getDatabase(app);
        window.siteData = {};
        
        window.slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
        window.toggleMenu = () => { document.getElementById('mobileMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
        document.addEventListener('click', (e) => { const r = document.getElementById('searchResults'), i = document.getElementById('globalSearch'); if (e.target !== r && e.target !== i && !r.contains(e.target)) r.classList.remove('active'); });

        onValue(ref(db, 'site'), (snapshot) => {
            window.siteData = snapshot.val() || {};
            if(window.siteData.hero && window.siteData.hero.logoUrl) document.getElementById('clinicLogo').src = window.siteData.hero.logoUrl;
            
            const articles = window.siteData.articles || [];
            
            if(articles.length === 0) {
                document.getElementById('articleFeed').innerHTML = '<p style="padding: 1rem 0; color: #54595d;">No articles are currently available in the database.</p>';
                return;
            }

            const sortedArticles = [...articles].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            document.getElementById('articleFeed').innerHTML = sortedArticles.map(a => {
                const imgHtml = a.imageUrl 
                    ? `<img src="${a.imageUrl}" class="wiki-thumb" loading="lazy" alt="Article thumbnail">` 
                    : `<div class="wiki-thumb-placeholder">📄</div>`;
                
                const rawText = a.content ? a.content.replace(/<[^>]*>?/gm, '') : '';

                return `
                <a href="/${a.slug}" class="wiki-list-item">
                    ${imgHtml}
                    <div class="wiki-content">
                        <div class="wiki-title">${a.title}</div>
                        <div class="wiki-snippet">${rawText}</div>
                    </div>
                </a>`;
            }).join('');
        });

        window.handleSearch = function() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const res = document.getElementById('searchResults');
            if (!query) { res.classList.remove('active'); return; }

            let html = '';
            const filterMap = (arr, fields, linkPrefix, imgFn, titleFn, subFn) => {
                const filtered = (arr || []).filter(item => fields.some(f => item[f]?.toLowerCase().includes(query)));
                if(filtered.length === 0) return '';
                return filtered.map(item => `<a href="${linkPrefix}${window.slugify(item.title || item.name)}" class="search-result-item">${imgFn(item)} <div><div style="font-weight:600;font-size:0.95rem;">${titleFn(item)}</div><div style="font-size:0.8rem;color:var(--text-muted);">${subFn(item)}</div></div></a>`).join('');
            };

            const sHtml = filterMap(window.siteData.services, ['title'], '/service/', s => s.icon?`<div style="font-size:1.2rem">${s.icon}</div>`:`⚕️`, s=>s.title, s=>'Service');
            if(sHtml) html += `<div class="search-category-title">Services</div>${sHtml}`;

            const dHtml = filterMap(window.siteData.doctors, ['name', 'qualification'], '/doctor/', d => d.photoUrl?`<img src="${d.photoUrl}" style="width:32px;height:32px;border-radius:4px;object-fit:cover;">`:`👨‍⚕️`, d=>d.name, d=>d.qualification);
            if(dHtml) html += `<div class="search-category-title">Doctors</div>${dHtml}`;

            const pHtml = filterMap(window.siteData.products, ['name'], '/product/', p => p.profilePhoto?`<img src="${p.profilePhoto}" style="width:32px;height:32px;border-radius:4px;object-fit:cover;">`:`📦`, p=>p.name, p=>`<span style="color:var(--primary);font-weight:700">${p.price}</span>`);
            if(pHtml) html += `<div class="search-category-title">Products</div>${pHtml}`;

            const aHtml = (window.siteData.articles || []).filter(a => a.title.toLowerCase().includes(query) || a.content.toLowerCase().includes(query))
                .map(a => `<a href="/${a.slug}" class="search-result-item">📄 <div><div style="font-weight:600;font-size:0.95rem;">${a.title}</div><div style="font-size:0.8rem;color:var(--text-muted);">Article</div></div></a>`).join('');
            if(aHtml) html += `<div class="search-category-title">Articles</div>${aHtml}`;

            res.innerHTML = html || '<p style="text-align:center; color:var(--text-muted); padding:1rem; font-size:0.9rem;">No results found</p>';
            res.classList.add('active');
        }
    </script>
</body>
</html>
