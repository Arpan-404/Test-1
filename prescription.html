<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Prescription - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f8fafc', surface: '#ffffff' },
            boxShadow: { 'soft': '0 4px 20px rgba(15, 23, 42, 0.05)', 'float': '0 10px 30px rgba(15, 23, 42, 0.08)' }
          }
        }
      }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--appbg); color: #0f172a; overflow-x: hidden; padding-bottom: 4rem;}
        
        .h-scroll::-webkit-scrollbar { display: none; }
        .h-scroll { scrollbar-width: none; }
        
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }

        /* Smooth, Solid Sidebar Menu */
        .mobile-menu { 
            position: fixed; top: 0; right: 0; width: 280px; height: 100vh; 
            background: #ffffff; z-index: 1001; 
            transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 1rem 0 2rem; box-shadow: -5px 0 25px rgba(15, 23, 42, 0.1); 
            overflow-y: auto; border-left: 1px solid #e2e8f0;
        }
        .mobile-menu.active { transform: translateX(0); } 
        .mobile-menu ul { list-style: none; }
        .mobile-menu ul li a.main-nav-link { display: flex; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid #f8fafc; font-weight: 600; font-size: 1rem; color: #0f172a; transition: color 0.2s;}
        .mobile-menu ul li a.main-nav-link:hover { color: #1d4ed8; }
        .close-menu { background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: #475569; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .close-menu:hover { background: #e2e8f0; color: #0f172a; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); z-index: 999; visibility: hidden; opacity: 0; transition: opacity 0.3s, visibility 0.3s;}
        .overlay.active { visibility: visible; opacity: 1; }

        /* Read-Only Table Overrides */
        .editable-cell { min-width: 30px; max-width: 100%; word-break: break-word; white-space: pre-wrap; cursor: default; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #1e3a8a;">
            <div class="native-loader"></div>
            <div style="font-weight: bold;">Verifying Records...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // ==========================================
        // DUAL DATABASE ARCHITECTURE
        // ==========================================
        
        // 1. PRIVATE DATABASE (Patient Records)
        const recordsConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            storageBucket: "patient-records-arpan.firebasestorage.app",
            messagingSenderId: "599041105903",
            appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a"
        };
        const appRecords = initializeApp(recordsConfig, "AppRecords");
        const authRecords = getAuth(appRecords);
        const dbRecords = getFirestore(appRecords);
        
        // 2. PUBLIC DATABASE (Site Info & Exercises)
        const siteConfig = {
            apiKey: "AIzaSyAuk3feAZjoHF2VwdWtA0F4lhQKarU0w-4", 
            authDomain: "clinic-bdf92.firebaseapp.com",
            databaseURL: "https://clinic-bdf92-default-rtdb.firebaseio.com", 
            projectId: "clinic-bdf92"
        };
        const appSite = initializeApp(siteConfig, "AppSite");
        const dbSite = getDatabase(appSite);

        const slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

        // Reusable Read-Only Custom Table Component
        function ReadOnlyCustomTable({ table }) {
            let rows = table.rows || [];
            if (typeof rows === 'string') { try { rows = JSON.parse(rows); } catch(e) { rows = []; } }

            return (
                <div className="w-fit max-w-full bg-white border border-slate-200 rounded-lg overflow-x-auto">
                    {table.title && (
                        <div className="bg-ice/30 px-3 py-2 border-b border-slate-200 font-bold text-[13px] text-navy">
                            {table.title}
                        </div>
                    )}
                    <div className="p-1.5">
                        <table className="w-auto min-w-[150px] text-left border-collapse table-auto">
                            <thead>
                                <tr>
                                    {table.headers.map((h, i) => (
                                        <th key={i} className="border border-slate-200 p-2 bg-slate-50 font-bold text-navy text-[11px]">{h}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map((row, rIdx) => (
                                    <tr key={rIdx}>
                                        {row.map((cell, cIdx) => (
                                            <td key={cIdx} className="border border-slate-200 p-2 text-slate-700 text-[11px] align-top whitespace-pre-wrap">{cell}</td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [siteData, setSiteData] = useState({ hero: {}, exercises: [] });
            const [patientData, setPatientData] = useState(null);
            
            // Authentication & Privacy States
            const [loginId, setLoginId] = useState("");
            const [loginPhone, setLoginPhone] = useState("");
            const [loginError, setLoginError] = useState("");
            const [isCheckingAuth, setIsCheckingAuth] = useState(true);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            // Privacy Wall State
            const [isPhoneVerified, setIsPhoneVerified] = useState(false);
            const [verifyPhoneInput, setVerifyPhoneInput] = useState("");
            const [verifyError, setVerifyError] = useState("");

            // Fetch Public Site Data & Exercises
            useEffect(() => {
                const unsubSite = onValue(ref(dbSite, 'site'), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        let exArray = [];
                        if (data.exercises) {
                            if (Array.isArray(data.exercises)) exArray = data.exercises.filter(Boolean);
                            else exArray = Object.keys(data.exercises).map(key => ({ ...data.exercises[key], id: data.exercises[key].id || key }));
                        }
                        setSiteData({ hero: data.hero || {}, exercises: exArray });
                    }
                });
                return () => unsubSite();
            }, []);

            // Handle Authentication and Secure Links
            useEffect(() => {
                const initializePatientAuth = async () => {
                    try {
                        await signInAnonymously(authRecords);
                        
                        // Check if a secure ID is passed via URL Hash (e.g. from QR code or WhatsApp link)
                        const hash = window.location.hash.replace('#/', '');
                        if (hash && hash.length > 10) { 
                            const docRef = doc(dbRecords, 'artifacts', 'physiocare-tracker', 'public', 'data', 'patients', hash);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists() && docSnap.data().isPublished) {
                                setPatientData({ id: docSnap.id, ...docSnap.data() });
                                setIsPhoneVerified(false); // They used the QR code, lock sensitive data
                            } else {
                                setLoginError("Record not found or not published.");
                                window.location.hash = '';
                            }
                        }
                    } catch (e) {
                        console.error("Auth error:", e);
                    } finally {
                        setIsCheckingAuth(false);
                    }
                };
                initializePatientAuth();
            }, []);

            // Fuzzy Login Handler (Manual Login)
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError("");
                setIsCheckingAuth(true);

                try {
                    const cleanInput = loginId.toLowerCase().replace(/\s+/g, '');
                    const cleanPhone = loginPhone.replace(/\s+/g, '').replace(/[^0-9]/g, '');

                    const querySnapshot = await getDocs(collection(dbRecords, 'artifacts', 'physiocare-tracker', 'public', 'data', 'patients'));
                    let match = null;

                    querySnapshot.forEach((doc) => {
                        const p = doc.data();
                        if (p.isPublished) {
                            const dbName = (p.name || '').toLowerCase().replace(/\s+/g, '');
                            const dbIpId = (p.ipId || '').toLowerCase().replace(/\s+/g, '');
                            const dbPhone = (p.contact || '').replace(/\s+/g, '').replace(/[^0-9]/g, '');

                            if ((dbName === cleanInput || dbIpId === cleanInput) && dbPhone === cleanPhone) {
                                match = { id: doc.id, ...p };
                            }
                        }
                    });

                    if (match) {
                        setPatientData(match);
                        setIsPhoneVerified(true); // Manually typed phone, so fully unlock!
                        window.location.hash = `#/${match.id}`;
                    } else {
                        setLoginError("Could not find a matching published record. Please check your details.");
                    }
                } catch (err) {
                    setLoginError("Database connection error. Please try again.");
                } finally {
                    setIsCheckingAuth(false);
                }
            };

            // Privacy Wall Unlock Handler
            const handleUnlock = (e) => {
                e.preventDefault();
                const cleanInput = verifyPhoneInput.replace(/\s+/g, '').replace(/[^0-9]/g, '');
                const dbPhone = (patientData.contact || '').replace(/\s+/g, '').replace(/[^0-9]/g, '');
                
                if (cleanInput === dbPhone) {
                    setIsPhoneVerified(true);
                    setVerifyError("");
                } else {
                    setVerifyError("Incorrect phone number. Please try again.");
                }
            };

            const handleLogout = () => {
                setPatientData(null);
                setLoginId("");
                setLoginPhone("");
                setVerifyPhoneInput("");
                setIsPhoneVerified(false);
                window.location.hash = '';
            };

            if (isCheckingAuth) return null;

            // --- HEADER & MENU RENDERS ---
            const renderHeader = () => (
                <header className="fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-200 z-40 flex items-center justify-between px-4 max-w-6xl mx-auto w-full">
                    <a href="/" className="flex items-center shrink-0">
                        {siteData.hero.logoUrl ? 
                            <img src={siteData.hero.logoUrl} alt="Logo" className="w-10 h-10 rounded-xl object-contain" /> : 
                            <div className="w-10 h-10 rounded-xl bg-azure text-white flex items-center justify-center font-black text-xl shadow-sm">T</div>
                        }
                    </a>
                    {patientData && (
                        <div className="flex items-center gap-3 ml-auto">
                            {/* Updated Print Button linking to print.html */}
                            <button onClick={() => window.open('/print.html?id=' + patientData.id, '_blank')} className="bg-slate-100 text-navy font-bold px-4 py-1.5 rounded-full text-sm hover:bg-slate-200 transition flex items-center gap-1.5">
                                <i className="ph-bold ph-printer text-lg"></i> Print All
                            </button>
                            <button onClick={handleLogout} className="text-slate-500 hover:text-red-500 transition font-bold text-sm">Logout</button>
                        </div>
                    )}
                    <div className="flex items-center shrink-0 ml-4">
                        <button onClick={() => setIsMenuOpen(true)} className="p-1.5 text-slate-500 hover:bg-slate-100 hover:text-navy rounded-full transition">
                            <i className="ph-bold ph-list text-2xl"></i>
                        </button>
                    </div>
                </header>
            );

            const renderMenu = () => (
                <>
                    <div className={`overlay ${isMenuOpen ? 'active' : ''}`} onClick={() => setIsMenuOpen(false)}></div>
                    <aside className={`mobile-menu ${isMenuOpen ? 'active' : ''}`}>
                        <div className="flex justify-between items-center px-6 pb-4 border-b border-slate-200">
                            <h2 className="text-lg font-black text-navy m-0">Menu</h2>
                            <button className="close-menu" onClick={() => setIsMenuOpen(false)}><i className="ph-bold ph-x"></i></button>
                        </div>
                        <ul>
                            <li><a href="/" className="main-nav-link"><i className="ph-bold ph-house" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Home</a></li>
                            <li><a href="/services" className="main-nav-link"><i className="ph-bold ph-first-aid" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Clinical Services</a></li>
                            <li><a href="/doctors" className="main-nav-link"><i className="ph-bold ph-stethoscope" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Clinical Team</a></li>
                            <li><a href="/products" className="main-nav-link"><i className="ph-bold ph-shopping-bag" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Wellness Products</a></li>
                            <li><a href="/articles" className="main-nav-link"><i className="ph-bold ph-article" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Health Articles</a></li>
                            <li><a href="/exercises" className="main-nav-link"><i className="ph-bold ph-person-simple-walk" style={{marginRight: '12px', fontSize: '1.3rem', color: '#475569'}}></i> Rehabilitation Exercises</a></li>
                            <li><a href="/prescription" className="main-nav-link" style={{color: '#1d4ed8', backgroundColor: '#eff6ff'}}><i className="ph-bold ph-folder-open" style={{marginRight: '12px', fontSize: '1.3rem', color: '#1d4ed8'}}></i> Patient Records</a></li>
                        </ul>
                    </aside>
                </>
            );

            // --- MAIN LOGIN VIEW ---
            if (!patientData) {
                return (
                    <div className="min-h-screen bg-appbg font-sans">
                        {renderHeader()}
                        {renderMenu()}
                        <div className="pt-32 flex flex-col items-center justify-center p-4">
                            <div className="max-w-sm w-full bg-white rounded-2xl shadow-soft border border-slate-200 p-8">
                                <div className="text-center mb-6">
                                    <i className="ph-fill ph-folder-user text-5xl text-azure mb-3"></i>
                                    <h1 className="text-2xl font-black text-navy tracking-tight">Access Records</h1>
                                    <p className="text-xs text-slate-500 mt-2 font-medium">Enter your details to securely view your prescriptions and exercise charts.</p>
                                </div>
                                
                                <form onSubmit={handleLogin} className="space-y-5">
                                    {loginError && <div className="p-3 bg-red-50 text-red-600 text-xs font-bold rounded-lg border border-red-100 text-center">{loginError}</div>}
                                    
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider pl-1">Patient Name or UPID</label>
                                        <input type="text" required value={loginId} onChange={e => setLoginId(e.target.value)} placeholder="e.g. John Doe or 4092" className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-azure focus:ring-1 focus:ring-azure transition" />
                                    </div>
                                    
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider pl-1">Registered Mobile Number</label>
                                        <input type="tel" required value={loginPhone} onChange={e => setLoginPhone(e.target.value)} placeholder="9876543210" className="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-azure focus:ring-1 focus:ring-azure transition" />
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-azure text-white font-bold py-3.5 rounded-xl hover:bg-navy shadow-md hover:shadow-lg transition-all mt-2">
                                        View Medical Records
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- SECURE DASHBOARD UI ---
            const prescribedExData = (patientData.prescribedExercises || []).map(id => siteData.exercises.find(e => e.id === id)).filter(Boolean);
            const formattedDate = patientData.date ? new Date(patientData.date).toLocaleDateString('en-GB') : '';

            return (
                <div className="min-h-screen bg-appbg font-sans">
                    {renderHeader()}
                    {renderMenu()}
                    
                    <main className="max-w-4xl mx-auto px-4 pt-24 pb-12 animate-in fade-in">
                        
                        {/* Always visible: Patient Header */}
                        <div className="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden mb-6">
                            <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex flex-wrap justify-between items-center gap-4">
                                <div>
                                    <h1 className="text-2xl font-black text-navy">{patientData.name}</h1>
                                    <p className="text-sm font-bold text-slate-500 mt-1">UPID: #{patientData.ipId} • {patientData.age} Yrs • {patientData.gender}</p>
                                </div>
                                <div className="text-right">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Date of Issue</div>
                                    <div className="font-bold text-navy">{formattedDate}</div>
                                </div>
                            </div>
                        </div>

                        {/* Always visible: Prescribed Exercises */}
                        {prescribedExData.length > 0 && (
                            <div className="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden p-6 mb-6">
                                <h3 className="text-lg font-black text-navy mb-4 border-b border-slate-100 pb-2 flex items-center gap-2">
                                    <i className="ph-fill ph-barbell text-azure"></i> Prescribed Exercises
                                </h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {prescribedExData.map(ex => {
                                        const params = patientData.exerciseParams?.[ex.id] || {};
                                        return (
                                            <a key={ex.id} href={`/exercise/${slugify(ex.name)}`} target="_blank" className="border border-slate-200 rounded-xl overflow-hidden group hover:border-azure transition hover:shadow-md flex flex-col cursor-pointer bg-white">
                                                <div className="w-full h-40 bg-slate-50 flex items-center justify-center p-3 border-b border-slate-100 relative">
                                                    <img src={ex.imageUrl} className="max-w-full max-h-full object-contain mix-blend-multiply group-hover:scale-105 transition duration-300" />
                                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition duration-300 backdrop-blur-sm">
                                                        <span className="bg-white text-navy font-bold text-xs px-3 py-1.5 rounded-full shadow-sm">View Instructions</span>
                                                    </div>
                                                </div>
                                                <div className="p-4 flex-1 flex flex-col">
                                                    <h4 className="font-bold text-navy text-sm mb-2 leading-tight">{ex.name}</h4>
                                                    <div className="flex flex-wrap gap-2 text-[11px] font-bold text-slate-500 mb-2">
                                                        {params.reps && <span className="bg-slate-100 px-2 py-0.5 rounded">Reps: <span className="text-navy">{params.reps}</span></span>}
                                                        {params.sets && <span className="bg-slate-100 px-2 py-0.5 rounded">Sets: <span className="text-navy">{params.sets}</span></span>}
                                                        {params.freq && <span className="bg-slate-100 px-2 py-0.5 rounded">Freq: <span className="text-navy">{params.freq}</span></span>}
                                                    </div>
                                                    {params.note && <p className="text-[11px] text-slate-600 italic bg-blue-50/50 p-2 rounded-lg border border-blue-100 mt-auto">{params.note}</p>}
                                                </div>
                                            </a>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Privacy Wall: Clinical Notes */}
                        {!isPhoneVerified ? (
                            <div className="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden p-8 text-center relative">
                                {/* Blurred Background Effect */}
                                <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'repeating-linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), repeating-linear-gradient(45deg, #000 25%, #fff 25%, #fff 75%, #000 75%, #000)', backgroundPosition: '0 0, 10px 10px', backgroundSize: '20px 20px' }}></div>
                                
                                <i className="ph-fill ph-lock-key text-5xl text-slate-300 mb-3 relative z-10"></i>
                                <h3 className="text-xl font-black text-navy relative z-10">Clinical Notes Locked</h3>
                                <p className="text-sm text-slate-500 mt-2 max-w-md mx-auto relative z-10">For your privacy, please verify your registered mobile number to view your full medical history, diagnosis, and progression tracking.</p>
                                
                                <form onSubmit={handleUnlock} className="mt-6 max-w-xs mx-auto relative z-10">
                                    {verifyError && <div className="p-2 mb-3 bg-red-50 text-red-600 text-xs font-bold rounded border border-red-100">{verifyError}</div>}
                                    <input type="tel" required value={verifyPhoneInput} onChange={e => setVerifyPhoneInput(e.target.value)} placeholder="Enter 10-digit mobile number" className="w-full p-3 text-center text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-azure focus:ring-1 focus:ring-azure mb-3" />
                                    <button type="submit" className="w-full bg-navy text-white font-bold py-3 rounded-xl hover:bg-azure shadow-md transition-all flex items-center justify-center gap-2">
                                        <i className="ph-bold ph-unlock"></i> Unlock Records
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4">
                                {/* Unlocked: Clinical Notes */}
                                <div className="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden">
                                    <div className="p-6 space-y-6">
                                        {(patientData.chiefComplaints || patientData.history) && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {patientData.chiefComplaints && (
                                                    <div>
                                                        <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Chief Complaints</h3>
                                                        <p className="text-sm text-slate-700 whitespace-pre-wrap">{patientData.chiefComplaints}</p>
                                                    </div>
                                                )}
                                                {patientData.history && (
                                                    <div>
                                                        <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Medical History</h3>
                                                        <p className="text-sm text-slate-700 whitespace-pre-wrap">{patientData.history}</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {patientData.assessmentNote && (
                                            <div className="border-t border-slate-100 pt-6">
                                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Assessment</h3>
                                                <p className="text-sm text-slate-700 whitespace-pre-wrap">{patientData.assessmentNote}</p>
                                            </div>
                                        )}
                                        {patientData.customTables?.filter(t => t.section === 'assessment').length > 0 && (
                                            <div className="flex flex-wrap gap-4">
                                                {patientData.customTables.filter(t => t.section === 'assessment').map(t => <ReadOnlyCustomTable key={t.id} table={t} />)}
                                            </div>
                                        )}

                                        {patientData.diagnosis && (
                                            <div className="border-t border-slate-100 pt-6">
                                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Diagnosis</h3>
                                                <p className="text-lg font-bold text-azure">{patientData.diagnosis}</p>
                                            </div>
                                        )}

                                        {patientData.treatmentNote && (
                                            <div className="border-t border-slate-100 pt-6">
                                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Treatment Plan / Advice</h3>
                                                <p className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">{patientData.treatmentNote}</p>
                                            </div>
                                        )}
                                        {patientData.customTables?.filter(t => t.section === 'treatment').length > 0 && (
                                            <div className="flex flex-wrap gap-4">
                                                {patientData.customTables.filter(t => t.section === 'treatment').map(t => <ReadOnlyCustomTable key={t.id} table={t} />)}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Unlocked: Tracking Tables */}
                                {(patientData.reassessmentTables?.length > 0 && patientData.reassessmentTables[0].records?.length > 0) && (
                                    <div className="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden p-6">
                                        <h3 className="text-lg font-black text-navy mb-4 border-b border-slate-100 pb-2">Tracking & Reassessment</h3>
                                        <div className="space-y-6">
                                            {patientData.customTables?.filter(t => t.section === 'reassessment').length > 0 && (
                                                <div className="flex flex-wrap gap-4">
                                                    {patientData.customTables.filter(t => t.section === 'reassessment').map(t => <ReadOnlyCustomTable key={t.id} table={t} />)}
                                                </div>
                                            )}

                                            {patientData.reassessmentTables.map(rtable => rtable.trackedMetrics?.length > 0 && rtable.records?.length > 0 ? (
                                                <div key={rtable.id} className="border border-slate-200 rounded-xl overflow-hidden">
                                                    <div className="bg-slate-50 px-4 py-2 font-bold text-sm text-navy border-b border-slate-200">{rtable.title}</div>
                                                    <div className="overflow-x-auto p-2">
                                                        <table className="w-full table-auto border-collapse text-xs border border-slate-200 bg-white">
                                                            <thead>
                                                                <tr>
                                                                    <th className="p-2 text-left font-bold text-navy border border-slate-200 bg-slate-50 w-24">Date</th>
                                                                    {rtable.trackedMetrics.map(m => (
                                                                        <th key={m.id} className="p-0 border border-slate-200 bg-slate-50">
                                                                            <div className="p-1.5 text-center font-bold text-navy">
                                                                                <span className="text-[9px] text-slate-400 uppercase block">{m.type}</span>
                                                                                {m.title}
                                                                            </div>
                                                                            {m.isBilateral && <div className="flex w-full border-t border-slate-200 text-[10px]"><div className="flex-1 py-1 text-center border-r border-slate-200">R</div><div className="flex-1 py-1 text-center">L</div></div>}
                                                                        </th>
                                                                    ))}
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {rtable.records.map(rec => (
                                                                    <tr key={rec.id}>
                                                                        <td className="p-2 border border-slate-200 font-bold">{rec.date ? new Date(rec.date).toLocaleDateString('en-GB') : ''}</td>
                                                                        {rtable.trackedMetrics.map(m => {
                                                                            const v = rec.values[m.id];
                                                                            if (m.isBilateral) return <td key={m.id} className="p-0 border border-slate-200"><div className="flex h-full min-h-[30px]"><div className="flex-1 border-r border-slate-200 flex items-center justify-center p-1">{v?.r||'-'}</div><div className="flex-1 flex items-center justify-center p-1">{v?.l||'-'}</div></div></td>;
                                                                            return <td key={m.id} className="p-2 border border-slate-200 text-center">{v||'-'}</td>;
                                                                        })}
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            ) : null)}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
