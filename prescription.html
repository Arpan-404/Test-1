<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache & Code Diagnostic</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #38bdf8; padding: 20px; line-height: 1.5; font-size: 14px; }
        h2 { color: #f8fafc; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .box { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .error { color: #ef4444; font-weight: bold; font-size: 16px; }
        .success { color: #22c55e; font-weight: bold; font-size: 16px; }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; color: #e2e8f0; font-size: 12px; }
    </style>
</head>
<body>
    <h2>System Diagnostic Tool</h2>
    <div class="box" id="status">Scanning page source...</div>
    <div id="results"></div>

    <script>
        async function runDiagnostics() {
            const statusEl = document.getElementById('status');
            const resultsEl = document.getElementById('results');
            
            try {
                // 1. Force fetch the live file from the server bypassing cache
                const cacheBuster = new Date().getTime();
                const url = window.location.href.split('?')[0] + '?t=' + cacheBuster;
                statusEl.innerHTML = `Fetching raw code from:<br/><span style="color:#fcd34d">${url}</span>`;
                
                const response = await fetch(url);
                const rawCode = await response.text();
                
                let html = "";
                
                // 2. Scan for "import" statements (The cause of the crash)
                const hasImport = rawCode.includes('import {') || rawCode.includes('import(') || rawCode.includes('import ');
                
                html += '<div class="box">';
                if (hasImport) {
                    html += '<span class="error">❌ FATAL FINDING: Your file STILL contains "import" statements.</span><br/><br/>';
                    html += '<span style="color:#f8fafc">This proves the old, broken code is still being served to your phone. Either you haven\'t saved the newest code in GitHub, or Vercel is deeply caching the old version.</span>';
                } else {
                    html += '<span class="success">✅ CLEAN: No "import" statements found!</span><br/><br/>';
                    html += '<span style="color:#f8fafc">The file on the server is completely fixed! If your phone app is still crashing, your mobile Chrome browser is aggressively caching the old version in its internal memory.</span>';
                }
                html += '</div>';

                // 3. Extract and display all <script> tags to visually prove what is loading
                html += '<h3 style="color:#f8fafc">Scripts Currently Loaded from the Server:</h3>';
                const scriptRegex = /<script[\s\S]*?<\/script>/gi;
                const scripts = rawCode.match(scriptRegex) || [];
                
                scripts.forEach((script, index) => {
                    const escaped = script.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const isBabel = script.includes('text/babel');
                    const hasImp = script.includes('import ');
                    
                    let borderColor = hasImp ? '#ef4444' : (isBabel ? '#3b82f6' : '#22c55e');
                    let statusLabel = hasImp ? 'CRASH RISK (Contains Import)' : 'SAFE SCRIPT';
                    
                    html += `<div style="border-left: 4px solid ${borderColor}; margin-bottom: 15px;">`;
                    html += `<div style="background: ${borderColor}; color: #000; padding: 4px 10px; font-weight: bold;">Script Block ${index + 1} - ${statusLabel}</div>`;
                    html += `<pre>${escaped}</pre></div>`;
                });

                resultsEl.innerHTML = html;
                statusEl.innerHTML = "Scan Complete.";

            } catch (err) {
                statusEl.innerHTML = `<span class="error">Network Fetch Failed: ${err.message}</span>`;
            }
        }
        
        // Run immediately
        runDiagnostics();
    </script>
</body>
</html>
