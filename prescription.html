<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Patient Records - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f4f7fb', surface: '#ffffff' },
            boxShadow: { 'soft': '0 2px 10px rgba(29, 78, 216, 0.05)' }
          }
        }
      }
    </script>

    <style>
        /* Print Layout Rules (Preserved Exactly) */
        @page { size: A4; margin: 10mm; }
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .print-break-after-auto { page-break-after: auto; }
            thead.print-table-header { display: table-header-group; }
            table.main-print-table { page-break-inside: auto; width: 100%; }
            tr.main-print-row { page-break-inside: avoid; page-break-after: auto; }
            tr.main-print-row-allow-break { page-break-inside: auto; page-break-after: auto; }
            .editable-cell:empty:before { content: none !important; display: none !important; }
        }
        
        /* General Styles */
        .editable-cell { min-width: 30px; max-width: 100%; outline: none; word-break: break-word; white-space: pre-wrap; transition: background-color 0.2s; }
        .editable-cell:not([contenteditable="false"]):empty:before { content: attr(data-placeholder); color: #cbd5e1; pointer-events: none; display: block; }
        .editable-cell:not([contenteditable="false"]):focus { background-color: rgba(219, 234, 254, 0.5); }
        .h-scroll::-webkit-scrollbar { display: none; }
        .h-scroll { scrollbar-width: none; }
        
        /* Instant Loading Spinner Animation */
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }
    </style>
</head>
<body class="bg-[#f4f7fb]">
    
    <!-- Instant Native HTML Loader (Prevents blank screen while React downloads) -->
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif; color: #1e3a8a;">
            <div class="native-loader"></div>
            <div style="font-weight: bold; font-size: 1.1rem;">Loading PhysioCare...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithCustomToken, signInAnonymously, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        const generateId = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);

        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            // Your exact database keys
            firebaseConfig = {
              apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
              authDomain: "patient-records-arpan.firebaseapp.com",
              projectId: "patient-records-arpan",
              storageBucket: "patient-records-arpan.firebasestorage.app",
              messagingSenderId: "599041105903",
              appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a",
              measurementId: "G-ZEE89YP3F3"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        try { getAnalytics(app); } catch (e) {}

        const googleProvider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'physiocare-tracker';

        // Joint Data Dictionary
        const JOINTS_DATA = {
          'Cervical': [ { name: 'Flexion', type: 'single', normal: '45°' }, { name: 'Extension', type: 'single', normal: '45°' }, { name: 'Lat. Flexion', type: 'bilateral', normal: '45°' }, { name: 'Rotation', type: 'bilateral', normal: '60°' } ],
          'Spine': [ { name: 'Flexion', type: 'single', normal: '80°' }, { name: 'Extension', type: 'single', normal: '25°' }, { name: 'Lat. Flexion', type: 'bilateral', normal: '35°' }, { name: 'Rotation', type: 'bilateral', normal: '45°' } ],
          'Shoulder': [ { name: 'Flexion', type: 'bilateral', normal: '180°' }, { name: 'Extension', type: 'bilateral', normal: '60°' }, { name: 'Abduction', type: 'bilateral', normal: '180°' }, { name: 'Adduction', type: 'bilateral', normal: '50°' }, { name: 'Int. Rotation', type: 'bilateral', normal: '70°' }, { name: 'Ext. Rotation', type: 'bilateral', normal: '90°' } ],
          'Elbow': [ { name: 'Flexion', type: 'bilateral', normal: '150°' }, { name: 'Extension', type: 'bilateral', normal: '0°' } ],
          'Forearm': [ { name: 'Pronation', type: 'bilateral', normal: '80°' }, { name: 'Supination', type: 'bilateral', normal: '80°' } ],
          'Wrist': [ { name: 'Flexion', type: 'bilateral', normal: '80°' }, { name: 'Extension', type: 'bilateral', normal: '70°' }, { name: 'Radial Dev.', type: 'bilateral', normal: '20°' }, { name: 'Ulnar Dev.', type: 'bilateral', normal: '30°' } ],
          'Hip': [ { name: 'Flexion', type: 'bilateral', normal: '120°' }, { name: 'Extension', type: 'bilateral', normal: '30°' }, { name: 'Abduction', type: 'bilateral', normal: '45°' }, { name: 'Adduction', type: 'bilateral', normal: '30°' }, { name: 'Int. Rotation', type: 'bilateral', normal: '45°' }, { name: 'Ext. Rotation', type: 'bilateral', normal: '45°' } ],
          'Knee': [ { name: 'Flexion', type: 'bilateral', normal: '135°' }, { name: 'Extension', type: 'bilateral', normal: '0°' } ],
          'Ankle': [ { name: 'Dorsiflexion', type: 'bilateral', normal: '20°' }, { name: 'Plantarflexion', type: 'bilateral', normal: '50°' }, { name: 'Inversion', type: 'bilateral', normal: '35°' }, { name: 'Eversion', type: 'bilateral', normal: '15°' } ]
        };

        // Text Area component
        function AutoTextArea({ value, ...props }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) { ref.current.style.height = 'auto'; ref.current.style.height = ref.current.scrollHeight + 'px'; }
            }, [value]);
            return <textarea ref={ref} value={value} {...props} style={{ overflow: 'hidden', resize: 'none' }} />;
        }

        // Custom Table Editor
        function CustomTableEditor({ table, updateTable, removeTable, readOnly = false }) {
            const addRow = () => updateTable({ ...table, rows: [...table.rows, Array(table.headers.length).fill('')] });
            const addCol = () => updateTable({ ...table, headers: [...table.headers, 'New Col'], rows: table.rows.map(r => [...r, '']) });
            const removeRow = (idx) => updateTable({ ...table, rows: table.rows.filter((_, i) => i !== idx) });
            const removeCol = (idx) => updateTable({ ...table, headers: table.headers.filter((_, i) => i !== idx), rows: table.rows.map(r => r.filter((_, i) => i !== idx)) });
            const updateHeader = (idx, val) => updateTable({ ...table, headers: table.headers.map((h, i) => i === idx ? val : h) });
            const updateCell = (rIdx, cIdx, val) => updateTable({ ...table, rows: table.rows.map((row, i) => i === rIdx ? row.map((cell, j) => j === cIdx ? val : cell) : row) });
            const updateTitle = (val) => updateTable({ ...table, title: val });

            return (
                <div className="w-fit max-w-full bg-white border border-slate-200 rounded-lg shadow-sm overflow-x-auto print:overflow-visible print:border-none print:shadow-none print-break-inside-avoid">
                    <div className={`bg-ice/30 px-2 py-1.5 flex items-center justify-between border-b border-slate-200 print:bg-transparent print:px-0 ${table.title ? 'print:border-b print:border-[#1e40af]' : 'print:border-none print:p-0'}`}>
                        <div contentEditable={!readOnly} suppressContentEditableWarning onBlur={(e) => updateTitle(e.currentTarget.innerText)} className={`font-bold text-[13px] text-navy outline-none editable-cell w-auto print:text-[#1e40af] print:text-[18px] ${!table.title && readOnly ? 'hidden' : ''}`} data-placeholder={readOnly ? '' : "Table Title"}>{table.title}</div>
                        {!readOnly && (
                            <div className="flex gap-1 print:hidden ml-3">
                                <button onClick={addCol} className="text-[10px] bg-white border border-slate-300 text-slate-600 px-1.5 py-0.5 rounded">+ Col</button>
                                <button onClick={addRow} className="text-[10px] bg-white border border-slate-300 text-slate-600 px-1.5 py-0.5 rounded">+ Row</button>
                                <button onClick={removeTable} className="text-[10px] text-red-500 px-1.5 py-0.5"><i className="ph-bold ph-trash"></i></button>
                            </div>
                        )}
                    </div>
                    <div className="p-1.5 print:p-0 print:mt-2">
                        <table className="w-auto min-w-[150px] text-left border-collapse table-auto print:border print:border-[#1e40af]">
                            <thead>
                                <tr>
                                    {table.headers.map((h, i) => (
                                        <th key={i} className="relative group border border-slate-200 p-0 bg-slate-50 print:border print:border-[#1e40af] print:bg-blue-50/30 print-break-inside-avoid">
                                            <div contentEditable={!readOnly} suppressContentEditableWarning onBlur={(e) => updateHeader(i, e.currentTarget.innerText)} className={`editable-cell font-bold text-navy text-[11px] p-1.5 print:text-[#1e40af] print:font-bold print:text-[16px] ${readOnly ? 'cursor-default' : ''}`} data-placeholder="Header">{h}</div>
                                            {!readOnly && table.headers.length > 1 && ( <button onClick={() => removeCol(i)} className="absolute -top-1.5 -right-1.5 bg-red-100 text-red-600 rounded-full w-3.5 h-3.5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity print:hidden text-[8px] z-10"><i className="ph-bold ph-x"></i></button> )}
                                        </th>
                                    ))}
                                    {!readOnly && <th className="w-6 border-none print:hidden"></th>}
                                </tr>
                            </thead>
                            <tbody>
                                {table.rows.map((row, rIdx) => (
                                    <tr key={rIdx} className="group print-break-inside-avoid">
                                        {row.map((cell, cIdx) => (
                                            <td key={cIdx} className="border border-slate-200 p-0 align-top print:border print:border-[#1e40af]">
                                                <div contentEditable={!readOnly} suppressContentEditableWarning onBlur={(e) => updateCell(rIdx, cIdx, e.currentTarget.innerText)} className={`editable-cell text-slate-700 text-[11px] p-1.5 min-h-[28px] print:text-slate-900 print:min-h-0 print:py-1.5 print:px-2.5 print:text-[16px] ${readOnly ? 'min-h-[auto] cursor-default' : ''}`}>{cell}</div>
                                            </td>
                                        ))}
                                        {!readOnly && (
                                            <td className="w-6 text-center border-none p-0 align-middle print:hidden">
                                                {table.rows.length > 1 && ( <button onClick={() => removeRow(rIdx)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-0.5"><i className="ph-bold ph-trash text-[10px]"></i></button> )}
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // MAIN APP COMPONENT
        function App() {
          const [allPatients, setAllPatients] = useState([]);
          const [draftPatient, setDraftPatient] = useState(null); 
          const [viewMode, setViewMode] = useState('patient_login_form'); 
          const [authRole, setAuthRole] = useState(null); 
          
          const [activePatientId, setActivePatientId] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [isSaving, setIsSaving] = useState(false);
          
          const [user, setUser] = useState(null);
          const [isConnecting, setIsConnecting] = useState(true);
          const [isCheckingSession, setIsCheckingSession] = useState(true);
          const [loginError, setLoginError] = useState("");

          const [patientLoginId, setPatientLoginId] = useState("");
          const [patientLoginPhone, setPatientLoginPhone] = useState("");

          const draftPatientRef = useRef(null);
          useEffect(() => { draftPatientRef.current = draftPatient; }, [draftPatient]);

          // URL Hash Routing
          useEffect(() => {
              const handleHashChange = () => {
                  const hash = window.location.hash;
                  if (hash.startsWith('#/reports/')) {
                      const upid = hash.replace('#/reports/', '');
                      if (draftPatientRef.current && draftPatientRef.current.ipId === upid) return;
                      if (allPatients.length > 0) {
                          const match = allPatients.find(p => p.ipId === upid);
                          if (match) {
                              if (authRole === 'patient' && activePatientId !== match.id) {
                                  setViewMode('patient_login_form'); 
                              } else if (authRole === 'doctor' || authRole === 'patient') {
                                  setActivePatientId(match.id);
                                  setViewMode('patient');
                              } else {
                                  setPatientLoginId(upid);
                                  setViewMode('patient_login_form');
                              }
                          } else { window.location.hash = ''; }
                      }
                  } else if (hash === '' || hash === '#/') {
                      if (authRole === 'doctor' && viewMode === 'patient') {
                          setViewMode('home');
                          setActivePatientId(null);
                          setDraftPatient(null);
                      }
                  }
              };
              window.addEventListener('hashchange', handleHashChange);
              if (!isConnecting && !isCheckingSession) handleHashChange();
              return () => window.removeEventListener('hashchange', handleHashChange);
          }, [allPatients, isConnecting, isCheckingSession, authRole, viewMode, activePatientId]);

          // Auth Initialization
          useEffect(() => {
            const initAuth = async () => {
                await setPersistence(auth, browserLocalPersistence);
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => { 
                    if (currentUser) {
                        setUser(currentUser); 
                        setIsConnecting(false);
                    } else {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                            else await signInAnonymously(auth);
                        } catch(e) { setIsConnecting(false); }
                    }
                });
                return () => unsubscribe();
            };
            initAuth();
          }, []);

          // Session Restoration
          useEffect(() => {
              if (!user) { if (!isConnecting) setIsCheckingSession(false); return; }
              const checkLoginState = async () => {
                  const isGoogleUser = user.providerData.some(p => p.providerId === 'google.com');
                  if (isGoogleUser) {
                      setAuthRole('doctor');
                      if(window.location.hash === '' || !window.location.hash.startsWith('#/reports/')) setViewMode('home');
                      setIsCheckingSession(false);
                      return;
                  }
                  try {
                      const docSnap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'preferences', 'loginState'));
                      if (docSnap.exists()) {
                          const data = docSnap.data();
                          if (data.role === 'patient' && data.patientId) {
                              setAuthRole('patient');
                              setActivePatientId(data.patientId);
                              if(!window.location.hash.startsWith('#/reports/')) {
                                  const pat = allPatients.find(p=> p.id === data.patientId);
                                  if(pat) window.location.hash = `#/reports/${pat.ipId}`;
                                  setViewMode('patient');
                              }
                              setIsCheckingSession(false);
                              return;
                          }
                      }
                  } catch (e) {}
                  
                  if(!window.location.hash.startsWith('#/reports/')) setViewMode('patient_login_form');
                  setIsCheckingSession(false);
              };
              if (allPatients.length > 0) checkLoginState();
              else { const timer = setTimeout(checkLoginState, 1000); return () => clearTimeout(timer); }
          }, [user, isConnecting, allPatients.length]);

          // Realtime Database Sync
          useEffect(() => {
            if (!user) return;
            const unsubscribe = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'patients'), (snapshot) => {
              const data = [];
              snapshot.forEach(doc => {
                  const p = doc.data();
                  if (p.customTables) {
                      p.customTables = p.customTables.map(t => {
                          let parsedRows = [['', '']];
                          try { parsedRows = typeof t.rows === 'string' ? JSON.parse(t.rows) : t.rows; } catch(e) {}
                          return { ...t, rows: parsedRows };
                      });
                  }
                  data.push({ id: doc.id, ...p });
              });
              setAllPatients(data);
            });
            return () => unsubscribe();
          }, [user]);

          // Handlers
          const handleDoctorGoogleLogin = async () => { setLoginError(""); try { await signInWithPopup(auth, googleProvider); } catch (error) {} };

          const handlePatientLoginSubmit = async (e) => {
              e.preventDefault();
              setLoginError("");
              const safeInputId = patientLoginId.toLowerCase().trim();
              const safeInputPhone = patientLoginPhone.trim();
              const match = allPatients.find(p => {
                  const safeName = (p.name || '').toLowerCase().trim();
                  const safeIpId = (p.ipId || '').toLowerCase().trim();
                  return (safeIpId === safeInputId || safeName === safeInputId) && (p.contact || '').trim() === safeInputPhone;
              });

              if (match) {
                  if (!match.isPublished) return setLoginError("Record is under review.");
                  setAuthRole('patient'); setActivePatientId(match.id); setViewMode('patient'); window.location.hash = `#/reports/${match.ipId}`;
                  if (user) { try { await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'preferences', 'loginState'), { role: 'patient', patientId: match.id }); } catch(e) { } }
              } else { setLoginError("Record not found."); }
          };

          const handleLogout = async () => {
              window.location.hash = ''; setIsCheckingSession(true);
              if (user) { try { await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'preferences', 'loginState'), { role: null, patientId: null }); } catch(e){} }
              setAuthRole(null); setActivePatientId(null); setDraftPatient(null); setViewMode('patient_login_form'); setPatientLoginId(""); setPatientLoginPhone("");
              try { await signOut(auth); } catch (error) {}
          };

          const handleCreatePatient = () => {
            let newIpId;
            do { newIpId = Math.floor(1000 + Math.random() * 9000).toString(); } while (allPatients.some(p => p.ipId === newIpId));
            const newPatient = { id: generateId(), ipId: newIpId, doctorId: user.uid, date: new Date().toISOString().split('T')[0], name: '', age: '', gender: '', contact: '', chiefComplaints: '', history: '', assessmentNote: '', diagnosis: '', treatmentNote: '', customTables: [], reassessmentTables: [], reports: [], isPublished: false };
            setDraftPatient(newPatient); setActivePatientId(newPatient.id); setViewMode('patient'); window.location.hash = `#/reports/${newIpId}`; 
          };

          const handleSavePatient = async (updatedPatient) => {
            if (authRole !== 'doctor') return;
            setIsSaving(true);
            try {
                const patientToSave = { ...updatedPatient, doctorId: user.uid };
                delete patientToSave.trackedMetrics; delete patientToSave.records;
                if (patientToSave.customTables) patientToSave.customTables = patientToSave.customTables.map(t => ({ ...t, rows: JSON.stringify(t.rows) }));
                Object.keys(patientToSave).forEach(key => { if (patientToSave[key] === undefined) delete patientToSave[key]; });
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'patients', updatedPatient.id), patientToSave);
                setDraftPatient(null);
            } catch(e) {}
            setTimeout(() => setIsSaving(false), 500); 
          };

          if (isConnecting || isCheckingSession) return null; // Native HTML loader handles this now

          // --- LOGIN SCREEN ---
          if (viewMode === 'patient_login_form') {
              return (
                  <div className="min-h-screen bg-appbg flex flex-col items-center justify-center p-4 relative">
                      <button onClick={handleDoctorGoogleLogin} className="absolute top-4 right-4 flex items-center gap-1.5 bg-white border border-slate-200 text-navy px-3 py-1.5 rounded-full text-xs font-bold shadow-sm hover:bg-slate-50 transition-colors">
                          <i className="ph-bold ph-stethoscope"></i> Staff
                      </button>

                      <div className="max-w-sm w-full bg-surface rounded-xl shadow-soft border border-slate-200 p-6">
                          <div className="text-center mb-6">
                              <i className="ph-fill ph-activity text-4xl text-azure mb-1"></i>
                              <h1 className="text-xl font-bold text-navy">Patient Records</h1>
                          </div>
                          
                          <form onSubmit={handlePatientLoginSubmit} className="space-y-4">
                              {loginError && <div className="p-2 bg-red-50 text-red-600 text-xs rounded border border-red-100">{loginError}</div>}
                              <div className="space-y-1">
                                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Patient Name or UPID</label>
                                  <input type="text" required value={patientLoginId} onChange={e => setPatientLoginId(e.target.value)} placeholder="e.g. John or 4092" className="w-full p-2.5 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-azure focus:ring-1 focus:ring-azure" />
                              </div>
                              <div className="space-y-1">
                                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Mobile Number</label>
                                  <input type="tel" required value={patientLoginPhone} onChange={e => setPatientLoginPhone(e.target.value)} placeholder="9876543210" className="w-full p-2.5 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-azure focus:ring-1 focus:ring-azure" />
                              </div>
                              <button type="submit" className="w-full bg-azure text-white font-bold py-2.5 rounded-md hover:bg-navy shadow-sm mt-2 text-sm transition-colors">View Records</button>
                          </form>
                      </div>
                  </div>
              );
          }

          const doctorPatients = allPatients.filter(p => p.doctorId === user?.uid);
          const activePatient = draftPatient || allPatients.find(p => p.id === activePatientId) || { id: activePatientId };

          // --- MAIN RENDER (Home or Patient Detail) ---
          return (
            <div className="min-h-screen bg-appbg text-slate-800 font-sans print:bg-white print:m-0 print:p-0">
              {viewMode === 'home' ? (
                  <>
                      {/* HOME HEADER */}
                      <header className="bg-white/95 backdrop-blur-md shadow-sm border-b border-slate-200 sticky top-0 z-10 h-[50px] flex items-center print:hidden">
                        <div className="w-full max-w-6xl mx-auto px-3 flex justify-between items-center">
                          <div className="flex items-center gap-1.5 text-navy">
                            <i className="ph-bold ph-activity text-xl text-azure"></i>
                            <h1 className="text-base font-bold tracking-tight">Records</h1>
                          </div>
                          <div className="flex items-center gap-2">
                              <button onClick={handleCreatePatient} className="flex items-center gap-1 bg-azure text-white px-3 py-1.5 rounded-md text-xs font-bold hover:bg-navy shadow-sm"><i className="ph-bold ph-plus"></i> New</button>
                              <button onClick={handleLogout} className="flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 border border-slate-200 ml-1"><i className="ph-bold ph-sign-out text-sm"></i></button>
                          </div>
                        </div>
                      </header>
                      <main className="max-w-6xl mx-auto px-2 sm:px-4 py-4 print:p-0 print:m-0 print:max-w-none">
                          <HomeView patients={doctorPatients.filter(p => p.ipId?.toLowerCase().includes(searchQuery.toLowerCase()) || p.name?.toLowerCase().includes(searchQuery.toLowerCase()) || p.contact?.includes(searchQuery) || p.diagnosis?.toLowerCase().includes(searchQuery.toLowerCase()))} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onOpenPatient={(p) => { setActivePatientId(p.id); setViewMode('patient'); window.location.hash = `#/reports/${p.ipId}`; }} />
                      </main>
                  </>
              ) : (
                  <PatientDetailView 
                      patient={activePatient} 
                      onSave={handleSavePatient} 
                      onCancel={() => { 
                          setDraftPatient(null); 
                          if(authRole === 'doctor') { setViewMode('home'); setActivePatientId(null); window.location.hash = ''; } 
                          else { handleLogout(); } 
                      }} 
                      readOnly={authRole === 'patient'} 
                      authRole={authRole}
                      isSaving={isSaving}
                  />
              )}
            </div>
          );
        }

        // --- COMPACT HOME VIEW (Doctor Only) ---
        function HomeView({ patients, searchQuery, setSearchQuery, onOpenPatient }) {
          return (
            <div className="space-y-3 print:hidden animate-in fade-in">
              <div className="bg-surface p-2.5 rounded-xl shadow-soft border border-slate-200 flex items-center gap-2">
                <i className="ph-bold ph-magnifying-glass text-slate-400 ml-1"></i>
                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search patients..." className="w-full bg-transparent outline-none text-sm text-slate-700" />
              </div>
              
              <div className="bg-surface rounded-xl shadow-soft border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full border-collapse">
                    <thead>
                      <tr className="bg-slate-50 border-b border-slate-200 text-left text-[10px] text-slate-500 uppercase tracking-wider font-bold">
                        <th className="py-3 px-3 w-14">ID</th>
                        <th className="py-3 px-3 w-40">Patient</th>
                        <th className="py-3 px-3">Diagnosis</th>
                        <th className="py-3 px-3 w-20 text-center">Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {patients.length === 0 ? (
                        <tr><td colSpan="4" className="py-8 text-center text-xs text-slate-400 font-medium">No records found.</td></tr>
                      ) : (
                        patients.map(p => (
                          <tr key={p.id} className="border-b border-slate-100 hover:bg-slate-50 cursor-pointer" onClick={() => onOpenPatient(p)}>
                            <td className="py-3 px-3 text-xs font-bold text-azure align-top">#{p.ipId}</td>
                            <td className="py-3 px-3 align-top">
                              <div className="font-bold text-sm text-slate-800 leading-tight">{p.name || 'Unnamed'}</div>
                              <div className="text-[10px] text-slate-500 mt-0.5">{p.contact || '-'}</div>
                            </td>
                            <td className="py-3 px-3 text-xs text-slate-600 align-top">{p.diagnosis || <span className="text-slate-300 italic">None</span>}</td>
                            <td className="py-3 px-3 text-center align-top">
                                {p.isPublished ? 
                                    <span className="inline-block px-2 py-0.5 rounded text-[9px] font-bold bg-emerald-50 text-emerald-600 border border-emerald-200">Published</span> : 
                                    <span className="inline-block px-2 py-0.5 rounded text-[9px] font-bold bg-slate-100 text-slate-500 border border-slate-200">Draft</span>
                                }
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        // --- COMPACT PATIENT DETAIL VIEW (With Header Actions) ---
        function PatientDetailView({ patient, onSave, onCancel, readOnly = false, authRole, isSaving }) {
          const [formData, setFormData] = useState(() => {
              let rTables = patient.reassessmentTables || [];
              if (rTables.length === 0 && (patient.trackedMetrics?.length > 0 || patient.records?.length > 0)) {
                  rTables = [{ id: 'default-reassessment', title: 'Reassessment and progression tracking :-', trackedMetrics: patient.trackedMetrics || [], records: patient.records || [] }];
              } else if (rTables.length === 0) { rTables = [{ id: generateId(), title: 'Progression Tracking', trackedMetrics: [], records: [] }]; }
              return { ...patient, customTables: patient.customTables || [], reassessmentTables: rTables, treatmentNote: patient.treatmentNote || '', reports: patient.reports || [], isPublished: patient.isPublished || false };
          });

          const [isUploading, setIsUploading] = useState(false);
          const [showLinkCopied, setShowLinkCopied] = useState(false);
          const fileInputRef = useRef(null);

          useEffect(() => {
              if (patient && patient.id !== formData.id && patient.id) {
                  let rTables = patient.reassessmentTables || [];
                  if (rTables.length === 0) rTables = [{ id: generateId(), title: 'Progression Tracking', trackedMetrics: [], records: [] }];
                  setFormData({ ...patient, customTables: patient.customTables || [], reassessmentTables: rTables, treatmentNote: patient.treatmentNote || '', reports: patient.reports || [], isPublished: patient.isPublished || false });
              }
          }, [patient]);
          
          const [isMetricModalOpen, setIsMetricModalOpen] = useState(false);
          const [activeReassessmentTableId, setActiveReassessmentTableId] = useState(null);

          const handleInputChange = (e) => { if (readOnly) return; const { name, value } = e; setFormData((prev) => ({ ...prev, [name]: value })); };
          const handleAddCustomTable = (section) => { if (readOnly) return; setFormData(prev => ({ ...prev, customTables: [...prev.customTables, { id: generateId(), section: section, title: '', headers: ['Col 1', 'Col 2'], rows: [['', '']] }] })); };
          const handleUpdateCustomTable = (upd) => { if (readOnly) return; setFormData(prev => ({ ...prev, customTables: prev.customTables.map(t => t.id === upd.id ? upd : t) })); };
          const handleRemoveCustomTable = (id) => { if (readOnly) return; setFormData(prev => ({ ...prev, customTables: prev.customTables.filter(t => t.id !== id) })); };
          const addReassessmentTable = () => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: [...prev.reassessmentTables, { id: generateId(), title: 'Progression Tracking', trackedMetrics: [], records: [] }] })); };
          const removeReassessmentTable = (id) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.filter(t => t.id !== id) })); };
          const updateReassessmentTableTitle = (id, title) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === id ? { ...t, title } : t) })); };
          const addMetricColumn = (id, m) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === id ? { ...t, trackedMetrics: [...t.trackedMetrics, m] } : t) })); setIsMetricModalOpen(false); setActiveReassessmentTableId(null); };
          const removeMetricColumn = (tId, mId) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => { if (t.id !== tId) return t; return { ...t, trackedMetrics: t.trackedMetrics.filter(m => m.id !== mId), records: t.records.map(rec => { const newValues = { ...rec.values }; delete newValues[mId]; return { ...rec, values: newValues }; }) }; }) })); };
          const addDateRow = (id) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === id ? { ...t, records: [...t.records, { id: generateId(), date: new Date().toISOString().split('T')[0], values: {} }] } : t) })); };
          const removeDateRow = (tId, rId) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === tId ? { ...t, records: t.records.filter(r => r.id !== rId) } : t) })); };
          const updateRecordDate = (tId, rId, d) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => { if (t.id !== tId) return t; return { ...t, records: t.records.map(r => r.id === rId ? { ...r, date: d } : r) }; }) })); };
          const updateSimpleCellValue = (tId, rId, mId, v) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => { if (t.id !== tId) return t; return { ...t, records: t.records.map(rec => { if (rec.id !== rId) return rec; return { ...rec, values: { ...rec.values, [mId]: v } }; })}; }) })); };
          const updateMultiFieldCellValue = (tId, rId, mId, sub, v) => { if (readOnly) return; setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => { if (t.id !== tId) return t; return { ...t, records: t.records.map(rec => { if (rec.id !== rId) return rec; let nv = { ...rec.values }; nv[mId] = { ...(nv[mId] || {}), [sub]: v }; return { ...rec, values: nv }; })}; }) })); };

          const handleFileUpload = async (e) => {
              const file = e.target.files[0];
              if (!file) return;
              setIsUploading(true);
              const payload = new FormData(); payload.append('file', file); payload.append('upload_preset', 'physiocare_preset');
              try {
                  const res = await fetch(`https://api.cloudinary.com/v1_1/desvmq2l9/auto/upload`, { method: 'POST', body: payload });
                  const data = await res.json();
                  if (data.secure_url) setFormData(prev => ({ ...prev, reports: [...(prev.reports || []), { id: generateId(), url: data.secure_url, name: file.name, type: file.type || 'unknown', date: new Date().toISOString() }] }));
                  else alert(`Upload Failed: ${data.error?.message}`);
              } catch (err) { alert("Upload error."); } 
              finally { setIsUploading(false); if (fileInputRef.current) fileInputRef.current.value = ''; }
          };

          const handleRemoveReport = (id) => { if (readOnly) return; if (confirm("Remove report?")) setFormData(prev => ({ ...prev, reports: prev.reports.filter(r => r.id !== id) })); };
          const togglePublish = () => { if (readOnly) return; const newState = !formData.isPublished; setFormData(prev => ({ ...prev, isPublished: newState })); onSave({ ...formData, isPublished: newState }); };
          const copyPatientLink = () => { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}#/reports/${formData.ipId}`).then(() => { setShowLinkCopied(true); setTimeout(() => setShowLinkCopied(false), 2000); }); };
          const formattedPrintDate = formData.date ? new Date(formData.date).toLocaleDateString('en-GB') : '';

          return (
            <div className="w-full">
              
              {/* --- PATIENT HEADER (Replaces the bottom bar & global header) --- */}
              <header className="bg-white/95 backdrop-blur-md shadow-sm border-b border-slate-200 sticky top-0 z-10 h-[50px] flex items-center print:hidden px-3 -mt-4 mb-3 w-full">
                <div className="w-full max-w-6xl mx-auto flex justify-between items-center">
                    
                    <button onClick={onCancel} className="flex items-center gap-1 text-sm font-bold text-slate-500 hover:text-navy shrink-0">
                        <i className="ph-bold ph-arrow-left text-lg"></i> <span className="hidden sm:inline">Back</span>
                    </button>

                    <div className="flex items-center gap-1.5 shrink-0 ml-auto">
                        <div className="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded border border-slate-200 shadow-sm hidden sm:flex">
                            <span className="text-[10px] font-bold text-slate-400">DATE:</span>
                            <input type="date" name="date" disabled={readOnly} value={formData.date || ''} onChange={(e) => handleInputChange(e.target)} className={`text-xs font-bold outline-none bg-transparent w-[95px] ${readOnly?'text-navy':'text-slate-800'}`} />
                        </div>
                        
                        <button className="flex items-center gap-1 px-3 py-1.5 bg-white border border-slate-200 text-slate-700 rounded-md text-xs font-bold hover:bg-slate-50 shadow-sm" onClick={() => window.print()}>
                            <i className="ph-bold ph-printer text-sm"></i> Print
                        </button>
                        
                        {!readOnly && (
                            <button onClick={() => onSave(formData)} className="flex items-center gap-1 px-4 py-1.5 bg-azure text-white rounded-md text-xs font-bold hover:bg-navy shadow-sm transition-colors">
                                <i className="ph-bold ph-floppy-disk text-sm"></i> Save {isSaving && "..."}
                            </button>
                        )}
                    </div>
                </div>
              </header>
              
              <main className="max-w-6xl mx-auto px-2 sm:px-4 py-2 print:p-0 print:m-0 print:max-w-none space-y-3 animate-in fade-in">
                
                {/* Sub-Header: Date (Mobile), Share, Publish, UPID */}
                <div className="flex flex-wrap justify-between items-center gap-2 px-1 mb-2">
                    <div className="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded border border-slate-200 shadow-sm sm:hidden">
                        <span className="text-[10px] font-bold text-slate-400">DATE:</span>
                        <input type="date" name="date" disabled={readOnly} value={formData.date || ''} onChange={(e) => handleInputChange(e.target)} className={`text-xs font-bold outline-none bg-transparent w-[95px] ${readOnly?'text-navy':'text-slate-800'}`} />
                    </div>
                    
                    <div className="flex items-center gap-1.5 ml-auto">
                        {authRole === 'doctor' && (
                            <>
                                <button onClick={copyPatientLink} className="flex items-center gap-1 px-2 py-1 rounded border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 shadow-sm relative text-[10px] font-bold">
                                    <i className="ph-bold ph-link"></i> Share
                                    {showLinkCopied && <span className="absolute -top-6 left-1/2 -translate-x-1/2 bg-navy text-white px-1.5 py-0.5 rounded text-[9px] whitespace-nowrap">Copied!</span>}
                                </button>
                                <button onClick={togglePublish} className={`flex items-center gap-1 px-2 py-1 rounded text-[10px] font-bold border shadow-sm ${formData.isPublished ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-600 border-slate-200'}`}>
                                    {formData.isPublished ? <><i className="ph-fill ph-check-circle"></i> Published</> : <><i className="ph-fill ph-lock-key"></i> Draft</>}
                                </button>
                            </>
                        )}
                        <div className="px-2 py-1 rounded font-bold text-[10px] bg-ice text-navy border border-blue-200">#{formData.ipId}</div>
                    </div>
                </div>

                {/* Profile */}
                <section className="bg-surface p-3 rounded-xl shadow-soft border border-slate-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-azure"></div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <input type="text" name="name" disabled={readOnly} value={formData.name || ''} onChange={(e) => handleInputChange(e.target)} className={`w-full p-2 text-sm bg-slate-50 border rounded-md outline-none ${readOnly ? 'border-transparent font-bold text-navy' : 'border-slate-200 focus:border-azure'}`} placeholder="Name" />
                    <input type="number" name="age" disabled={readOnly} value={formData.age || ''} onChange={(e) => handleInputChange(e.target)} className={`w-full p-2 text-sm bg-slate-50 border rounded-md outline-none ${readOnly ? 'border-transparent font-bold text-navy' : 'border-slate-200 focus:border-azure'}`} placeholder="Age" />
                    <select name="gender" disabled={readOnly} value={formData.gender || ''} onChange={(e) => handleInputChange(e.target)} className={`w-full p-2 text-sm bg-slate-50 border rounded-md outline-none ${readOnly ? 'border-transparent font-bold text-navy appearance-none' : 'border-slate-200 focus:border-azure'}`}><option value="">Gender</option><option value="Male">M</option><option value="Female">F</option></select>
                    <input type="tel" name="contact" disabled={readOnly} value={formData.contact || ''} onChange={(e) => handleInputChange(e.target)} className={`w-full p-2 text-sm bg-slate-50 border rounded-md outline-none ${readOnly ? 'border-transparent font-bold text-navy' : 'border-slate-200 focus:border-azure'}`} placeholder="Phone" />
                  </div>
                  {(formData.chiefComplaints || formData.history || !readOnly) && (
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2">
                        {readOnly ? ( <div><div className="text-[10px] font-bold text-slate-400 uppercase">C/C</div><div className="text-sm text-slate-800 whitespace-pre-wrap">{formData.chiefComplaints}</div></div> ) : (
                            <AutoTextArea name="chiefComplaints" minHeight="40px" value={formData.chiefComplaints || ''} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-azure" placeholder="Chief Complaints" />
                        )}
                        {readOnly ? ( <div><div className="text-[10px] font-bold text-slate-400 uppercase">History</div><div className="text-sm text-slate-800 whitespace-pre-wrap">{formData.history}</div></div> ) : (
                            <AutoTextArea name="history" minHeight="40px" value={formData.history || ''} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-azure" placeholder="Medical History" />
                        )}
                      </div>
                  )}
                </section>

                {/* Assessment */}
                <section className="bg-surface p-3 rounded-xl shadow-soft border border-slate-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-navy"></div>
                  <div className="flex items-center justify-between mb-2">
                      <h2 className="font-bold text-navy text-sm"><i className="ph-fill ph-clipboard-text"></i> Assessment</h2>
                      {!readOnly && <button onClick={() => handleAddCustomTable('assessment')} className="text-[10px] font-bold bg-ice text-navy px-2 py-1 rounded hover:bg-blue-200">+ Table</button>}
                  </div>
                  {readOnly ? ( <div className="text-sm text-slate-800 whitespace-pre-wrap">{formData.assessmentNote}</div> ) : (
                      <AutoTextArea name="assessmentNote" minHeight="50px" value={formData.assessmentNote || ''} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-navy" placeholder="Assessment notes..." />
                  )}
                  {formData.customTables.filter(t => t.section === 'assessment').length > 0 && (
                      <div className="flex flex-wrap gap-3 mt-2">{formData.customTables.filter(t => t.section === 'assessment').map(table => (<CustomTableEditor key={table.id} table={table} updateTable={handleUpdateCustomTable} removeTable={() => handleRemoveCustomTable(table.id)} readOnly={readOnly} />))}</div>
                  )}
                  <div className="mt-2"><input type="text" name="diagnosis" disabled={readOnly} value={formData.diagnosis || ''} onChange={(e) => handleInputChange(e.target)} className={`w-full p-2 text-sm rounded-md outline-none font-bold ${readOnly ? 'bg-transparent text-azure' : 'bg-ice/50 border border-blue-200 text-navy'}`} placeholder={readOnly ? '' : "Diagnosis..."} /></div>
                </section>

                {/* Treatment */}
                <section className="bg-surface p-3 rounded-xl shadow-soft border border-slate-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                  <div className="flex items-center justify-between mb-2">
                      <h2 className="font-bold text-emerald-700 text-sm"><i className="ph-fill ph-bandaids"></i> Treatment</h2>
                      {!readOnly && <button onClick={() => handleAddCustomTable('treatment')} className="text-[10px] font-bold bg-emerald-50 text-emerald-700 px-2 py-1 rounded hover:bg-emerald-100">+ Table</button>}
                  </div>
                  {readOnly ? ( <div className="text-sm text-slate-800 whitespace-pre-wrap">{formData.treatmentNote}</div> ) : (
                      <AutoTextArea name="treatmentNote" minHeight="50px" value={formData.treatmentNote || ''} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-emerald-500" placeholder="Treatment plan..." />
                  )}
                  {formData.customTables.filter(t => t.section === 'treatment').length > 0 && (
                      <div className="flex flex-wrap gap-3 mt-2">{formData.customTables.filter(t => t.section === 'treatment').map(table => (<CustomTableEditor key={table.id} table={table} updateTable={handleUpdateCustomTable} removeTable={() => handleRemoveCustomTable(table.id)} readOnly={readOnly} />))}</div>
                  )}
                </section>

                {/* Attachments */}
                <section className="bg-surface p-3 rounded-xl shadow-soft border border-slate-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-purple-500"></div>
                  <div className="flex items-center justify-between mb-2">
                      <h2 className="font-bold text-purple-700 text-sm"><i className="ph-fill ph-folder-open"></i> Reports</h2>
                      {!readOnly && (
                          <div><input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept="image/*,application/pdf" /><button onClick={() => fileInputRef.current?.click()} disabled={isUploading} className="text-[10px] font-bold bg-purple-50 text-purple-700 px-2 py-1 rounded hover:bg-purple-100">{isUploading ? 'Uploading...' : '+ File'}</button></div>
                      )}
                  </div>
                  {formData.reports && formData.reports.length > 0 ? (
                      <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2">
                          {formData.reports.map(report => (
                              <div key={report.id} className="relative group border border-slate-200 rounded bg-slate-50 flex flex-col">
                                  <div className="h-16 flex items-center justify-center overflow-hidden">
                                      {report.type.startsWith('image/') ? <img src={report.url} className="w-full h-full object-cover" /> : <i className={`ph-fill text-2xl ${report.type.includes('pdf') ? 'ph-file-pdf text-red-400' : 'ph-file text-slate-400'}`}></i>}
                                  </div>
                                  <a href={report.url} target="_blank" className="p-1 truncate text-[10px] font-bold text-navy text-center bg-white border-t border-slate-100">{report.name}</a>
                                  {!readOnly && <button onClick={() => handleRemoveReport(report.id)} className="absolute top-1 right-1 bg-white/90 text-red-500 p-0.5 rounded opacity-0 group-hover:opacity-100"><i className="ph-bold ph-x text-[10px]"></i></button>}
                              </div>
                          ))}
                      </div>
                  ) : ( <p className="text-xs text-slate-400">No reports attached.</p> )}
                </section>

                {/* Tracking */}
                <div className="space-y-3">
                    <div className="flex items-center justify-between px-1">
                        <h2 className="font-bold text-sm text-navy"><i className="ph-fill ph-chart-line-up"></i> Tracking</h2>
                        {!readOnly && <button onClick={() => handleAddCustomTable('reassessment')} className="bg-white text-navy border border-slate-200 px-2 py-1 rounded text-[10px] font-bold shadow-sm">+ Table</button>}
                    </div>

                    {formData.customTables.filter(t => t.section === 'reassessment').length > 0 && (
                        <div className="flex flex-wrap gap-3 p-3 bg-surface border border-slate-200 rounded-xl shadow-soft">
                            {formData.customTables.filter(t => t.section === 'reassessment').map(table => (<CustomTableEditor key={table.id} table={table} updateTable={handleUpdateCustomTable} removeTable={() => handleRemoveCustomTable(table.id)} readOnly={readOnly} />))}
                        </div>
                    )}

                    {formData.reassessmentTables.map((rtable) => (
                        <section key={rtable.id} className="bg-surface rounded-xl shadow-soft border border-slate-200 overflow-hidden">
                          <div className="p-2.5 bg-slate-50 border-b border-slate-200 flex justify-between gap-2 items-center">
                            <div contentEditable={!readOnly} suppressContentEditableWarning onBlur={e => updateReassessmentTableTitle(rtable.id, e.currentTarget.innerText)} className={`font-bold text-xs text-navy outline-none ${readOnly ? '' : 'border-b border-dashed border-blue-200'}`}>{rtable.title}</div>
                            {!readOnly && (
                                <div className="flex gap-1">
                                    {formData.reassessmentTables.length > 1 && <button onClick={() => removeReassessmentTable(rtable.id)} className="text-red-500 px-1.5 py-0.5 rounded text-[10px] font-bold"><i className="ph-bold ph-trash"></i></button>}
                                    <button onClick={() => { setActiveReassessmentTableId(rtable.id); setIsMetricModalOpen(true); }} className="bg-navy text-white px-2 py-1 rounded text-[10px] font-bold">+ Col</button>
                                </div>
                            )}
                          </div>

                          {rtable.trackedMetrics.length > 0 ? (
                              <div className="overflow-x-auto p-2 bg-white h-scroll">
                                <table className="w-full table-auto border-collapse text-xs border border-slate-200">
                                  <thead>
                                    <tr>

          const handleAdd = () => {
            let title = ''; const movement = JOINTS_DATA[selectedJointGroup][selectedMovementIdx];
            let isBilateral = false; let normalVal = '';
            let c1 = '', c2 = '';

            if (type === 'ROM') {
              title = `${romMode} ${selectedJointGroup} ${movement.name}`; normalVal = movement.normal;
              isBilateral = movement.type === 'bilateral';
            } 
            else if (type === 'ROM with VAS') {
              title = `${selectedJointGroup} ${movement.name}`; normalVal = movement.normal;
              if (movement.type === 'bilateral') title += ` (${side})`;
              isBilateral = false; 
            }
            else if (type === 'MMT') { 
              title = `${selectedJointGroup} ${movement.name}`; isBilateral = movement.type === 'bilateral'; normalVal = '5/5'; 
            } 
            else if (type === 'VAS') { title = customName || 'VAS'; isBilateral = false; normalVal = '0-10'; }
            else if (type === 'Custom 2-Column') {
              title = customName || 'Custom Tracker';
              c1 = col1Name || 'Col 1';
              c2 = col2Name || 'Col 2';
              isBilateral = false;
            }
            else { title = customName || 'Custom Column'; isBilateral = false; normalVal = ''; }

            onAdd({ id: generateId(), type, title, isBilateral, normal: normalVal, romMode, col1: c1, col2: c2 });
          };
          
          const currentMovements = JOINTS_DATA[selectedJointGroup]; 
          const selectedMovement = currentMovements[selectedMovementIdx] || currentMovements[0]; 

          return (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-3 print:hidden">

                    </select>
                  </div>
                  {(type === 'ROM' || type === 'ROM with VAS' || type === 'MMT') && (
                    <>
                      {(type === 'ROM' || type === 'ROM with VAS') && (
                        <div className="flex gap-4"><label className="flex items-center gap-1.5 text-xs font-bold text-slate-700"><input type="radio" checked={romMode === 'Active'} onChange={() => setRomMode('Active')} className="accent-azure" /> Active</label><label className="flex items-center gap-1.5 text-xs font-bold text-slate-700"><input type="radio" checked={romMode === 'Passive'} onChange={() => setRomMode('Passive')} className="accent-azure" /> Passive</label></div>
                      )}

                        <div className="space-y-1">
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Joint</label>

                                {Object.keys(JOINTS_DATA).map(j => <option key={j} value={j}>{j}</option>)}

                        <div className="space-y-1">
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Move</label>

                  )}
                  {(type === 'Other' || type === 'VAS') && ( 
                      <input type="text" value={customName} onChange={(e) => setCustomName(e.target.value)} placeholder={type === 'VAS' ? "e.g. Resting VAS" : "Name"} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-azure" />
                  )}
                </div>
                <div className="p-3 border-t border-slate-100 bg-slate-50"><button onClick={handleAdd} className="w-full py-2 bg-azure text-white rounded-lg text-sm font-bold hover:bg-navy">Add Column</button></div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
