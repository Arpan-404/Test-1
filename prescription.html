<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Records - Therapeutic Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f8fafc', surface: '#ffffff' } } } }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--appbg); color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        
        /* Loading Spinner */
        .spinner { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="glass-header fixed top-0 left-0 right-0 h-[60px] flex items-center justify-between px-4 z-50">
        <a href="/" class="flex items-center gap-2 text-navy font-black text-lg">
            <i class="ph-fill ph-folder-open text-azure text-2xl"></i> Patient Portal
        </a>
        <button id="logoutBtn" onclick="location.reload()" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition">
            <i class="ph-bold ph-sign-out"></i> Logout
        </button>
    </header>

    <main class="pt-[80px] pb-10 px-4 max-w-lg mx-auto min-h-screen flex flex-col" id="mainContainer">
        
        <!-- LOGIN SCREEN -->
        <div id="loginSection" class="flex-1 flex flex-col justify-center animate-in fade-in zoom-in duration-300">
            <div class="bg-surface rounded-2xl shadow-sm border border-slate-200 p-6 text-center">
                <div class="w-16 h-16 bg-ice rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ph-fill ph-lock-key text-azure text-3xl"></i>
                </div>
                <h1 class="text-2xl font-black text-navy mb-2">Access Your Records</h1>
                <p class="text-sm text-slate-500 mb-6">Enter your registered phone number to view your clinical prescriptions and exercises.</p>
                
                <div class="relative mb-4">
                    <i class="ph-bold ph-phone absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="tel" id="phoneInput" placeholder="e.g. 9876543210" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-azure focus:ring-2 focus:ring-ice transition font-medium" onkeypress="if(event.key === 'Enter') fetchPrescription()">
                </div>
                
                <button onclick="fetchPrescription()" id="fetchBtn" class="w-full bg-azure text-white rounded-xl py-3 font-bold shadow-[0_4px_15px_rgba(29,78,216,0.25)] hover:bg-navy hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                    <i class="ph-bold ph-magnifying-glass"></i> View My Records
                </button>
                <div id="loginError" class="text-red-500 text-sm font-bold mt-3 hidden"></div>
            </div>
        </div>

        <!-- LOADING SPINNER -->
        <div id="loadingSection" class="hidden flex-1 flex flex-col items-center justify-center">
            <div class="spinner mb-4"></div>
            <p class="text-slate-500 font-medium">Securely fetching records...</p>
        </div>

        <!-- RECORDS VIEW -->
        <div id="recordsSection" class="hidden animate-in slide-in-from-bottom-4 duration-300 space-y-4">
            <!-- Populated via JS -->
        </div>

    </main>

    <script>
        const slugify = (text) => text ? text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '') : '';
        let globalExercises = {};

        async function fetchPrescription() {
            let phone = document.getElementById('phoneInput').value.trim();
            const errDiv = document.getElementById('loginError');
            
            if(!phone) { errDiv.innerText = "Please enter your phone number."; errDiv.classList.remove('hidden'); return; }
            phone = phone.replace(/[^0-9]/g, '');
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');

            try {
                // Fetch both patients and master exercises
                const [ptsRes, exRes] = await Promise.all([
                    fetch('https://patient-records-arpan-default-rtdb.firebaseio.com/patients.json'),
                    fetch('https://patient-records-arpan-default-rtdb.firebaseio.com/exercises.json')
                ]);
                
                const ptsData = await ptsRes.json() || {};
                globalExercises = await exRes.json() || {};

                const patientId = Object.keys(ptsData).find(k => ptsData[k].phone === phone);
                
                document.getElementById('loadingSection').classList.add('hidden');

                if (!patientId) {
                    document.getElementById('loginSection').classList.remove('hidden');
                    document.getElementById('logoutBtn').classList.add('hidden');
                    errDiv.innerText = "No records found for this number.";
                    errDiv.classList.remove('hidden');
                    return;
                }

                renderRecords(ptsData[patientId]);

            } catch (error) {
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                errDiv.innerText = "System error. Please try again later.";
                errDiv.classList.remove('hidden');
            }
        }

        function renderRecords(patient) {
            const container = document.getElementById('recordsSection');
            container.innerHTML = `
                <div class="bg-surface rounded-2xl p-5 shadow-sm border border-slate-200 mb-6 flex items-center gap-4">
                    <div class="w-14 h-14 bg-ice rounded-full flex items-center justify-center shrink-0">
                        <span class="text-2xl text-azure font-black">${patient.name.charAt(0).toUpperCase()}</span>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-navy leading-tight">${patient.name}</h2>
                        <p class="text-sm text-slate-500 font-medium">Verified Patient</p>
                    </div>
                </div>
            `;

            if (!patient.prescriptions || Object.keys(patient.prescriptions).length === 0) {
                container.innerHTML += `
                    <div class="text-center py-10 bg-surface rounded-2xl border border-slate-200">
                        <i class="ph-fill ph-file-dashed text-4xl text-slate-300 mb-2 block"></i>
                        <p class="text-slate-500 font-medium">No prescriptions added yet.</p>
                    </div>`;
            } else {
                const sortedRx = Object.values(patient.prescriptions).sort((a,b) => new Date(b.date) - new Date(a.date));
                
                sortedRx.forEach(rx => {
                    const dateStr = new Date(rx.date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
                    
                    let html = `
                    <div class="bg-surface rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                        <div class="absolute top-0 left-0 w-1 h-full bg-azure"></div>
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <div class="font-black text-navy"><i class="ph-bold ph-calendar-blank text-azure mr-1"></i> ${dateStr}</div>
                            <span class="bg-ice text-azure text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide">Clinical Rx</span>
                        </div>
                        <div class="p-4 space-y-4">
                            ${rx.diagnosis ? `<div><p class="text-[10px] font-bold text-slate-400 uppercase mb-0.5">Diagnosis</p><p class="font-semibold text-slate-800">${rx.diagnosis}</p></div>` : ''}
                            ${rx.notes ? `<div><p class="text-[10px] font-bold text-slate-400 uppercase mb-0.5">Clinical Notes</p><p class="text-sm text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100 whitespace-pre-wrap">${rx.notes}</p></div>` : ''}
                    `;

                    if (rx.exercises && rx.exercises.length > 0) {
                        html += `<div><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Prescribed Exercises</p><div class="grid grid-cols-2 gap-2">`;
                        
                        rx.exercises.forEach(exId => {
                            const exData = globalExercises[exId];
                            if(exData) {
                                // NEW: Links to the absolute SEO URL and opens in a new tab so they don't lose the prescription
                                html += `
                                <a href="/exercise/${slugify(exData.name)}" target="_blank" class="block border border-slate-200 rounded-lg overflow-hidden group hover:border-azure transition bg-white">
                                    <div class="aspect-video bg-slate-100 relative">
                                        <img src="${exData.imageUrl || '/favicon.png'}" class="w-full h-full object-cover" onerror="this.src='/favicon.png'">
                                        <div class="absolute inset-0 bg-black/10 group-hover:bg-black/20 transition flex items-center justify-center">
                                            <div class="w-8 h-8 bg-white/90 rounded-full flex items-center justify-center text-azure shadow-sm transform scale-90 group-hover:scale-100 transition"><i class="ph-fill ph-play text-sm"></i></div>
                                        </div>
                                    </div>
                                    <div class="p-2 text-center">
                                        <p class="text-xs font-bold text-slate-800 truncate">${exData.name}</p>
                                    </div>
                                </a>`;
                            }
                        });
                        html += `</div></div>`;
                    }
                    html += `</div></div>`;
                    container.innerHTML += html;
                });
            }
            container.classList.remove('hidden');
        }
    </script>
</body>
</html>
