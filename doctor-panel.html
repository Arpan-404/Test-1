<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doctor Panel - Physio Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: '#1e3a8a', azure: '#1d4ed8', ice: '#dbeafe', appbg: '#f4f7fb', surface: '#ffffff' },
            boxShadow: { 'soft': '0 4px 20px rgba(0, 0, 0, 0.05)' }
          }
        }
      }
    </script>

    <style>
        body { background-color: #f4f7fb; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Custom Scrollbar for Exercise List */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Loader */
        @keyframes instantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .native-loader { width: 40px; height: 40px; border: 4px solid #dbeafe; border-top: 4px solid #1d4ed8; border-radius: 50%; animation: instantSpin 1s linear infinite; margin: 0 auto 15px; }

        /* Print Layout - Beautiful Prescription Format */
        @page { size: A4; margin: 15mm; }
        @media print {
            body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break-avoid { page-break-inside: avoid; break-inside: avoid; }
            
            .print-header { border-bottom: 2px solid #1e3a8a; padding-bottom: 15px; margin-bottom: 20px; }
            .print-title { font-size: 28px; font-weight: bold; color: #1e3a8a; font-family: Georgia, serif; font-style: italic; }
            .print-subtitle { font-size: 14px; font-weight: bold; color: #1e3a8a; }
            
            .patient-info-box { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; }
            .info-item { flex: 1; min-width: 120px; }
            .info-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: bold; }
            .info-value { font-size: 14px; color: #0f172a; font-weight: bold; }
            
            .clinical-notes { margin-bottom: 25px; }
            .clinical-notes h3 { font-size: 16px; color: #1e3a8a; border-bottom: 1px solid #1e3a8a; padding-bottom: 4px; margin-bottom: 8px; }
            .clinical-notes p { font-size: 14px; color: #334155; white-space: pre-wrap; line-height: 1.6; }

            .ex-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .ex-card { border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; page-break-inside: avoid; }
            .ex-img-box { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
            .ex-img { max-width: 100%; max-height: 100%; object-fit: contain; }
            .ex-name { font-size: 14px; font-weight: bold; color: #0f172a; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; }
            .ex-params { display: flex; gap: 15px; font-size: 12px; font-weight: bold; color: #1e3a8a; background: #f8fafc; padding: 8px; border-radius: 4px; margin-bottom: 8px; }
            .ex-note { font-size: 12px; color: #475569; font-style: italic; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div class="native-loader"></div>
            <div style="font-weight: bold; font-size: 1.1rem; color: #1e3a8a;">Loading Workspace...</div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getDatabase, ref as rtdbRef, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const generateId = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            databaseURL: "https://patient-records-arpan-default-rtdb.firebaseio.com",
            storageBucket: "patient-records-arpan.firebasestorage.app",
            messagingSenderId: "599041105903",
            appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        setPersistence(auth, browserLocalPersistence).catch(console.error);

        function App() {
            const [user, setUser] = useState(null);
            const [isChecking, setIsChecking] = useState(true);
            const [viewMode, setViewMode] = useState('login'); // 'login', 'doctor_dash', 'patient_portal'
            
            const [exercises, setExercises] = useState([]);
            const [loginError, setLoginError] = useState('');
            
            // Patient Login Form State
            const [patLoginId, setPatLoginId] = useState('');
            const [patLoginPhone, setPatLoginPhone] = useState('');
            const [patientData, setPatientData] = useState(null); // Used for patient portal

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        // If logged in via Google (not anonymous), go straight to Doctor Dash
                        if (!currentUser.isAnonymous) {
                            setViewMode('doctor_dash');
                        } else {
                            // Check if patient session exists
                            try {
                                const docSnap = await getDoc(doc(db, 'artifacts', 'physiocare-tracker', 'users', currentUser.uid, 'preferences', 'loginState'));
                                if (docSnap.exists() && docSnap.data().role === 'patient') {
                                    // Fetch their data
                                    const pSnap = await getDoc(doc(db, 'artifacts', 'physiocare-tracker', 'public', 'data', 'patients', docSnap.data().patientId));
                                    if(pSnap.exists()) {
                                        setPatientData({ id: pSnap.id, ...pSnap.data() });
                                        setViewMode('patient_portal');
                                    } else { setViewMode('login'); }
                                } else { setViewMode('login'); }
                            } catch(e) { setViewMode('login'); }
                        }
                    } else {
                        signInAnonymously(auth).catch(console.error);
                        setViewMode('login');
                    }
                    setIsChecking(false);
                });
                return () => unsubscribe();
            }, []);

            // Load Exercises from RTDB
            useEffect(() => {
                if(viewMode === 'login' || isChecking) return;
                const unsubscribe = onValue(rtdbRef(rtdb, 'exercises'), (snap) => {
                    if (snap.exists()) {
                        const data = snap.val();
                        setExercises(Object.keys(data).map(k => ({ id: k, ...data[k] })));
                    }
                });
                return () => unsubscribe();
            }, [viewMode, isChecking]);

            const handleDoctorLogin = async () => {
                setLoginError('');
                try {
                    await signInWithPopup(auth, googleProvider);
                    setViewMode('doctor_dash');
                } catch(e) { setLoginError('Doctor login failed.'); }
            };

            const handlePatientLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                try {
                    const snap = await getDocs(collection(db, 'artifacts', 'physiocare-tracker', 'public', 'data', 'patients'));
                    let match = null;
                    const safeId = patLoginId.toLowerCase().trim();
                    const safePhone = patLoginPhone.trim();

                    snap.forEach(doc => {
                        const p = doc.data();
                        if (((p.ipId||'').toLowerCase() === safeId || (p.name||'').toLowerCase() === safeId) && (p.contact||'').trim() === safePhone) {
                            match = { id: doc.id, ...p };
                        }
                    });

                    if (match) {
                        setPatientData(match);
                        setViewMode('patient_portal');
                        if (user) await setDoc(doc(db, 'artifacts', 'physiocare-tracker', 'users', user.uid, 'preferences', 'loginState'), { role: 'patient', patientId: match.id });
                    } else {
                        setLoginError('Record not found. Check UPID and Mobile Number.');
                    }
                } catch(e) { setLoginError('Error connecting to database.'); }
            };

            const handleLogout = async () => {
                if (user && user.isAnonymous) {
                    try { await setDoc(doc(db, 'artifacts', 'physiocare-tracker', 'users', user.uid, 'preferences', 'loginState'), { role: null, patientId: null }); } catch(e){}
                } else {
                    await signOut(auth);
                }
                setPatientData(null);
                setViewMode('login');
                window.location.reload();
            };

            if (isChecking) return <div className="min-h-screen flex items-center justify-center font-bold text-navy">Loading...</div>;

            // --- LOGIN SCREEN ---
            if (viewMode === 'login') {
                return (
                    <div className="min-h-screen bg-appbg flex flex-col items-center justify-center p-4 relative">
                        <button onClick={handleDoctorLogin} className="absolute top-4 right-4 flex items-center gap-1.5 bg-white border border-slate-200 text-navy px-4 py-2 rounded-full text-xs font-bold shadow-sm hover:bg-slate-50 transition">
                            <i className="ph-bold ph-stethoscope"></i> Doctor Login
                        </button>

                        <div className="max-w-sm w-full bg-white rounded-2xl shadow-soft border border-slate-200 p-8">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-blue-50 text-azure rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="ph-fill ph-file-text text-3xl"></i>
                                </div>
                                <h1 className="text-2xl font-bold text-navy">Patient Portal</h1>
                                <p className="text-sm text-slate-500 mt-1">Access your prescriptions & exercises</p>
                            </div>
                            
                            <form onSubmit={handlePatientLogin} className="space-y-5">
                                {loginError && <div className="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100 text-center">{loginError}</div>}
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Patient Name or UPID</label>
                                    <input type="text" required value={patLoginId} onChange={e => setPatLoginId(e.target.value)} placeholder="e.g. John or 4092" className="w-full mt-1 p-3 text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-azure focus:bg-white transition" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Mobile Number</label>
                                    <input type="tel" required value={patLoginPhone} onChange={e => setPatLoginPhone(e.target.value)} placeholder="Enter 10 digit number" className="w-full mt-1 p-3 text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-azure focus:bg-white transition" />
                                </div>
                                <button type="submit" className="w-full bg-azure text-white font-bold py-3.5 rounded-xl hover:bg-navy shadow-md mt-2 transition">View My Report</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- PATIENT PORTAL VIEW ---
            if (viewMode === 'patient_portal' && patientData) {
                const assignedExs = exercises.filter(e => (patientData.exerciseIds||[]).includes(e.id));
                return (
                    <div className="min-h-screen pb-20 print:p-0 print:bg-white">
                        <div className="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 no-print flex justify-between items-center shadow-sm">
                            <h1 className="font-bold text-navy flex items-center gap-2"><i className="ph-bold ph-activity text-azure"></i> My Report</h1>
                            <div className="flex gap-2">
                                <button onClick={() => window.print()} className="bg-slate-100 text-slate-700 font-bold px-4 py-2 rounded-full text-sm hover:bg-slate-200"><i className="ph-bold ph-printer"></i> Print</button>
                                <button onClick={handleLogout} className="bg-red-50 text-red-600 font-bold px-4 py-2 rounded-full text-sm hover:bg-red-100"><i className="ph-bold ph-sign-out"></i> Logout</button>
                            </div>
                        </div>

                        <div className="max-w-4xl mx-auto p-4 mt-4 print:mt-0 print:max-w-none">
                            
                            {/* Print Header */}
                            <div className="print-only hidden print-header">
                                <h1 className="print-title">Dr. Arpan Das (PT)</h1>
                                <p className="print-subtitle">BPT (KPC Medical College and Hospital) • Consultant Physiotherapist</p>
                                <div style={{textAlign: 'right', marginTop: '-35px'}}>
                                    <p className="print-subtitle"><i className="ph-fill ph-phone-call"></i> +91 9641568109</p>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-soft border border-slate-200 p-6 print:border-none print:shadow-none print:p-0">
                                
                                <div className="patient-info-box bg-slate-50 print:bg-white">
                                    <div className="info-item"><div className="info-label">Patient Name</div><div className="info-value text-lg">{patientData.name}</div></div>
                                    <div className="info-item"><div className="info-label">UPID</div><div className="info-value">{patientData.ipId}</div></div>
                                    <div className="info-item"><div className="info-label">Age / Gender</div><div className="info-value">{patientData.age} {patientData.gender ? `/ ${patientData.gender}` : ''}</div></div>
                                    <div className="info-item"><div className="info-label">Date</div><div className="info-value">{patientData.date ? new Date(patientData.date).toLocaleDateString('en-GB') : '-'}</div></div>
                                </div>

                                {patientData.notes && (
                                    <div className="clinical-notes mt-6">
                                        <h3>Clinical Notes / Diagnosis</h3>
                                        <p>{patientData.notes}</p>
                                    </div>
                                )}

                                {assignedExs.length > 0 && (
                                    <div className="mt-8">
                                        <h3 className="font-bold text-lg text-navy border-b border-slate-200 pb-2 mb-4 print:text-[#1e3a8a] print:border-[#1e3a8a]">Prescribed Exercises</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 ex-grid">
                                            {assignedExs.map(ex => {
                                                const params = patientData.exerciseParams?.[ex.id] || {};
                                                return (
                                                    <div key={ex.id} className="border border-slate-200 rounded-xl p-4 bg-white ex-card">
                                                        {ex.imageUrl && <div className="ex-img-box"><img src={ex.imageUrl} className="ex-img" /></div>}
                                                        <h4 className="ex-name">{ex.name}</h4>
                                                        <div className="ex-params">
                                                            {params.reps && <span>Reps: {params.reps}</span>}
                                                            {params.sets && <span>Sets: {params.sets}</span>}
                                                            {params.freq && <span>Freq: {params.freq}</span>}
                                                        </div>
                                                        {params.note && <p className="ex-note">Note: {params.note}</p>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // --- DOCTOR DASHBOARD (Matching Screenshot) ---
            return <DoctorDashboard user={user} exercises={exercises} onLogout={handleLogout} db={db} />;
        }

        function DoctorDashboard({ user, exercises, onLogout, db }) {
            const [search, setSearch] = useState('');
            const [patient, setPatient] = useState({ name: '', age: '', gender: '', phone: '', notes: '' });
            const [selectedExs, setSelectedExs] = useState([]);
            const [exParams, setExParams] = useState({});
            const [isSaving, setIsSaving] = useState(false);

            const toggleEx = (ex) => {
                if (selectedExs.some(e => e.id === ex.id)) {
                    setSelectedExs(prev => prev.filter(e => e.id !== ex.id));
                    setExParams(prev => { const n = {...prev}; delete n[ex.id]; return n; });
                } else {
                    setSelectedExs(prev => [...prev, ex]);
                    setExParams(prev => ({...prev, [ex.id]: { reps: '10', sets: '3', freq: '2x/Day', note: '' }}));
                }
            };

            const updateParam = (id, field, value) => {
                setExParams(prev => ({ ...prev, [id]: { ...prev[id], [field]: value } }));
            };

            const handleGenerate = async () => {
                if(!patient.name || !patient.phone) {
                    alert("Please enter at least Patient Name and Mobile Number so they can log in.");
                    return;
                }
                
                setIsSaving(true);
                const upid = Math.floor(1000 + Math.random() * 9000).toString();
                const docId = generateId();
                const date = new Date().toISOString().split('T')[0];

                const payload = {
                    id: docId,
                    ipId: upid,
                    doctorId: user.uid,
                    name: patient.name,
                    contact: patient.phone, // Crucial for login
                    age: patient.age,
                    gender: patient.gender,
                    notes: patient.notes,
                    date: date,
                    exerciseIds: selectedExs.map(e => e.id),
                    exerciseParams: exParams,
                    isPublished: true // Auto publish for simple version
                };

                try {
                    await setDoc(doc(db, 'artifacts', 'physiocare-tracker', 'public', 'data', 'patients', docId), payload);
                    alert(`Prescription Saved!\n\nPatient UPID: ${upid}\nPhone: ${patient.phone}\n\nThey can use these to log in.`);
                    window.print();
                    // Optional: Reset form after print
                    // setPatient({ name: '', age: '', gender: '', phone: '', notes: '' });
                    // setSelectedExs([]); setExParams({});
                } catch(e) { alert("Error saving prescription."); }
                setIsSaving(false);
            };

            const filteredExercises = exercises.filter(e => 
                (e.name||'').toLowerCase().includes(search.toLowerCase()) || 
                (e.tags||[]).join(' ').toLowerCase().includes(search.toLowerCase())
            );

            const formattedPrintDate = new Date().toLocaleDateString('en-GB');

            return (
                <div className="min-h-screen pb-20 print:p-0 print:bg-white">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center sticky top-0 z-10 no-print">
                        <div className="flex items-center gap-4">
                            <i className="ph-bold ph-pulse text-2xl text-azure"></i>
                            <div className="flex bg-slate-100 p-1 rounded-lg">
                                <button className="bg-white text-azure font-bold text-sm px-4 py-1.5 rounded-md shadow-sm">Main Rx</button>
                                <button className="text-slate-500 font-bold text-sm px-4 py-1.5 rounded-md hover:text-slate-700">Exercise</button>
                            </div>
                        </div>
                        <button onClick={onLogout} className="text-slate-400 hover:text-red-500 font-bold text-sm flex items-center gap-1"><i className="ph-bold ph-sign-out"></i> Logout</button>
                    </header>

                    <div className="max-w-3xl mx-auto px-4 py-6 print:p-0 print:max-w-none">
                        
                        <h1 className="text-2xl font-bold text-navy flex items-center gap-2 mb-6 no-print">
                            <i className="ph-bold ph-stethoscope text-azure"></i> Doctor Dashboard
                        </h1>

                        <div className="space-y-6 no-print">
                            {/* SECTION 1 */}
                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <h2 className="font-bold text-lg text-slate-800 mb-1">1. Patient Details & Selection</h2>
                                <p className="text-sm text-slate-500 mb-5">Fill info and select exercises from your database.</p>

                                <div className="space-y-3 mb-6">
                                    <input type="text" value={patient.name} onChange={e=>setPatient({...patient, name: e.target.value})} placeholder="Patient Name *" className="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-azure bg-slate-50 focus:bg-white transition" />
                                    <div className="grid grid-cols-3 gap-3">
                                        <input type="tel" value={patient.phone} onChange={e=>setPatient({...patient, phone: e.target.value})} placeholder="Mobile Number *" className="col-span-2 sm:col-span-1 border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-azure bg-slate-50 focus:bg-white transition" />
                                        <input type="number" value={patient.age} onChange={e=>setPatient({...patient, age: e.target.value})} placeholder="Age" className="border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-azure bg-slate-50 focus:bg-white transition" />
                                        <select value={patient.gender} onChange={e=>setPatient({...patient, gender: e.target.value})} className="border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-azure bg-slate-50 focus:bg-white transition">
                                            <option value="">Gender</option><option value="Male">Male</option><option value="Female">Female</option>
                                        </select>
                                    </div>
                                    <textarea value={patient.notes} onChange={e=>setPatient({...patient, notes: e.target.value})} placeholder="Additional Notes (Goals, Diagnosis, Plans, etc.)" rows="3" className="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-azure bg-slate-50 focus:bg-white transition resize-none"></textarea>
                                </div>

                                <div className="relative mb-4">
                                    <i className="ph-bold ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                    <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search to select..." className="w-full border border-slate-200 rounded-lg pl-10 pr-4 py-3 text-sm outline-none focus:border-azure bg-slate-50 focus:bg-white transition" />
                                </div>

                                <div className="space-y-2 max-h-64 overflow-y-auto custom-scroll pr-2">
                                    {filteredExercises.map(ex => {
                                        const isSelected = selectedExs.some(e => e.id === ex.id);
                                        return (
                                            <div key={ex.id} onClick={()=>toggleEx(ex)} className={`flex items-start gap-3 p-3 rounded-xl border cursor-pointer transition ${isSelected ? 'border-azure bg-blue-50/50' : 'border-slate-100 hover:border-slate-300'}`}>
                                                <div className={`w-5 h-5 rounded border mt-0.5 flex items-center justify-center shrink-0 ${isSelected ? 'bg-azure border-azure text-white' : 'border-slate-300 bg-white'}`}>
                                                    {isSelected && <i className="ph-bold ph-check text-xs"></i>}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-sm text-slate-800">{ex.name}</div>
                                                    <div className="text-xs text-slate-500 mt-0.5 line-clamp-1">{(ex.tags||[]).join(', ') || ex.description?.replace(/<[^>]*>?/gm, '')}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>

                            {/* SECTION 2 */}
                            <section className="bg-slate-50 rounded-2xl shadow-sm border border-slate-200 p-6">
                                <div className="flex justify-between items-center mb-5">
                                    <div>
                                        <h2 className="font-bold text-lg text-slate-800 mb-1">2. Configure Prescribed</h2>
                                        <p className="text-sm text-slate-500">Set reps, sets, and instructions for the printout.</p>
                                    </div>
                                    <span className="bg-blue-100 text-azure font-bold text-xs px-3 py-1 rounded-full">{selectedExs.length} Selected</span>
                                </div>

                                <div className="space-y-4">
                                    {selectedExs.length === 0 ? (
                                        <div className="text-center py-6 text-slate-400 text-sm bg-white rounded-xl border border-dashed border-slate-300">Select exercises above to configure them here.</div>
                                    ) : selectedExs.map(ex => (
                                        <div key={ex.id} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm relative group">
                                            <div className="flex justify-between items-center mb-3">
                                                <h3 className="font-bold text-slate-800">{ex.name}</h3>
                                                <button onClick={()=>toggleEx(ex)} className="text-xs text-red-400 hover:text-red-600 font-bold transition">Remove</button>
                                            </div>
                                            <div className="grid grid-cols-3 gap-3 mb-3">
                                                <div>
                                                    <label className="text-[10px] font-bold text-azure uppercase tracking-wider block mb-1">Reps</label>
                                                    <input type="text" value={exParams[ex.id]?.reps||''} onChange={e=>updateParam(ex.id,'reps',e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 text-sm outline-none focus:border-azure transition" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-azure uppercase tracking-wider block mb-1">Sets</label>
                                                    <input type="text" value={exParams[ex.id]?.sets||''} onChange={e=>updateParam(ex.id,'sets',e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 text-sm outline-none focus:border-azure transition" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-azure uppercase tracking-wider block mb-1">Freq</label>
                                                    <input type="text" value={exParams[ex.id]?.freq||''} onChange={e=>updateParam(ex.id,'freq',e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 text-sm outline-none focus:border-azure transition" />
                                                </div>
                                            </div>
                                            <input type="text" value={exParams[ex.id]?.note||''} onChange={e=>updateParam(ex.id,'note',e.target.value)} placeholder="Custom Instructions (e.g. Hold 5s)" className="w-full border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-azure bg-slate-50 focus:bg-white transition" />
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <button onClick={handleGenerate} disabled={isSaving} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-md transition flex items-center justify-center gap-2 text-lg">
                                <i className="ph-bold ph-printer"></i> {isSaving ? 'Saving...' : 'Generate Printable Prescription'}
                            </button>
                        </div>
                        
                        {/* --- PRINT LAYOUT --- */}
                        <div className="hidden print:block print-only">
                            <div className="print-header flex justify-between items-end">
                                <div>
                                    <div className="print-title">Dr. Arpan Das (PT)</div>
                                    <div className="print-subtitle mt-1">BPT (KPC Medical College and Hospital)</div>
                                    <div className="print-subtitle">Consultant Physiotherapist</div>
                                </div>
                                <div className="text-right">
                                    <div className="font-bold text-[#1e3a8a] text-lg mb-4 flex items-center gap-1 justify-end"><i className="ph-fill ph-phone-call"></i> +91 9641568109</div>
                                    <div className="font-bold text-slate-800">Date: <span className="border-b border-slate-800 pb-0.5 px-2">{formattedPrintDate}</span></div>
                                </div>
                            </div>

                            <div className="patient-info-box bg-slate-50">
                                <div className="info-item"><div className="info-label">Patient Name</div><div className="info-value text-lg">{patient.name || '-'}</div></div>
                                <div className="info-item"><div className="info-label">Age / Gender</div><div className="info-value">{patient.age||'-'} {patient.gender ? `/ ${patient.gender}` : ''}</div></div>
                                <div className="info-item"><div className="info-label">Mobile Number</div><div className="info-value">{patient.phone || '-'}</div></div>
                            </div>

                            {patient.notes && (
                                <div className="clinical-notes">
                                    <h3>Clinical Notes / Advice</h3>
                                    <p>{patient.notes}</p>
                                </div>
                            )}

                            {selectedExs.length > 0 && (
                                <div className="mt-8">
                                    <h3 className="font-bold text-lg text-[#1e3a8a] border-b border-[#1e3a8a] pb-1 mb-4">Prescribed Exercises</h3>
                                    <div className="ex-grid">
                                        {selectedExs.map(ex => {
                                            const p = exParams[ex.id];
                                            return (
                                                <div key={ex.id} className="ex-card">
                                                    {ex.imageUrl && <div className="ex-img-box"><img src={ex.imageUrl} className="ex-img" /></div>}
                                                    <div className="ex-name">{ex.name}</div>
                                                    <div className="ex-params">
                                                        {p.reps && <span>Reps: {p.reps}</span>}
                                                        {p.sets && <span>Sets: {p.sets}</span>}
                                                        {p.freq && <span>Freq: {p.freq}</span>}
                                                    </div>
                                                    {p.note && <div className="ex-note">Note: {p.note}</div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
